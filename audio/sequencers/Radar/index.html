<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Radar - Sequenceur</title>

<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<main>
  <div id="radar-container">
    <div id="radar">
      <div id="sweep"></div>
    </div>
  </div>
  <div id="pot-c-speed" class="potContainer">
    <div class="potshadow">
      <div class="pot" id="pot-speed">
        <div class="potPos"></div>
        <span>0.17</span>
      </div>
    </div>
    <span id="slab">speed</span>
  </div>
  <div id="pot-c-decay" class="potContainer">
    <div class="potshadow">
      <div class="pot" id="pot-decay">
        <div class="potPos"></div>
        <span>0.5</span>
      </div>
    </div>
    <span id="dlab">decay</span>
  </div>
  <button id="bomb">Bomb</button>
  <button id="random">Move</button>
  <button id="backup"></button>
</main>

<script type="module" src="./js/script.js"></script>
