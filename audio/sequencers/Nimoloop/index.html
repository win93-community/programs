<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nimoloop</title>
<link rel="stylesheet" href="./style.css" />
<link rel="preload" href="./font/gb.ttf" as="font" type="font/ttf" crossorigin />
<script src="/42/core.js"></script>
<div id="background"></div>
<div id="controls">
  <button id="playButton"><img src="img/play.png" /></button>
  <button id="stopButton"><img src="img/pause.png" /></button>
  <div id="advancedContainer">
    <input type="checkbox" name="advanced" id="advanced" />
    <span id="advancedLabel">SU</span>
  </div>
  <div id="tempoControls">
    <input type="range" name="tempo" id="tempo" min="20" max="255" value="120" step="1" />
    <span>tempo</span><br />
    <div class="advanced">
      <input type="range" name="swing" id="swing" min="0" max="1" value="0" step=".01" />
      <span>swing</span>
    </div>
    <br />
  </div>
  <br />
  <div id="partitions"></div>
  <div class="advanced" id="harmony">
    <button id="harmonyInterface">
      <ui-picto value="note"></ui-picto>
    </button>
    <select id="tonic">
      <option value="C">C</option>
      <option value="C#">C#</option>
      <option value="D">D</option>
      <option value="D#">D#</option>
      <option value="E">E</option>
      <option value="F">F</option>
      <option value="F#">F#</option>
      <option value="G">G</option>
      <option value="G#">G#</option>
      <option value="A" selected>A</option>
      <option value="A#">A#</option>
      <option value="B">B</option>
    </select>
    <select id="scale">
      <option value="Chromatic">Chromatic</option>
      <option value="Ionian">Ionian</option>
      <option value="Dorian">Dorian</option>
      <option value="Phrygian">Phrygian</option>
      <option value="Lydian">Lydian</option>
      <option value="Mixolydian">Mixolydian</option>
      <option value="Aeolian">Aeolian</option>
      <option value="Locrian">Locrian</option>
      <option value="Major Blues">Major Blues</option>
      <option value="Minor Blues">Minor Blues</option>
      <option value="Diminish">Diminish</option>
      <option value="Combination Diminish">Combination Diminish</option>
      <option value="Major Pentatonic">Major Pentatonic</option>
      <option value="Minor Pentatonic">Minor Pentatonic</option>
      <option value="Raga Bhairav">Raga Bhairav</option>
      <option value="Raga Gamanasrama">Raga Gamanasrama</option>
      <option value="Raga Todi">Raga Todi</option>
      <option value="Spanish Scale">Spanish Scale</option>
      <option value="Gypsy Scale">Gypsy Scale</option>
      <option vamllue="Arabian Scale">Arabian Scale</option>
      <option value="Egyptian Scale">Egyptian Scale</option>
      <option value="Hawaiian Scale">Hawaiian Scale</option>
      <option value="Bali Island Pelog">Bali Island Pelog</option>
      <option value="Japanese Miyakobushi">Japanese Miyakobushi</option>
      <option value="Ryukyu Scale">Ryukyu Scale</option>
      <option value="Wholetone">Wholetone</option>
      <option value="minor 3rd Interval">Minor 3rd Interval</option>
      <option value="3rd Interval">3rd Interval</option>
      <option value="4th Interval">4th Interval</option>
      <option value="5th Interval">5th Interval</option>
      <option value="Octave Interval">Octave Interval</option>
    </select>
    <div id="tcptch" class="advanced">
      <input type="checkbox" id="free">
    </div>
  </div>
  <div id="midi-interface" class="advanced">
    <button id="midiAccessButton">
      <ui-picto value="midi"></ui-picto>
    </button>
    <select name="Midi outs" id="midiouts" class="">
      <option value="noMidiout" selected>No Midi</option>
    </select>
  </div>
</div>
<div id="trackControls">
  <span>pitch</span> <button title="Reset Pitch" class="small" id="reset_pitch">r</button>
  <input type="range" name="pitch" id="pitch" min="0" max="127" value="69" step="1" /><br />
  <span>decay</span> <button title="Reset Decay" class="small" id="reset_decay">r</button>
  <input type="range" name="decay" id="decay" min="0" max="127" value="127" step="1" /><br />
  <div class="advanced" id="tcmx">
    <span id="signature"><span>Step X</span> <span id="trackSpeed">1</span></span><br />
    <span id="direction"><span>Dir</span> <img src="img/forward.png" id="dir" /></span><br />
  </div>
  <div id="tcfx" class="advanced">
    <span class="tcfxRev">
      <span class="lab br">Rev</span>
        <input type="checkbox" id="reverse">
    </span><span>
      <span class="lab">Echo</span>
        <input type="checkbox" id="delay">
    </span>
  </div>
</div>
<div id="songControls">
  <span>decay</span><input type="range" name="globalDecay" id="globalDecay" min="0" max="100" value="100" step="1"
    aria-orientation="horizontal" /><br />
  <span class="advanced">echo</span><input type="range" name="delayWet" id="delayWet" class="advanced" min="0"
    max="0.25" value="0" step="0.01" aria-orientation="horizontal" /><br />
</div>
<div id="sequencer">
  <div class="row">
    <div class="cell" data-step="1"><div class="cell-visu"></div></div>
    <div class="cell" data-step="2"><div class="cell-visu"></div></div>
    <div class="cell" data-step="3"><div class="cell-visu"></div></div>
    <div class="cell" data-step="4"><div class="cell-visu"></div></div>
  </div>
  <div class="row">
    <div class="cell" data-step="5"><div class="cell-visu"></div></div>
    <div class="cell" data-step="6"><div class="cell-visu"></div></div>
    <div class="cell" data-step="7"><div class="cell-visu"></div></div>
    <div class="cell" data-step="8"><div class="cell-visu"></div></div>
  </div>
  <div class="row">
    <div class="cell" data-step="9"><div class="cell-visu"></div></div>
    <div class="cell" data-step="10"><div class="cell-visu"></div></div>
    <div class="cell" data-step="11"><div class="cell-visu"></div></div>
    <div class="cell" data-step="12"><div class="cell-visu"></div></div>
  </div>
  <div class="row">
    <div class="cell" data-step="13"><div class="cell-visu"></div></div>
    <div class="cell" data-step="14"><div class="cell-visu"></div></div>
    <div class="cell" data-step="15"><div class="cell-visu"></div></div>
    <div class="cell" data-step="16"><div class="cell-visu"></div></div>
  </div>
</div>
<div id="blocksContainer" class="">
  <div class="advanced">
      <div id="blocks" class=""></div>
      <div id="ab">
        <button id="addBlock1" class="">
          <ui-picto value="plus"></ui-picto>
        </button> <span>Blocks</span>
      </div>
  </div>
  <span class="advanced">
    <button id="blockInterface">
      <ui-picto value="plus-border"></ui-picto>
    </button>
  </span>
</div>
<div class="advanced">
  <div id="song">
    <div id="songFeedback"></div>
    <div id="songEditor">00 00 00 00</div>
    <span>Song</span><input type="checkbox" name="playSong" id="playSong" /><br />
  </div>
</div>
<div class="advanced">
  <button id="songInterface">
    <ui-picto value="plus-border"></ui-picto>
  </button>
</div>
<div id="saving">
  <span class="advanced">
    <button id="loadKit">Kit</button>
  </span>
  <button id="loadSong">Load</button>
  <button id="saveSong">Save</button>
</div>
<style id="kitStyle"></style>
<script type="module" src="js/script.js"></script>
