<!doctype html>
<!--
  Based on classic Jazzman.pd patch by obiwanabe <3<3<3
  Rework and integration -> Jankenpopp 2024/09/02
  Webpd.js is a lib by Sebpiq, (thank you!)
-->

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Jazzman</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
    <style>
      html,
      body {
        overflow: hidden;
        padding: 4px;
        padding-top: 2px;
      }

      #start {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #loading {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #container label {
        width: 50px;
        display: inline-block;
        text-align: left;
        position: relative;
        left: -5px;
        text-transform: capitalize;
        overflow: visible;
      }

      #container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
        grid-auto-rows: 50px;
        grid-gap: 0px;
        padding: 5px;
        position: absolute;
        right: 0px;
        bottom: 0px;
      }

      #groupContainer {
        display: grid;
        grid-gap: 0px;
        padding: 0px;
        grid-template-columns: repeat(auto-fill, minmax(25px, 1fr));
        width: 250px;
        display: none;
      }

      #groupContainer > fieldset {
      }

      #container > div.hslider > label {
        width: 100%;
        display: inline-block;
        text-align: left;
        position: relative;
        left: 5px;
        text-transform: capitalize;
        top: 2px;
        height: 15px;
        overflow: visible;
      }

      #container > div.tgl > label {
        width: 100%;
        left: -2px;
        text-transform: capitalize;
        top: 0px;
        text-align: right;
        overflow: visible;
      }

      div > label {
        overflow: visible;
        position: absolute;
      }

      #groupMood {
        grid-column: 1 / 6;
        grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
        grid-template-rows: 0px;
        display: grid;
        height: 150px;
      }

      .vslider {
        height: 100px;
        position: relative;
        left: 6px;
      }

      #n_0_9,
      #n_0_12,
      #n_0_14,
      #n_0_4 {
        top: 8px;
        position: relative;
      }

      #groupStep {
        grid-column: 6 / 11;
        grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
        grid-template-rows: 0px;
        display: grid;
        height: 150px;
      }

      #groupFX {
        grid-column: 1 / 6;
        grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
        grid-template-rows: 0px;
        display: grid;
        height: 150px;
      }

      #groupMix {
        grid-column: 6 / 11;
        grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
        grid-template-rows: 0px;
        display: grid;
      }

      #n_0_16 {
        display: none;
      }

      #n_0_31 {
        grid-column: 1 / 11;
      }

      .kick > input[type="range"]::-webkit-slider-thumb {
        background: #d0fbd5;
        border: 2px solid #99cc99;
        border-top: 2px solid #fff;
        border-left: 2px solid #fff;
      }

      .snare > input[type="range"]::-webkit-slider-thumb {
        background: #ffdbba;
        border: 2px solid #ffcc99;
        border-top: 2px solid #fff;
        border-left: 2px solid #fff;
      }

      .hh > input[type="range"]::-webkit-slider-thumb {
        background: #ffdbdc;
        border: 2px solid #cc9999;
        border-top: 2px solid #fff;
        border-left: 2px solid #fff;
      }

      .filter > input[type="range"]::-webkit-slider-thumb {
        background: #99ccff;
        border: 2px solid #6699cc;
        border-top: 2px solid #fff;
        border-left: 2px solid #fff;
      }

      .dist > input[type="range"]::-webkit-slider-thumb {
        background: #ff9999;
        border: 2px solid #cc6666;
        border-top: 2px solid #fff;
        border-left: 2px solid #fff;
      }

      .mood > input[type="range"]::-webkit-slider-thumb {
        background: #ffff99;
        border: 2px solid #cccc33;
        border-top: 2px solid #fff;
        border-left: 2px solid #fff;
      }

      #groupStep,
      #groupMix {
        position: relative;
        left: 8px;
      }

      #n_0_9 label {
        top: -20px;
        left: -5px;
      }

      #n_0_7 label {
        top: -20px;
        left: 0px;
      }

      #n_0_8 label {
        top: -20px;
        left: 0px;
      }

      #n_0_12 label {
        top: -20px;
        left: 0px;
      }

      #n_0_11 label {
        top: -20px;
        left: -1px;
      }

      #n_0_10 label {
        top: -20px;
        left: 4px;
      }

      #n_0_14 label {
        top: -20px;
        left: 0px;
      }

      #n_0_15 label {
        top: -20px;
        left: 7px;
      }

      #n_0_13 label {
        top: -20px;
        left: 0px;
      }

      #n_0_4 label {
        top: -20px;
        left: 0px;
      }

      #n_0_6 label {
        top: -20px;
        left: 0px;
      }

      #n_0_5 label {
        top: -20px;
        left: 0px;
      }

      #n_0_31 label {
        top: 300px;
        left: 28px;
      }

      #n_0_31 {
        display: none;
      }

      .pictoLabel {
        position: relative;
        left: 5px;
        top: -4px;
      }

      .footr {
        padding-top: 5px;
        grid-column: 1 / 11;
        display: none;
      }

      #playButton {
        grid-column: 1 / 11;
        width: 258px;
        position: absolute;
        top: 311px;
        height: 30px;
      }
    </style>
  </head>

  <body>
    <div id="groupContainer">
      <fieldset id="groupMood" class="">
        <legend>Mood</legend>

        <div id="n_0_9" class="mood"><label>Speed</label></div>

        <div id="n_0_7" class="mood"><label>Busy</label></div>

        <div id="n_0_8" class="mood"><label>Swing</label></div>
      </fieldset>

      <fieldset id="groupStep" class="">
        <legend>Steps</legend>

        <div id="n_0_12" class="kick"><label>Kick</label></div>

        <div id="n_0_11" class="snare"><label>Snare</label></div>

        <div id="n_0_10" class="hh"><label>HH</label></div>
      </fieldset>

      <fieldset id="groupFX" class="">
        <legend>Effects</legend>

        <div id="n_0_14" class="filter"><label>Freq</label></div>

        <div id="n_0_15" class="filter"><label>Q</label></div>

        <div id="n_0_13" class="dist"><label>Disto</label></div>
      </fieldset>

      <fieldset id="groupMix" class="">
        <legend>Mix</legend>

        <div id="n_0_4" class="kick"><label>Kick</label></div>

        <div id="n_0_6" class="snare"><label>Snare</label></div>

        <div id="n_0_5" class="hh"><label>HH</label></div>

        <div id="n_0_16"></div>
      </fieldset>

      <button id="playButton" class="ui-picto__image" onclick="togglePlay()">
        <svg
          class="ui-picto__image"
          viewBox="0 0 16 16"
          width="16"
          height="16"
          aria-hidden="true">
          <use href="#picto-play"></use>
        </svg>
      </button>

      <div class="footr">
        <div id="n_0_31"><label>Play</label></div>
        <button
          id="randomBeat"
          class="ui-picto__image"
          onclick="inputRandom('n_0_12');inputRandom('n_0_11');inputRandom('n_0_10');">
          <svg
            class="ui-picto__image"
            viewBox="0 0 16 16"
            width="16"
            height="16"
            aria-hidden="true">
            <use href="#picto-shuffle"></use>
          </svg>
          Step
        </button>
        <button
          id="randomMood"
          class="ui-picto__image"
          onclick="inputRandom('n_0_7');inputRandom('n_0_8');">
          <svg
            class="ui-picto__image"
            viewBox="0 0 16 16"
            width="16"
            height="16"
            aria-hidden="true">
            <use href="#picto-shuffle"></use>
          </svg>
          Mood
        </button>
        <button
          id="randomAll"
          class="ui-picto__image"
          onclick="inputRandom('n_0_9');inputRandom('n_0_7');inputRandom('n_0_8');inputRandom('n_0_12');inputRandom('n_0_11');inputRandom('n_0_10');">
          <svg
            class="ui-picto__image"
            viewBox="0 0 16 16"
            width="16"
            height="16"
            aria-hidden="true">
            <use href="#picto-shuffle"></use>
          </svg>
          All
        </button>
      </div>
    </div>

    <button id="start">Start</button>
    <div id="loading">Loading ...</div>
    <script src="/c/libs/webpd/webpd-runtime.js"></script>
    <script src="js/ui.js"></script>

    <script>
      let playing = false

      function togglePlay() {
        const playButton = document.querySelector("#playButton")
        const playButtonUse = document.querySelector("#playButton use")

        if (playing == false) {
          sendMsgToWebPd("n_0_31", "0", [1])
          playButtonUse.setAttribute("href", "#picto-pause")
          playing = true
        } else {
          sendMsgToWebPd("n_0_31", "0", [0])
          playButtonUse.setAttribute("href", "#picto-play")
          playing = false
        }
      }

      function inputRandom(id) {
        const inputElement = document
          .getElementById(id)
          .querySelector('input[type="range"]')
        const min = Number.parseFloat(inputElement.min)
        const max = Number.parseFloat(inputElement.max)
        const randomValue = Math.random() * (max - min) + min
        inputElement.value = randomValue
        sendMsgToWebPd(id, ["0"], [randomValue])
      }
    </script>
  </body>
</html>
