<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Speech</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<fieldset role="none" class="rows liquid gap fit pa-xxs">
  <div id="support" class="message negative"></div>

  <textarea id="text" class="grow" cols="30" rows="7"></textarea>

  <div class="cols">
    <label style="flex-basis: 7ch" for="voice">Voice</label>
    <select id="voice"></select>
  </div>

  <div class="cols">
    <label for="volume" style="flex-basis: 7ch">Volume</label>
    <input type="range" min="0" max="1" step="0.1" id="volume" value="1" />
  </div>

  <div class="cols">
    <label for="rate" style="flex-basis: 7ch">Rate</label>
    <input type="range" min="0.1" max="10" step="0.1" id="rate" value="1" />
  </div>

  <div class="cols">
    <label for="pitch" style="flex-basis: 7ch">Pitch</label>
    <input type="range" min="0" max="2" step="0.1" id="pitch" value="1" />
  </div>

  <button id="speak"><span>Speak</span></button>
</fieldset>

<script type="module" src="./script.js"></script>
