<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Puke Data</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  @font-face {
    font-family: Tomo;
    src:
      url("/42/themes/tribute/windows9x/fonts/tomo/Tomo.woff2") format("woff2"),
      url("/42/themes/tribute/windows9x/fonts/tomo/Tomo.woff") format("woff"),
      url("/42/themes/tribute/windows9x/fonts/tomo/Tomo.ttf") format("opentype");
    font-weight: normal;
    font-style: normal;
    font-display: block;
  }

  html,
  body {
    overflow: hidden;
  }

  #view {
    overflow: auto;
    min-width: 0;
    background-color: var(--document-bg);
    font-family: Tomo;
    letter-spacing: 0px;
    color: var(--document-fg);
  }
  #view svg {
    max-inline-size: none;
    fill: var(--document-fg);
    will-change: transform;
    image-rendering: pixelated;
  }
  .connection {
    stroke: var(--document-fg) !important;
  }
  .box {
    stroke: var(--document-fg) !important;
    fill: var(--document-bg) !important;
  }

  textarea {
    height: 100%;
    width: 34ch;
  }
</style>

<script src="js/pd-fileutils-latest.js"></script>
<script type="module" src="./script.js"></script>
