<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VirtuaDJ</title>

<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="./style.css" />
<script src="/42/core.js"></script>
<script type="module" src="/42/ui/media/picto.js"></script>
<script type="module" src="/42/ui/control/knob.js"></script>

<div class="rows gap-xs fit">
  <div
    id="deck"
    class="gear | rows shrink pa-sm pa-t-lg pa-l-lg gap-sm relative">
    <!--<button class="pa-sm" id="openFile" title="Open">
      <!~~ <ui-picto value="folder-open"></ui-picto> ~~>
      <ui-picto value="eject"></ui-picto>
    </button>-->

    <div class="cols gap-sm">
      <div class="disc-box">
        <div id="disc" class="ratio">
          <div class="disc-label">
            <div id="label">
              <img class="hide" src="" />
              <svg class="hide"></svg>
            </div>
          </div>
        </div>
      </div>
      <input
        type="range"
        min="0"
        max="4"
        value="2"
        step="0.01"
        id="scratch"
        title="Scratch"
        aria-orientation="vertical" />
    </div>
    <input
      type="range"
      min="0"
      max="2"
      value="1"
      step="0.01"
      id="pitch"
      title="Pitch" />
  </div>

  <!-- <hr /> -->

  <div id="vuescreen" class="inset-shallow rows">
    <div class="screen">
      <div class="vue-color"></div>
      <canvas id="vue" width="320" height="70"></canvas>
      <div id="vuePos"></div>
    </div>

    <div class="sfxButtons | cols shrink">
      <div class="cols">
        <button data-index="0" class="sfx | outset-shallow grow">
          <ui-picto value="wave"></ui-picto>
          <!-- <span>airhorn</span> -->
        </button>
        <button data-index="1" class="sfx | outset-shallow grow">
          <ui-picto value="wave"></ui-picto>
          <!-- <span>fart</span> -->
        </button>
        <button data-index="2" class="sfx | outset-shallow grow">
          <ui-picto value="wave"></ui-picto>
          <!-- <span>pullup</span> -->
        </button>
        <button data-index="3" class="sfx | outset-shallow grow">
          <ui-picto value="wave"></ui-picto>
          <!-- <span>siren</span> -->
        </button>
      </div>
      <!-- <button class="outset-shallow">
        <ui-picto value="folder-open"></ui-picto>
      </button> -->
    </div>
  </div>

  <!-- <hr /> -->

  <div class="gear | rows shrink">
    <div id="buttonContainer" class="inset-shallow _cols shrink">
      <div class="cols">
        <button class="_outset-shallow" id="playFile" title="Play">
          <ui-picto value="play"></ui-picto>
        </button>
        <button class="_outset-shallow" id="rewind" title="Rewind">
          <ui-picto value="backward"></ui-picto>
        </button>
        <button class="_outset-shallow" id="stop" title="Stop">
          <ui-picto value="stop"></ui-picto>
        </button>
        <button
          class="_outset-shallow"
          id="reverse"
          title="Reverse"
          aria-pressed="false">
          <ui-picto value="left-right"></ui-picto>
        </button>
        <button class="_outset-shallow" id="openFile" title="Open file">
          <ui-picto value="eject"></ui-picto>
        </button>
        <button class="_outset-shallow hide" id="sfx" title="SFX">
          <div id="sfxLabel">airhorn</div>
        </button>
        <button class="_outset-shallow" id="reset" title="Reset FX">
          <ui-picto value="factory"></ui-picto>
        </button>
      </div>
    </div>

    <!-- <hr /> -->

    <div class="knobs | cols _pa-xs _gap-xs pa-t-lg">
      <div class="control-box control-box--knob">
        <ui-knob
          centerdetent
          min="0"
          max="1"
          value="0.5"
          step="0.01"
          id="bass"></ui-knob>
        <label for="bass">Low</label>
      </div>
      <div class="control-box control-box--knob">
        <ui-knob
          centerdetent
          min="0"
          max="1"
          value="0.5"
          step="0.01"
          id="mid"></ui-knob>
        <label for="mid">Mid</label>
      </div>
      <div class="control-box control-box--knob">
        <ui-knob
          centerdetent
          min="0"
          max="1"
          value="0.5"
          step="0.01"
          id="high"></ui-knob>
        <label for="high">High</label>
      </div>
      <div class="control-box control-box--knob">
        <ui-knob
          centerdetent
          min="0"
          max="1"
          value="0.5"
          step="0.01"
          id="filter"></ui-knob>
        <label for="filter">Filter</label>
      </div>
    </div>
    <hr />
    <div class="knobs | cols _pa-xs _gap-xs pa-t-lg">
      <div class="control-box control-box--knob">
        <ui-knob min="0" max="0.25" value="0" step="0.01" id="boost"></ui-knob>
        <label for="boost">Boost</label>
      </div>
      <div class="control-box control-box--knob">
        <ui-knob min="0" max="1" value="0" step="0.01" id="reverb"></ui-knob>
        <label for="reverb">Reverb</label>
      </div>
      <div class="control-box control-box--knob">
        <ui-knob
          min="0"
          max="1"
          value="0"
          step="0.01"
          id="granulator"></ui-knob>
        <label for="granulator">Granulator</label>
      </div>
      <div class="control-box control-box--knob">
        <ui-knob
          centerdetent
          min="0"
          max="2"
          value="1"
          step="0.01"
          id="master"></ui-knob>
        <label for="master">Volume</label>
      </div>
    </div>
    <hr />
    <div class="crossfader cols shrink pa gap">
      <button id="sendA" title="Send A" aria-pressed="false">
        <ui-picto value="letter-a"></ui-picto>
      </button>
      <input
        type="range"
        min="0"
        max="1"
        value="0.5"
        step="0.01"
        id="crossfader"
        style="--ticks: 1 / 2"
        title="Crossfader" />
      <button id="sendB" title="Send B" aria-pressed="false">
        <ui-picto value="letter-b"></ui-picto>
      </button>
    </div>
    <!-- <hr /> -->
  </div>
</div>

<script type="module" src="./script.js"></script>
