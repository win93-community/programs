<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Iconodio</title>

<script src="/42/core.js"></script>
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" type="text/css" href="./style.css" />
<link rel="preload" href="./img/grid.png" as="image" />

<main class="fit"></main>

<div id="interface" class="panel outset hide selection-false">
  <select id="tonic">
    <option value="69" selected>A</option>
    <option value="70">A#</option>
    <option value="71">B</option>
    <option value="72">C</option>
    <option value="73">C#</option>
    <option value="74">D</option>
    <option value="75">D#</option>
    <option value="76">E</option>
    <option value="78">F</option>
    <option value="79">F#</option>
    <option value="80">G</option>
    <option value="81">G#</option>
  </select>
  <select id="scales">
    <option value="Chromatic" selected>Chromatic</option>
    <option value="Ionian">Ionian</option>
    <option value="Dorian">Dorian</option>
    <option value="Phrygian">Phrygian</option>
    <option value="Lydian">Lydian</option>
    <option value="Mixolydian">Mixolydian</option>
    <option value="Aeolian">Aeolian</option>
    <option value="Locrian">Locrian</option>
    <option value="Major Blues">Major Blues</option>
    <option value="Minor Blues">Minor Blues</option>
    <option value="Diminish">Diminish</option>
    <option value="Combination Diminish">Combination Diminish</option>
    <option value="Major Pentatonic">Major Pentatonic</option>
    <option value="Minor Pentatonic">Minor Pentatonic</option>
    <option value="Raga Bhairav">Raga Bhairav</option>
    <option value="Raga Gamanasrama">Raga Gamanasrama</option>
    <option value="Raga Todi">Raga Todi</option>
    <option value="Spanish Scale">Spanish Scale</option>
    <option value="Gypsy Scale">Gypsy Scale</option>
    <option value="Arabian Scale">Arabian Scale</option>
    <option value="Egyptian Scale">Egyptian Scale</option>
    <option value="Hawaiian Scale">Hawaiian Scale</option>
    <option value="Bali Island Pelog">Bali Island Pelog</option>
    <option value="Japanese Miyakobushi">Japanese Miyakobushi</option>
    <option value="Ryukyu Scale">Ryukyu Scale</option>
    <option value="Wholetone">Wholetone</option>
  </select>
</div>

<div id="preload" class="fit cursor-wait">
  <span class="loading center-self"></span>
</div>

<script type="module" src="./app.js"></script>
