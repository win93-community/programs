<!DOCTYPE html>
<html lang="en">
<!--
    Web Player for Derp.fm
    selecta + code: jknppp
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRadio</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
    <style>
        * {
            user-select: none;
        }

        #listeners {
            float: right;
        }

        #time {
            position: absolute;
            margin-top: 4px;
        }

        #time {
            font-family: 'Tomo';
            position: absolute;
            margin-top: 2px;
            left: 25px;
        }

        #volume {
            position: absolute;
            margin-top: -1px;
            width: 100px;
            right: 0px;
        }

        #artist {
            color: #C3FF00;
            background-color: #000;
            overflow: hidden;
        }

        #visualizer {
            width: 100%;
            height: calc(100% - 96px);
            display: block;
            position: absolute;
            margin-top: 2px;
            background: #000;
        }

        #footer {
            position: absolute;
            bottom: 3px;
            width: 100%;
        }

        #footer hr {
            position: relative;
            top: -1px;
        }

        #volumeLabel {
            position: absolute;
            right: 105px;
            margin-top: 1px;
        }

        #play{
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="audio-container"></div>
    <div id="infos" class="cols gap-xxs">
        <div id="artist" class="pa-x-xs inset-shallow">
            <div><b>Artist</b> <span id="artistName">???</span></div>
            <div><b>Track</b> <span id="trackName">???</span></div>
        </div>
        <div class="shrink pa-x-xs">
            <div><b>Listeners</b></div>
            <div><span id="listeners">0</span></div>
        </div>
    </div>
    <hr>
    <div>
        <canvas id="visualizer" class="inset-shallow"></canvas>
    </div>
    <div id="footer">
        <hr>
        <button id="play" title="play">
            <ui-picto value="play">
                <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                    <use href="#picto-play"></use>
                </svg>
            </ui-picto>
        </button>
        <span id="time">0:00</span>
        <svg id="volumeLabel" class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
            <use href="#picto-volume"></use>
        </svg>
        <input id="volume" type="range" value="1" min="0" max="2" step="0.1">
    </div>
    <script type="module">
        let audioContext;
        let radio = "https://v2.windows93.net:8087";
        function startRadio() {
            if (isPlaying) {
                document.getElementById('audio').pause();
                isPlaying = false;
                document.querySelector("#play ui-picto").setAttribute("value", "play")
                document.querySelector("#play").setAttribute("aria-pressed", isPlaying ? "true" : "false")
                return;
            } else {
                if (audioContext != undefined) {
                    document.getElementById('audio').play();
                    isPlaying = true;
                    document.querySelector("#play ui-picto").setAttribute("value", "pause")
                    document.querySelector("#play").setAttribute("aria-pressed", isPlaying ? "true" : "false")
                    return;
                }
            }
            audioContext = new AudioContext();
            const audio = document.createElement('audio');
            audio.src = radio + "/mpd.ogg";
            audio.crossOrigin = "anonymous";
            audio.controls = false;
            audio.autoplay = true;
            audio.id = "audio";
            document.getElementById('audio-container').appendChild(audio);
            const track = audioContext.createMediaElementSource(audio);
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 1;
            track.connect(gainNode).connect(audioContext.destination);
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            setupVisualizer(audioContext, gainNode);
            const volumeSlider = document.getElementById('volume');
            volumeSlider.addEventListener('input', (event) => {
                const newVolume = parseFloat(event.target.value);
                gainNode.gain.value = newVolume;
            });
            getInfos();
            setInterval(getInfos, 1000);
            updateInterface();
            isPlaying = true;
            document.querySelector("#play ui-picto").setAttribute("value", "pause")
            document.querySelector("#play").setAttribute("aria-pressed", isPlaying ? "true" : "false")
            document.getElementById('play').style.pointerEvents = 'auto';
        }
        document.getElementById('play').addEventListener('click', () => {
            startRadio();
        });
        let lastTrack = "";
        let isPlaying = false;
        function getInfos() {
            fetch(radio + "/status-json.xsl")
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Connection Error.");
                    }
                    return response.json();
                })
                .then(data => {
                    const infos = data.icestats.source;
                    if (lastTrack !== infos.title) {
                        lastTrack = infos.title;
                        if (isPlaying) {
                            // selectAnimation();
                        }
                        document.getElementById('artistName').innerHTML = infos.artist || "Unknown artist";
                        document.getElementById('trackName').innerHTML = infos.title || "Unknown song";
                        document.getElementById('listeners').innerHTML = infos.listeners;
                        if (isPlaying) {
                            notification((infos.artist || "Unknown artist") + ' – ' + (infos.title || "Unknown song"));
                        }
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                });
        }
        let appIcon
        async function notification(msg, entity = "radio") {
            await window.top.sys42.apps.ready
            appIcon ??= window.top.sys42.apps.getAppIcon("radio", "16x16")
            window.top.sys42.toast(msg, {
                label: "DERP.FM – Now Playing",
                picto: appIcon,
                timeout: 4000
            })
        }
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
        }
        function updateInterface() {
            setInterval(() => {
                const audio = document.getElementById('audio');
                const timeDisplay = document.getElementById('time');
                const currentTime = audio.currentTime;
                timeDisplay.innerText = formatTime(currentTime);
            }, 100);
        }
        function setupVisualizer(audioContext, track) {
            const canvas = document.getElementById('visualizer');
            const canvasContext = canvas.getContext('2d');
            const analyser = audioContext.createAnalyser();
            track.connect(analyser);
            analyser.fftSize = 64;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight - 96;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            function draw() {
                canvasContext.fillStyle = '#000';
                canvasContext.fillRect(0, 0, canvas.width, canvas.height);
                analyser.getByteFrequencyData(dataArray);
                const barWidth = canvas.width / bufferLength;
                let barHeight;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height;
                    canvasContext.fillStyle = '#C3FF00';
                    canvasContext.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        getInfos();

        startRadio();

    </script>
</body>

</html>
