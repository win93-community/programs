<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Scratchette</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="speaker outset" id="s1">
      <div class="g1 outset">
        <div class="inset"></div>
      </div>
      <div class="g2 outset">
        <div class="gamelle"></div>
      </div>
    </div>
    <div class="outset" id="c1">
      <h3 class="t1 inset">TAPETRONIC</h3>
    </div>
    <div class="speaker outset" id="s2">
      <div class="g1 outset">
        <div class="inset"></div>
      </div>
      <div class="g2 outset">
        <div class="gamelle"></div>
      </div>
    </div>
    <div id="magneto">
      <div id="q1"></div>
      <div id="r1"></div>
      <div id="r2"></div>
      <div id="r3"></div>
      <div id="r4"></div>
      <div id="r5"></div>
    </div>
    <div id="cassette">
      <img id="cassetteImg" src="./img/0.png" alt="" />
    </div>
    <button id="start"></button>
    <div id="loading"></div>
    <script>
      const imageCache = []
      function preloadImages() {
        for (let i = 0; i <= 35; i++) {
          const img = new Image()
          img.src = `./img/${i}.png`
          imageCache.push(img)
        }
      }
      preloadImages()
    </script>
    <script src="./webpd-runtime.js"></script>
    <script>
      const loadingDiv = document.querySelector("#loading")
      const startButton = document.querySelector("#start")
      const audioContext = new AudioContext()
      const GAIN = 0.6
      const gainNode = audioContext.createGain({ gain: GAIN })
      gainNode.connect(audioContext.destination)

      let patch = null
      let stream = null
      let webpdNode = null

      const initApp = async () => {
        await WebPdRuntime.initialize(audioContext)
        response = await fetch("patch.wasm")
        patch = await response.arrayBuffer()
        loadingDiv.style.display = "none"
        startButton.style.display = "block"
      }

      const startApp = async () => {
        if (audioContext.state === "suspended") {
          audioContext.resume()
        }
        webpdNode = await WebPdRuntime.run(
          audioContext,
          patch,
          WebPdRuntime.defaultSettingsForRun("./patch.wasm"),
        )
        webpdNode.connect(gainNode)
        cassette.style.opacity = "1"
        startButton.classList.add("on")
        playBoop()
        await explorePorts(patch)
        document.querySelector('#n555-125 input[type="radio"]').checked = true
      }
      startButton.onclick = startApp
      initApp().then(() => {
        //
      })
      const container = document.createElement("div")
      container.id = "container"
      document.body.append(container)
      const explorePorts = async (compiledPatch) => {
        const metadata = await WebPdRuntime.readMetadata(compiledPatch)
        for (const [nodeId, val] of Object.entries(
          metadata.settings.io.messageReceivers,
        )) {
          const portletId = Number(val.portletIds[0])

          const div = document.createElement("div")
          div.id = "n" + val.metadata.position.join("-")

          if (val.metadata.type === "bng") {
            const button = document.createElement("button")
            button.textContent = val.metadata.label || "Bang"
            button.onclick = () => sendMsgToWebPd(nodeId, portletId, ["bang"])
            div.append(button)
            container.append(div)
            continue
          } else if (val.metadata.type === "hradio") {
            const name = "radio" + Math.random()
            const label = document.createElement("label")
            label.textContent = val.metadata.label
            div.append(label)

            for (let i = 0, l = val.metadata.maxValue; i < l; i++) {
              const input = document.createElement("input")
              input.type = "radio"
              input.name = name
              if (val.metadata.initValue === i) input.selected = true
              input.oninput = () => {
                gainNode.gain.value = 0
                sendMsgToWebPd(nodeId, portletId, [i])
                playBoop()
                document.getElementById("cassetteImg").src = imageCache[i].src
                cassette.style.left = "calc(50% - (299px/2))"
                cassette.className = ""
                cassette.classList.add("cassette" + i)
                setTimeout(() => {
                  gainNode.gain.value = GAIN
                }, 500)
              }
              div.append(input)
            }
            container.append(div)
            continue
          }

          if (val.metadata.group !== "control:float") continue

          const label = document.createElement("label")
          label.textContent = val.metadata.label

          const input = document.createElement("input")

          if ("minValue" in val.metadata && "maxValue" in val.metadata) {
            input.type = "range"
            input.min = val.metadata.minValue
            input.max = val.metadata.maxValue
            input.step = 0.01
          } else {
            input.type = "number"
            input.step = 0.01
          }

          input.value = val.metadata.initValue ?? 0

          input.oninput = () => {
            sendMsgToWebPd(nodeId, portletId, [Number(input.value)])
          }

          div.append(input)
        }

        initScratchette()
      }

      // ------------- 2. SENDING MESSAGES FROM JAVASCRIPT TO THE PATCH
      // Use the function sendMsgToWebPd to send a message from JavaScript to an object inside your patch.
      //
      // Parameters :
      // - nodeId: the ID of the object you want to send a message to.
      //          This ID is a string that has been assigned by WebPd at compilation.
      //          You can find below the list of available IDs with hints to help you
      //          identify the object you want to interact with.
      // - portletId : the ID of the object portlet to which the message should be sent.
      // - message : the message to send. This must be a list of strings and / or numbers.
      //
      // Examples :
      // - sending a message to a bang node of ID 'n_0_1' :
      //          sendMsgToWebPd('n_0_1', '0', ['bang'])
      // - sending a message to a number object of ID 'n_0_2' :
      //          sendMsgToWebPd('n_0_2', '0', [123])
      //
      const sendMsgToWebPd = (nodeId, portletId, message) => {
        webpdNode.port.postMessage({
          type: "io:messageReceiver",
          payload: {
            nodeId,
            portletId,
            message,
          },
        })
      }
    </script>

    <script>
      var cassette = document.getElementById("cassette")
      var magneto = document.getElementById("magneto")
      let boopBuffer = null

      async function loadBoop() {
        const response = await fetch("sounds/button.wav")
        const arrayBuffer = await response.arrayBuffer()
        boopBuffer = await audioContext.decodeAudioData(arrayBuffer)
      }
      loadBoop()

      function playBoop() {
        if (boopBuffer) {
          const source = audioContext.createBufferSource()
          source.buffer = boopBuffer
          const gainNode = audioContext.createGain()
          gainNode.gain.value = GAIN
          source.connect(gainNode)
          gainNode.connect(audioContext.destination)
          source.start()
        }
      }
      let isDragging = false
      let startX
      let initialLeft

      function initScratchette() {
        function startDrag(e) {
          isDragging = true
          startX = e.touches ? e.touches[0].clientX : e.clientX
          initialLeft = cassette.offsetLeft
          document.body.style.cursor = "grabbing"
        }

        function drag(e) {
          if (isDragging) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX
            const dx = clientX - startX
            const newLeft = initialLeft + dx
            const windowWidth = window.innerWidth
            const cassetteWidth = cassette.offsetWidth
            const maxLeft = windowWidth - cassetteWidth
            cassette.style.left = `${Math.min(Math.max(newLeft, 0), maxLeft)}px`
            updateCassettePosition()
          }
        }

        function endDrag() {
          isDragging = false
          document.body.style.cursor = "default"
        }

        cassette.addEventListener("mousedown", startDrag)
        cassette.addEventListener("touchstart", startDrag)

        document.addEventListener("mousemove", drag)
        document.addEventListener("touchmove", drag)

        document.addEventListener("mouseup", endDrag)
        document.addEventListener("touchend", endDrag)
      }

      function updateCassettePosition() {
        const cassetteRect = cassette.getBoundingClientRect()
        const magnetoRect = magneto.getBoundingClientRect()
        const cassetteLeft = cassetteRect.left
        const cassetteRight = cassetteRect.right
        const magnetoLeft = magnetoRect.left
        const magnetoRight = magnetoRect.right
        const cassetteWidth = cassetteRect.width
        const magnetoWidth = magnetoRect.width
        const percentage =
          ((cassetteRight - magnetoLeft) / (magnetoWidth + cassetteWidth)) * 100
        const value = Math.min(Math.max(percentage, 0), 100)
        sendMsgToWebPd("n_0_9", 0, [Number(value)])
      }

      document.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          gainNode.gain.value = 0
        }
      })

      document.addEventListener("keyup", (event) => {
        if (event.code === "Space") {
          gainNode.gain.value = GAIN
        }
      })

      window.addEventListener("DOMContentLoaded", () => {
        document.addEventListener("contextmenu", (event) =>
          event.preventDefault(),
        )
      })
    </script>
  </body>
</html>
