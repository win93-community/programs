<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>webpd</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
    <style>
      html,
      body {
        overflow: hidden;
        background: repeating-linear-gradient(45deg, #eee, transparent 100px);
      }

      #start {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #loading {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #container {
        position: absolute;
        position: absolute;
        top: -200px;
        left: -120px;
      }

      #container > div {
        position: absolute;
      }

      #container > div > input {
      }

      #container > div.tgl > label {
      }

      div > label {
        overflow: visible;
      }

      .nbx > input {
        width: 42px;
      }

      #n_0_2,
      #n_0_25 {
        display: none;
      }
    </style>
  </head>

  <body>
    <button id="start">Start</button>
    <div id="loading">Loading ...</div>
    <script src="/c/libs/webpd/webpd-runtime.js"></script>
    <script src="./ui.js"></script>
  </body>
</html>
