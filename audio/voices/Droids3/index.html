<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />
<title>Droids III</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  html {
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    grid-gap: 0px;
    overflow: hidden;
  }

  #loading {
    width: 100%;
    height: 100%;
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  #droid {
    grid-column: 1 / 3;
    grid-row: 1 / 4;
    width: 64px;
    image-rendering: pixelated;
    position: absolute;
    top: -2px;
    left: 1px;
  }

  #container {
    grid-column: 3/8;
    grid-row: 1/4;
    display: grid;
    height: 58px;
    width: 130px;
    padding-top: 6px;
  }

  #start {
    position: absolute;
    top: 8px;
    left: 64px;
    width: calc(100% - 72px);
    height: 48px;
  }

  #field {
    overflow: hidden;
    pointer-events: none;
  }

  #n_0_4 {
    width: 90px;
    margin-left: 3px;
  }

  label {
    visibility: hidden;
  }

  #label {
    position: absolute;
    top: -3px;
    left: 66px;
  }

  * {
    user-select: none;
  }
</style>


<fieldset id="field" class="fit">
  <div id="loading">Loading ...</div>
  <img id="droid" src="icon-32.png" alt="" />
  <span id="label">Talk Speed</span>
  <script type="module">
    import { initPatch } from "/c/libs/webpd-ui.js"
    await initPatch()
  </script>
</fieldset>
