<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />
<title>Hillageizer</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  #container label {
    width: 32px;
    display: inline-block;
    text-align: center;
    position: relative;
    left: -5px;
    text-transform: capitalize;
  }

  #container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
    grid-gap: 5px;
    padding: 10px;
  }

  .vslider,
  .tgl {
    display: inline-grid;
  }

  #n_5_1 {
    grid-column: 1 / 2;
    grid-row: 2;
  }

  #n_5_18 {
    grid-column: 2 / 3;
    grid-row: 2;
  }

  #n_5_10 {
    grid-column: 5 / 6;
    grid-row: 2;
  }

  #n_5_11 {
    grid-column: 6 / 7;
    grid-row: 2;
  }

  #n_5_14 {
    grid-column: 7 / 8;
    grid-row: 2;
  }

  #n_5_6 {
    grid-column: 9 / 10;
    grid-row: 2;
  }

  #n_5_7 {
    grid-column: 10 / 11;
    grid-row: 2;
  }

  #n_5_8 {
    grid-column: 11 / 12;
    grid-row: 2;
  }

  /* row 2 */

  #n_2_8 {
    grid-column: 1 / 2;
    grid-row: 4;
  }

  #n_2_10 {
    grid-column: 2 / 3;
    grid-row: 4;
  }

  #n_2_9 {
    grid-column: 3 / 4;
    grid-row: 4;
  }

  #n_3_8 {
    grid-column: 5 / 6;
    grid-row: 4;
  }

  #n_3_10 {
    grid-column: 6 / 7;
    grid-row: 4;
  }

  #n_3_9 {
    grid-column: 7 / 8;
    grid-row: 4;
  }

  #n_4_8 {
    grid-column: 9 / 10;
    grid-row: 4;
  }

  #n_4_10 {
    grid-column: 10 / 11;
    grid-row: 4;
  }

  #n_4_9 {
    grid-column: 11 / 12;
    grid-row: 4;
  }

  #n_10_78 {
    grid-column: 1 / 2;
    grid-row: 6;
  }

  #n_10_79 {
    grid-column: 2 / 3;
    grid-row: 6;
  }

  #n_10_80 {
    grid-column: 3 / 4;
    grid-row: 6;
  }

  #n_10_48 {
    grid-column: 5 / 6;
    grid-row: 6;
  }

  #n_10_49 {
    grid-column: 6 / 7;
    grid-row: 6;
  }

  #n_10_50 {
    grid-column: 9 / 10;
    grid-row: 6;
  }

  #n_10_75 {
    grid-column: 10 / 11;
    grid-row: 6;
  }

  #n_5_1 label {
    grid-row: 1 / 2;
  }

  #n_5_1 input {
    grid-row: 2 / 15;
  }

  #n_1_8 {
    display: grid;
    grid-column: 1 / 12;
    grid-row: 1;
    grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
    grid-gap: 5px;
    align-items: center;
  }

  #n_1_8 label {
    grid-column: 1 / 3;
    align-self: center;
    text-align: left;
    /* left: -12px !important; */
    padding-left: 7px;
    width: auto;
  }

  #n_1_8 input {
    grid-row: 2;
  }

  #n_1_8 span {
    grid-row: 2;
    grid-column: 9 / 12;
    text-align: right;
    text-transform: capitalize;
  }
</style>

<div id="eventShaker"></div>
<div id="scales"></div>

<script type="module">
  import { initPatch } from "/c/libs/webpd-ui.js"

  await initPatch({
    sliderVertical: true,
  })

    "glorious 29.8524 1 1.04762 1.04762 2.47619 2.47619 2.47619 5.07937 1 56 2.03175 1 59.4286 1.01587 1 65.1429 0.693857 0.481437 1 0.0802056 6.7282 45.6456 0.386635",
    "tree-auras 27.1442 1.47619 1 1.04762 3.95238 2.47619 1.98413 10.1587 7 73.3333 22.3492 18 81.1429 64 39 33.1429 0.334049 0.200257 0.415956 0.0802056 0.225887 11.4114 0.386635",

    "flying-teapot 52.8195 1.2381 1.19048 1.2381 9.85714 9.36508 9.85714 14.2222 5 70.6667 14.2222 8 65.1429 12.1905 8 66.2857 0.644947 0.249359 0.359381 0.0802056 0.225887 11.4114 0.386635",

  function getPreset(x) {
    const arr = presets[x].split(" ")
    document.querySelector("#patchName").innerHTML = arr[0] // Name
    document.querySelector('#n_5_18 input[type="range"]').value = arr[1] // T
    document.querySelector('#n_5_10 input[type="range"]').value = arr[2] // V1
    document.querySelector('#n_5_11 input[type="range"]').value = arr[3] // V2
    document.querySelector('#n_5_14 input[type="range"]').value = arr[4] // V3

    document.querySelector('#n_5_8 input[type="range"]').value = arr[7] // M3
    document.querySelector('#n_2_8 input[type="range"]').value = arr[8] // N

    document.querySelector('#n_10_49 input[type="range"]').value = arr[21] // amt
    document.querySelector('#n_10_50 input[type="range"]').value = arr[22] // del
    document.querySelector('#n_10_75 input[type="range"]').value = arr[23] // verb
  }

  const radios = document.querySelectorAll('#n_1_8 input[type="radio"]')
  for (let i = 0, l = radios.length; i < l; i++) {
    radios[i].addEventListener("input", () => getPreset(i))
  }
</script>
