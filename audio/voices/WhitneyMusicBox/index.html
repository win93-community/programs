<!doctype html>
<meta charset="UTF-8" />
<title>Whitney Music Box</title>

<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js" data-options="{autoResume:false}"></script>
<script type="module" src="/42/ui/control/knob.js"></script>

<!--
    Whitney Music Box
    Code : Jankenpopp (25/08/2024)
    Inspired by the work of John Whitney described in his book "digital harmony"
-->

<style>
  html,
  body {
    overflow: hidden;
  }
  #base {
    min-width: 9ch;
  }
  #mode {
    min-width: 13ch;
  }
  #type {
    min-width: 12ch;
  }
  fieldset {
    overflow: hidden;
  }
</style>

<div class="rows gap-xxs fit">
  <div
    id="interface"
    class="shrink gap-xxs"
    style="display: grid; grid-template-columns: auto 1fr">
    <div class="ratio h-full">
      <fieldset class="size-full pa-xs">
        <button class="size-full" id="play" aria-label="Play" data-autofocus>
          <ui-picto value="play"></ui-picto>
        </button>
      </fieldset>
    </div>

    <div class="cols gap-xxs scroll-x-auto">
      <fieldset class="rows gap-xxs pa-l-sm pa-r-xs pa-b-xxs">
        <div class="cols gap-xxs">
          <div class="shrink">
            <label for="base">Note</label>
            <br />
            <select class="w-full" name="base" id="base">
              <option value="0">C-1</option>
              <option value="1">C#-1</option>
              <option value="2">D-1</option>
              <option value="3">D#-1</option>
              <option value="4">E-1</option>
              <option value="5">F-1</option>
              <option value="6">F#-1</option>
              <option value="7">G-1</option>
              <option value="8">G#-1</option>
              <option value="9">A-1</option>
              <option value="10">A#-1</option>
              <option value="11">B-1</option>
              <option value="12">C0</option>
              <option value="13">C#0</option>
              <option value="14">D0</option>
              <option value="15">D#0</option>
              <option value="16">E0</option>
              <option value="17">F0</option>
              <option value="18">F#0</option>
              <option value="19">G0</option>
              <option value="20">G#0</option>
              <option value="21">A0</option>

              <option value="23">B0</option>
              <option value="24">C1</option>
              <option value="25">C#1</option>
              <option value="26">D1</option>
              <option value="27">D#1</option>
              <option value="28">E1</option>
              <option value="29">F1</option>
              <option value="30">F#1</option>
              <option value="31">G1</option>
              <option value="32">G#1</option>
              <option value="33">A1</option>
              <option value="34">A#1</option>
              <option value="35">B1</option>
              <option value="36">C2</option>
              <option value="37">C#2</option>
              <option value="38">D2</option>
              <option value="39">D#2</option>
              <option value="40">E2</option>
              <option value="41">F2</option>
              <option value="42">F#2</option>
              <option value="43">G2</option>
              <option value="44">G#2</option>
              <option value="45">A2</option>
              <option value="46">A#2</option>
              <option value="47">B2</option>
              <option value="48">C3</option>
              <option value="49">C#3</option>
              <option value="50">D3</option>
              <option value="51">D#3</option>
              <option value="52">E3</option>
              <option value="53">F3</option>
              <option value="54">F#3</option>
              <option value="55">G3</option>
              <option value="56">G#3</option>
              <option value="57">A3</option>
              <option value="58">A#3</option>
              <option value="59">B3</option>
              <option value="60" selected>C4</option>

              <option value="89">F6</option>
              <option value="90">F#6</option>
              <option value="91">G6</option>

              <option value="120">C9</option>
              <option value="121">C#9</option>
              <option value="122">D9</option>

              <option value="127">G9</option>
            </select>
          </div>
          <div class="_grow">
            <label for="mode">Scale</label>
            <br />
            <select
              class="w-full"
              name="mode"
              id="mode"
              onchange="updateMode()">
              <option value="Chromatic" selected>Chromatic</option>
              <option value="Ionian">Ionian</option>
              <option value="Dorian">Dorian</option>
              <option value="Phrygian">Phrygian</option>
              <option value="Lydian">Lydian</option>
              <option value="Mixolydian">Mixolydian</option>
              <option value="Aeolian">Aeolian</option>
              <option value="Locrian">Locrian</option>
              <option value="Major Blues">Major Blues</option>
              <option value="Minor Blues">Minor Blues</option>
              <option value="Diminish">Diminish</option>
              <option value="Combination Diminish">Combination Diminish</option>

              <option value="Raga Bhairav">Raga Bhairav</option>

              <option value="Raga Todi">Raga Todi</option>
              <option value="Spanish Scale">Spanish Scale</option>
              <option value="Gypsy Scale">Gypsy Scale</option>
              <option value="Arabian Scale">Arabian Scale</option>
              <option value="Egyptian Scale">Egyptian Scale</option>
              <option value="Hawaiian Scale">Hawaiian Scale</option>
              <option value="Bali Island Pelog">Bali Island Pelog</option>
              <option value="Japanese Miyakobushi">Japanese Miyakobushi</option>
              <option value="Ryukyu Scale">Ryukyu Scale</option>
              <option value="Wholetone">Wholetone</option>
              <option value="55hz">55hz</option>
              <option value="20hz">20hz</option>
              <option value="48hz">48hz</option>
              <option value="100hz">100hz</option>
            </select>
          </div>
          <div class="_shrink">
            <label for="type">Type</label>
            <br />
            <select class="w-full" name="type" id="type">
              <option value="sawtooth" selected>Sawtooth</option>
              <option value="square">Square</option>
              <option value="triangle">Triangle</option>
              <option value="sine">Sine</option>
              <option value="cosinus">Cosinus</option>
              <option value="harmonic-rich">Harmonic Rich</option>
              <option value="soft-bell">Soft Bell</option>
              <option value="deep-bass">Deep Bass</option>
              <option value="hollow">hollow</option>
              <option value="buzz">buzz</option>
              <option value="soft-string">soft-string</option>
              <option value="robotic">robotic</option>
              <option value="water-drop">water-drop</option>
              <option value="wind">wind</option>
              <option value="weird">Weird</option>
              <option value="no-sound">No Sound</option>
            </select>
          </div>
        </div>
        <!-- <div class="shrink control-box control-box--checkbox">
          <input
            type="checkbox"
            class="ma-l-false"
            name="tuning"
            id="tuning" /><label for="tuning">432hz</label>
        </div> -->
      </fieldset>

      <fieldset class="cols shrink gap-xxs pa-x-xs pa-y-xs">
        <div class="control-box control-box--knob">
          <ui-knob
            min="-1"
            max="1"
            value="0.05"
            step="0.001"
            id="speed"
            title="rotation">
          </ui-knob>
          <label for="speed">Rotation</label>
        </div>
        <div class="control-box control-box--knob">
          <ui-knob
            min="10"
            max="1000"
            value="60"
            step="1"
            id="decay"
            title="decay">
          </ui-knob>
          <label for="decay">Decay</label>
        </div>
        <div class="control-box control-box--knob">
          <ui-knob
            min="0"
            max="0.3"
            value="0.15"
            step="0.01"
            id="volume"
            title="volume">
          </ui-knob>
          <label for="volume">Volume</label>
        </div>
      </fieldset>
    </div>
  </div>
  <canvas id="scene" class="screen grow inset"></canvas>
</div>

<script type="module" src="./script.js"></script>
