<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Scrubby</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
    <style>
      html,
      body {
        overflow: hidden;
        background-color: #d3bf7a;
        background-image: url(img/cloud.png);
        background-repeat: no-repeat;
        background-size: 500% 500%;
        background-position: center;
        background-blend-mode: screen;
      }

      #start {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #loading {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #container label {
        width: 50px;
        display: inline-block;
        text-align: center;
        position: relative;
        left: -5px;
        text-transform: capitalize;
      }

      #container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(10%, 1fr));
        grid-gap: 0px;
        padding: 5px;
      }

      #container > div.hslider > label {
        width: 100%;
        display: inline-block;
        text-align: left;
        position: relative;
        left: 5px;
        text-transform: capitalize;
        top: 2px;
        height: 15px;
        overflow: visible;
      }

      #container > div.tgl > label {
        width: 100%;
        left: -2px;
        text-transform: capitalize;
        top: 0px;
        text-align: right;
        overflow: visible;
      }

      #n_0_22 > label {
        left: -6px !important;
      }

      #n_0_23 > label {
        left: 5px !important;
      }

      #n_0_26 > label {
        left: 5px !important;
      }

      #container > div.hslider > input {
        width: 100%;
      }

      #container > div.tgl > input {
      }

      .tgl {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      #n_0_0 {
        display: none;
      }

      #n_0_26 {
        grid-column: 7;
        grid-row: 1;
      }

      #n_0_23 {
        grid-column: 8;
        grid-row: 1;
      }

      #n_0_22 {
        grid-column: 9;
        grid-row: 1;
      }

      #n_0_1 {
        grid-column: 10;
        grid-row: 1;
      }

      #n_0_8 {
        grid-column: 1/11;
        grid-row: 2;
      }

      #n_0_6 {
        grid-column: 1/11;
        grid-row: 3;
      }

      #n_0_7 {
        grid-column: 1/11;
        grid-row: 4;
      }

      #n_0_9 {
        grid-column: 1/11;
        grid-row: 5;
      }

      #n_0_10 {
        grid-column: 1/11;
        grid-row: 6;
      }

      #title {
        color: #fff;
        position: absolute;
        top: 4px;
        left: 10px;
        font-size: x-large;
        text-shadow: 1px 1px 10px rgba(0, 0, 0, 0.1);
      }

      #title > span {
        color: yellow;
      }
    </style>
  </head>

  <body>
    <!-- <div id="loading">Loading ...</div> -->
    <div id="loading" class="loading"></div>
    <script src="/c/libs/webpd/webpd-runtime.js"></script>
    <script type="module" src="js/ui.js"></script>
    <div id="title"><span>webpd</span> scrubby</div>
  </body>
</html>
