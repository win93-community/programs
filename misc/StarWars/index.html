<!doctype html>
<meta charset="utf-8" />
<title>STAR WARS ASCIIMATION</title>

<meta
  name="description"
  content="STAR WARS In a way you've never seen before" />
<meta
  name="keywords"
  content="star wars text ascii asciimation animation parody" />
<meta name="author" content="Simon Jansen" />

<style>
  @font-face {
    font-family: Tomo;
    src: url("/42/themes/tribute/windows9x/fonts/tomo/Tomo.ttf")
      format("opentype");
    font-weight: normal;
    font-style: normal;
    font-display: block;
  }

  html {
    font-family: Tomo, monospace;
    font-size: 12px;
    line-height: 13px;
    overflow: hidden;
    background: #000;
    color: #ffcc00;
  }

  body {
    margin: 1ch;
  }
  #screen {
    width: 67ch;
    height: 14em;
    background-color: #000;
    white-space: pre;
    margin-bottom: 0.7rem;
    position: relative;
    left: 50%;
    translate: -50% 0;
  }
  a {
    text-decoration: none;
    color: #888;
  }
  a:hover {
    color: #fff;
  }
  .controls {
    display: inline-flex;
    gap: 2ch;
    position: relative;
    left: 50%;
    translate: -50% 0;
  }
</style>

<div id="screen"></div>

<div class="controls">
  <a href="#" onclick="start()" title="Start">|&lt;</a>
  <a href="#" onclick="veryFastRewind()" title="Very fast rewind"
    >&lt;&lt;&lt;</a
  >
  <a href="#" onclick="rewind()" title="Rewind">&lt;&lt;</a>
  <a href="#" onclick="frameBack()" title="Back one frame">1&lt;</a>
  <a href="#" onclick="stop()" title="Stop">#</a>
  <a href="#" onclick="frameAdvance()" title="Advance one frame">&gt;1</a>
  <a href="#" onclick="play()" title="Play">&gt;</a>
  <a href="#" onclick="fastForward()" title="Fast forward">&gt;&gt;</a>
  <a href="#" onclick="veryFastForward()" title="Very fast forward"
    >&gt;&gt;&gt;</a
  >
  <a href="#" onclick="end()" title="End"> &gt;|</a>
</div>

<script>
  const LINES_PER_FRAME = 14
  const DELAY_NORMAL = 67
  const DELAY_FAST = 17
  const DELAY_VERYFAST = 1

  const film = []
  let running

  let currentFrame = 0
  let updateDelay = DELAY_NORMAL
  let frameStep = 1 // advance one frame per tick
  let timerHandle = null

  const screen = document.querySelector("#screen")

  function splitPipe(delimiter = "", options) {
    let buffer = ""
    const end = options?.includeDelimiter ? delimiter : ""
    return new TransformStream({
      transform(chunk, controller) {
        buffer += chunk
        const parts = buffer.split(delimiter)
        for (const part of parts.slice(0, -1)) controller.enqueue(part + end)
        buffer = parts.at(-1)
      },
      flush(controller) {
        if (buffer) controller.enqueue(buffer)
      },
    })
  }

  fetch("./film.txt.gz").then((res) => {
    res.body
      .pipeThrough(new DecompressionStream("gzip"))
      .pipeThrough(new TextDecoderStream())
      .pipeThrough(splitPipe("\n"))
      .pipeTo(
        new WritableStream({
          write(chunk) {
            film.push(chunk)
            if (!running) {
              running = true
              start()
            }
          },
        }),
      )
  })

  function validateFrame(frameNumber) {
    return (
      frameNumber > 0 && frameNumber < Math.floor(film.length / LINES_PER_FRAME)
    )
  }

  function displayFrame(frameNumber) {
    if (validateFrame(frameNumber) !== true) return

    screen.replaceChildren()

    for (let line = 1; line < 14; line++) {
      let lineText = film[currentFrame * LINES_PER_FRAME + line]
      if (!lineText || lineText.length === 0) lineText = " "
      screen.append(lineText + "\n")
    }
  }

  function updateDisplay() {
    if (timerHandle) {
      clearTimeout(timerHandle)
    }

    displayFrame(currentFrame)

    if (frameStep !== 0) {
      // read the first line of the current frame as it is a number containing how many times this frame should be displayed
      const nextFrameDelay = film[currentFrame * LINES_PER_FRAME] * updateDelay

      const nextFrame = currentFrame + frameStep

      if (validateFrame(nextFrame) === true) {
        currentFrame = nextFrame
      }

      timerHandle = setTimeout(updateDisplay, nextFrameDelay)
    }
  }

  function start() {
    currentFrame = 0
    play()
  }

  function veryFastRewind() {
    frameStep = -1
    updateDelay = DELAY_VERYFAST
    updateDisplay()
  }

  function rewind() {
    frameStep = -1
    updateDelay = DELAY_FAST
    updateDisplay()
  }

  function frameBack() {
    frameStep = 0

    const nextFrame = currentFrame - 1
    if (validateFrame(nextFrame) === true) {
      currentFrame = nextFrame
    }

    updateDisplay()
  }

  function stop() {
    frameStep = 0
    updateDisplay()
  }

  function frameAdvance() {
    frameStep = 0

    const nextFrame = currentFrame + 1
    if (validateFrame(nextFrame) === true) {
      currentFrame = nextFrame
    }

    updateDisplay()
  }

  function play() {
    frameStep = 1
    updateDelay = DELAY_NORMAL
    updateDisplay()
  }

  function fastForward() {
    frameStep = 1
    updateDelay = DELAY_FAST
    updateDisplay()
  }

  function veryFastForward() {
    frameStep = 1
    updateDelay = DELAY_VERYFAST
    updateDisplay()
  }

  function end() {
    frameStep = 0
    currentFrame = Math.floor(film.length / LINES_PER_FRAME) - 1
    updateDisplay()
  }
</script>
