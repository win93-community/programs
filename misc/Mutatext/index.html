<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mutatext</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  .result > span {
    white-space: pre-wrap;
    font-size: 18px;
    font-variant-emoji: text;
    font-family:
      HelveticaNeue-Light,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      "Noto Sans",
      Helvetica,
      Arial,
      sans-serif,
      "Segoe UI Emoji",
      "Segoe UI Symbol",
      Noto Color Emoji,
      NotoColorEmoji,
      EmojiSymbols,
      Symbola,
      Noto,
      "Android Emoji",
      AndroidEmoji,
      "Arial Unicode MS",
      "Zapf Dingbats",
      AppleColorEmoji,
      "Apple Color Emoji";
  }
  .zalgo-result {
    z-index: 1;
    & > span {
      /* overflow: hidden !important; */
      min-height: 7em;
      display: flex;
      align-items: center;
      overflow: visible;
    }
  }

  .figlet-result > span {
    white-space: pre;
    --ff: var(--font-mono-ff);
    --fs: var(--font-mono-fs);
    --lh: 1; /* var(--font-mono-lh); */
    font: var(--fs) / var(--lh) var(--ff);
  }

  .result-buttons {
    position: absolute;
    top: 0;
    right: 0;
  }
</style>

<div class="rows fit gap-xxs">
  <textarea class="shrink" rows="3">Hello World</textarea>
  <select class="shrink">
    <option>All Mutations</option>
    <option>All Figlets</option>
    <optgroup label="Mutations"></optgroup>
    <optgroup label="Figlets"></optgroup>
  </select>
  <div id="output" class="inset flex-rows scroll-auto pa-sm gap-sm"></div>
</div>

<script type="module" src="./script.js"></script>
