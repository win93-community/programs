<!doctype html>
<html lang="en">
<!-- @jankenpopp 9/11/24-->

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Reader</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/42/core.js"></script>
  <style>
    html, body {
      overflow: hidden;
    }

    #progress {
      display: none;
    }

    progress#progressBar::after {
      display: none;
    }

    #read,
    #done {
      left: round(down, 50%, 1px);
      transform: translateX(round(down, -50%, 1px));
    }

    #start>div,
    #progress>div {
      margin-bottom: 6px;
    }

    #progressText,
    #think {
      margin-bottom: 0px !important;
    }

    #progressBar {
      width: 100%;
    }

    #number {
      width: 100%;
    }

  </style>
</head>

<body>
  <fieldset class="fit cols">
    <div id="start">
      <div id="think" class="text">Think of a number between 1 and 10:</div>
      <div>
        <input type="number" name="number" id="number" min="1" max="10" step="1" value="" />
      </div>
      <div>
        <button id="read" disabled>
          <span>Read my mind</span>
        </button>
      </div>
    </div>
    <div id="progress">
     
      <div id="progressText" class=""></div>
    
      
      <div>
        <progress id="progressBar" value="0" max="100" class="hide-value"></progress>
      </div>
      <div>
        <button id="done" disabled>
          <span>Read my mind</span>
        </button>
      </div>
    </div>
  </fieldset>
</body>
<script>
  const progressBar = document.querySelector("#progressBar")
  const progressText = document.querySelector("#progressText")
  const numberInput = document.querySelector("#number")
  const readEl = document.querySelector("#read")

  const messages = [
    "Analyzing brainwaves…",
    "Scanning memories…",
    "Calculating probabilities…",
    "Decoding thoughts…",
  ]

  function go() {
    if (readEl.disabled) return
    const audio = new Audio("./audio.ogg")
    const n = document.querySelector("#number").value || 5
    document.querySelector("#start").style.display = "none"
    document.querySelector("#progress").style.display = "initial"

    let idx
    function loop() {
      progressBar.value += 1

      const current = Math.floor(progressBar.value / 25)
      if (current !== idx) {
        idx = current
        progressText.textContent = messages[idx]
      }

      if (progressBar.value === 100) {
        progressText.innerHTML = `You're thinking of the number <b>${n}</b>.`
        progressBar.style.opacity = "0"
        document.querySelector("#done span").textContent = "Ok"
        document.querySelector("#done").removeAttribute("disabled")
        audio.play()
        return
      }

      setTimeout(loop, (Math.random() > 0.9 ? 280 : 0) + Math.random() * 60)
    }

    loop()
  }

  numberInput.addEventListener("input", (e) => {
    const value = Number.parseInt(e.target.value, 10)
    readEl.disabled = !(Number.isInteger(value) && value >= 1 && value <= 10)
  })

  numberInput.addEventListener("keydown", ({ key }) => {
    if (key === "Enter") go()
  })

  readEl.addEventListener("click", go)

  document.querySelector("#done").addEventListener("click", () => {
    window.frameElement?.closest("ui-dialog").close()
  })
</script>

</html>
