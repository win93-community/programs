<!doctype html>
<html lang="fr">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bubble Wrap</title>

<!-- Design & Code: Jankenpopp (26/01/2025) -->

<link rel="stylesheet" href="/style.css" id="theme" />
<script src="/42/core.js"></script>

<style>
  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  #scene {
    display: flex;
    flex-wrap: wrap;
  }

  .cols {
    display: flex;
    flex-direction: column;
  }

  .cols button {
    width: 20px;
    height: 20px;
  }

  .pointer-instant {
    background-color: #ddd;
  }
</style>

<div id="scene"></div>

<script>
  const audioContext = new AudioContext();

  async function preloadAudioSample(url) {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    return arrayBuffer;
  }

  let audioBuffer;
  async function initializeAudioContext(arrayBuffer) {
    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
  }

  const preloadedAudio = preloadAudioSample("./assets/bubble.mp3");

  async function playSample(pitchRate = 1) {
    if (!audioBuffer) {
      const arrayBuffer = await preloadedAudio;
      await initializeAudioContext(arrayBuffer);
    }
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.playbackRate.value = pitchRate;
    source.connect(audioContext.destination);
    source.start(0);
  }

  function handleInteraction(button) {
    if (button.hasAttribute("aria-pressed")) return;
    const pitchRate = Math.random() * 3 + 0.25;
    playSample(pitchRate);
    button.setAttribute("aria-pressed", "true");
    button.classList.add("pointer-instant");
  }

  function attachButtonListeners() {
    const buttons = document.querySelectorAll(".cols button");
    let isMouseDown = false;

    buttons.forEach((button) => {
      button.addEventListener("click", () => handleInteraction(button));
      button.addEventListener("mousedown", () => {
        isMouseDown = true;
        handleInteraction(button);
      });
      button.addEventListener("mousemove", (event) => {
        if (isMouseDown) handleInteraction(event.target);
      });
    });

    document.addEventListener("mouseup", () => {
      isMouseDown = false;
    });

    document.addEventListener("contextmenu", (e) => e.preventDefault());
  }

  function generateMatrix(h, w) {
    const scene = document.getElementById('scene');
    scene.innerHTML = "";
    for (let i = 0; i < w; i++) {
      const col = document.createElement("div");
      col.className = "cols";
      for (let j = 0; j < h; j++) {
        const btn = document.createElement("button");
        col.appendChild(btn);
      }
      scene.appendChild(col);
    }
    attachButtonListeners();
  }

  let resizeTimer;

  function updateMatrix() {
    const scene = document.getElementById('scene');
    scene.style.display = "none";
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const bWidth = parseInt(window.innerWidth / 20);
      const bHeight = parseInt(window.innerHeight / 21);
      generateMatrix(bHeight, bWidth);
      scene.style.display = "flex";
    }, 200);
  }

  window.addEventListener("resize", updateMatrix);
  updateMatrix();
</script>

</html>
