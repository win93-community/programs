<script>
  const center = document.querySelector("main")
  // const div = document.querySelector("div")
  // const height = div.offsetHeight

  const hList = [
    "anin.gif",
    "anin.gif",
    "anin.gif",
    "hamu.gif",
    "hamu.gif",
    "hamu.gif",
    "hamu.gif",
    "hamu.gif",
    "hamu.gif",
    "hamu.gif",
    "anin.gif",
    "anin.gif",
    "anin.gif",
    "gerbil.gif",
    "gerbil.gif",
    "gerbil.gif",
    "gerbil.gif",
    "gerbil.gif",
    "gerbil.gif",
    "gerbil.gif",
    "anin.gif",
    "anin.gif",
    "anin.gif",
    "hamwalk.gif",
    "hamwalk.gif",
    "hamwalk.gif",
    "hamwalk.gif",
    "hamwalk.gif",
    "hamwalk.gif",
    "hamwalk.gif",
    "hamwalk.gif",
  ]

  let hamsters
  let triggerCat = 10_000
  function createList(nyaaaaaa) {
    hamsters = document.createDocumentFragment()
    const rdm = ~~(hList.length * Math.random())
    for (let i = 0, l = hList.length; i < l; i++) {
      if (nyaaaaaa && i === rdm) {
        triggerCat += 10_000
        const nyan = new Image()
        nyan.src = "nyan.gif"
        hamsters.append(nyan)
      } else {
        const hamster = new Image()
        hamster.src = hList[i]
        hamsters.append(hamster)
      }
    }
  }

  createList()

  const scrollElm = document.scrollingElement || document.documentElement

  window.addEventListener("scroll", () => {
    // console.log(scrollElm.scrollHeight, scrollElm.scrollTop)
    if (
      (scrollElm.scrollHeight - scrollElm.scrollTop) / 2 <
      scrollElm.clientHeight
    ) {
      center.append(hamsters)
      createList(scrollElm.scrollTop > triggerCat)
    }
  })
</script>
