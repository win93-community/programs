<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Checkwave</title>

<meta name="author" content="Hakim El Hattab" />
<link rel="stylesheet" href="/style.css" />
<style type="text/css" media="screen">
  .wrapper {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    margin: auto;
  }

  input {
    position: absolute;
    will-change: scale;
    shape-rendering: optimizespeed;
  }

  input::after,
  input::before {
    will-change: scale;
    shape-rendering: optimizespeed;
  }
</style>

<body></body>

<script>
  let RES_X = 20
  let RES_Y = 20
  let SIZE = 22

  // super laggy on mobile devices so ease up the res
  if (/iphone|ipad|android/gi.test(navigator.userAgent)) {
    RES_X = 10
    RES_Y = 10
    SIZE = 25
  }

  const entities = []

  const wrapper = document.createElement("div")
  wrapper.className = "wrapper"
  wrapper.style.width = RES_X * SIZE + "px"
  wrapper.style.height = RES_Y * SIZE + "px"
  document.body.append(wrapper)

  for (let x = 0; x < RES_X; x++) {
    for (let y = 0; y < RES_Y; y++) {
      const el = document.createElement("input")
      el.setAttribute("type", "checkbox")
      wrapper.append(el)

      const entity = {
        element: el,
        x: x * SIZE,
        y: y * SIZE,
      }

      el.style.translate = `${entity.x}px ${entity.y}px`
      el.addEventListener("change", () => toggle(entity))

      entities.push(entity)
    }
  }

  function toggle(targetEntity) {
    const { checked } = targetEntity.element

    for (const entity of entities) {
      const dx = targetEntity.x - entity.x
      const dy = targetEntity.y - entity.y
      const distance = Math.hypot(dx, dy)

      setTimeout(() => {
        entity.element.checked = checked
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            entity.element.animate(
              [
                { scale: 2.5, offset: 0.3 }, //
                { scale: 1 },
              ],
              {
                duration: 800,
                easing: "cubic-bezier(0.175, 0.885, 0.32, 1.275)",
              },
            )
          })
        })
      }, distance * 1.8)
    }
  }
</script>
