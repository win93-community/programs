<script>
let randomIcons = [];
let designIcons = [];
let current_Layers = [];
let numRandomIcons = 28;
let numDesignIcons = 100;
let testIconNum = 0;
let displayIcon;
let encLookupString = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
let gridDisplayScale = 10;
let strokeLine = 2;
let xDisplayOffset = 0;
let yDisplayOffset = 0;
let starting_date = new Date(1997, 0, 14, 9, 0, 0);
let current_date = new Date();
let elapsed_time_millisecs;
let icons_per_millisecond = 0.1;
let canvas = document.getElementById("applet");
if (!canvas) {
  canvas = document.createElement("canvas");
  canvas.id = "applet";
  document.body.appendChild(canvas);
}
canvas.width = 32 * (gridDisplayScale);
canvas.height = 32 * (gridDisplayScale);
canvas.style.imageRendering = "pixelated";
canvas.style.border = "1px solid black";
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;
ctx.webkitImageSmoothingEnabled = false;
ctx.mozImageSmoothingEnabled = false;
ctx.msImageSmoothingEnabled = false;
class Icon {
  constructor(string) {
    this.sourseString = string || "";
    this.Icon_State = [];
    this.Icon_Size = 32;
    this.convertStringtoIcon();
  }
  displayIcon(xoff, yoff) {
    for (let i = 0; i < this.Icon_State.length; i++) {
      let x = i % this.Icon_Size;
      let y = Math.floor(i / this.Icon_Size);
      ctx.fillStyle = this.Icon_State[i] ? "#fff" : "#000";
      ctx.fillRect(xoff + x * gridDisplayScale, yoff + y * gridDisplayScale, gridDisplayScale, gridDisplayScale);
    }
    ctx.strokeStyle = "#000";
    ctx.lineWidth = strokeLine;
    let offset = 0;
    for (let i = 0; i <= this.Icon_Size; i++) {
      let pos = i * gridDisplayScale + offset;
      ctx.beginPath();
      ctx.moveTo(xoff + pos, yoff);
      ctx.lineTo(xoff + pos, yoff + this.Icon_Size * gridDisplayScale + 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xoff, yoff + pos);
      ctx.lineTo(xoff + this.Icon_Size * gridDisplayScale, yoff + pos);
      ctx.stroke();
    }
  }
  convertStringtoIcon() {
    let indexnum = 0, iconIndex = 0, bitPlace = 31, countbits = 6;
    for (let i = 0; i < this.sourseString.length - 1; i++) {
      if (this.sourseString[i] == "=") break;
      indexnum = encLookupString.indexOf(this.sourseString[i]);
      bitPlace = 31;
      if (i == this.sourseString.length - 2) countbits = 4;
      for (let j = 0; j < countbits; j++) {
        this.Icon_State[iconIndex] = indexnum > bitPlace ? 1 : 0;
        if (indexnum > bitPlace) indexnum -= bitPlace + 1;
        iconIndex++;
        bitPlace = Math.floor(bitPlace / 2);
      }
    }
  }
  Increment_Icon() {
    let carry_bit = 0;
    this.id = 1;
    if (this.Icon_State[0] == 1) this.Icon_State[0] = 0;
    else {
      this.Icon_State[0] = 1;
      carry_bit = 1;
      while (carry_bit == 1) {
        if (this.Icon_State[this.id] == 0) {
          this.Icon_State[this.id] = 1;
          this.id++;
        } else {
          this.Icon_State[this.id] = 0;
          carry_bit = 0;
        }
      }
    }
  }
  setup_accumulated_time_on_icon(decimal_num) {
    let beo = 0, remainder;
    while (decimal_num >= 1) {
      decimal_num = Math.floor(decimal_num);
      remainder = decimal_num % 2;
      this.Icon_State[beo] = Math.abs(remainder) == 1 ? 0 : 1;
      decimal_num /= 2;
      beo++;
    }
  }
}
function animate() {
  displayIcon.Increment_Icon();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  displayIcon.displayIcon(xDisplayOffset, yDisplayOffset);
  requestAnimationFrame(animate);
}
displayIcon = new Icon();
elapsed_time_millisecs = Date.now() - starting_date.getTime();
displayIcon.setup_accumulated_time_on_icon(elapsed_time_millisecs * icons_per_millisecond);
animate();
</script>
