<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IT'S DANGEROUS TO GO ALONE!</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js" data-options="{autoResume:false}"></script>

<link rel="stylesheet" href="./css/style.css" />

<body class="cursor-pointer selection-false">
  <div class="container fit">
    <div class="topText"></div>
    <div class="fire"></div>
    <div class="oldMan"></div>
    <div><img id="myThis" src="./img/blank.png" /></div>
  </div>
</body>

<script src="/c/libs/jquery/3.7/jquery.min.js"></script>

<script>
  const tada = new Audio("./sounds/tada.wav")
  tada.volume = 0.75

  const speech = new Audio("./sounds/speech.wav")
  speech.volume = 0.45

  $.fn.teletype = function (opts) {
    const defaults = {
      animDelay: 50,
    }
    const settings = $.extend(defaults, opts)

    $(".fire").show()

    $.each(settings.text.split(""), (i, letter) => {
      setTimeout(() => {
        this.html(this.html() + letter)
        speech.currentTime = 0
        speech.play()
        if (i === settings.text.split("").length - 1) {
          setTimeout(() => {
            $("#myThis").css("animation", "none")
            const someNumber = Math.floor(Math.random() * 50 + 1)
            const src = "./img/gallery/" + someNumber + ".jpg"
            $("#myThis").attr("src", src)
            $("#myThis").css("display", "initial")
            tada.pause()
            tada.currentTime = 0
            tada.playbackRate = Math.random() * 0.5 + 0.9
            tada.play()
            $("#myThis").css("animation", "bounce 0.3s ease")
            // window.top.sys42.exec(src); // test
          }, 500)
        }
      }, settings.animDelay * i)
    })
  }

  // $(".oldMan, #myThis").on("click", () => {
  $("body").on("click", () => {
    $(".topText").html("")
    $(".topText").teletype({
      animDelay: 100,
      text: "IT'S DANGEROUS TO GO ALONE! TAKE THIS.",
    })
    $("#myThis").css("display", "none")
    $("#myThis").attr("src", "./img/blank.png")
  })
</script>
