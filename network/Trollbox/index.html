<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trollbox</title>

<link rel="stylesheet" href="/style.css" id="theme" />
<script src="/42/core.js"></script>

<style>
  body {
    overflow: hidden;
  }

  #trollbox_content {
    height: calc(100% - 42px);
  }

  #trollbox_infos {
    width: 150px;
  }

  #trollbox_form {
    width: 100%;
    position: absolute;
    bottom: 0px;
    height: 40px;
  }

  #trollbox_input {
    overflow: hidden;
  }

  .tb {
    background-color: #272822;
    color: #f8f8f2;
    font-family: 'Tomo';
    line-height: 13px;
    font-size: 12px;
  }

  form {
    width: 100%;
  }

  #trollbox_scroll {
    background-color: #272822;
    color: #f8f8f2;
    overflow-x: hidden;
    overflow-y: scroll;
  }

  #trollbox_infos {
    background-color: #272822;
    color: #f8f8f2;
    overflow: hidden;
    overflow-y: scroll;
  }

  #trollbox_input {
    width: 100%;
  }

  .trollbox_line>span {
    -ms-flex-item-align: start;
    align-self: flex-start;
  }

  .trollbox_line span {
    display: inline-block;
    vertical-align: top;
  }

  .trollbox_line {
    vertical-align: top;
    display: flex;
  }

  .ui_group>.trollbox_h {
    padding: 0 5px;
    color: #555;
  }

  .ui_group>.trollbox_msg {
    padding: 0 5px;
    -webkit-box-flex: 1;
    -ms-flex: 1;
    flex: 1;
    text-align: left;
    border-left: 1px solid #333;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .trollbox_nick,
  .ui_group>.trollbox_nick {
    white-space: nowrap;
    font-style: normal;
    text-align: right;
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: inline-block;
  }

  .ui_group>.trollbox_nick {
    padding: 0 5px;
    width: 90px;
  }

  .trollbox_msg .trollbox_nick {
    padding: 0;
  }

  .trollbox_msg>em {
    opacity: 0.7;
  }

  .trollbox_infos_homes {
    display: none;
  }

  #trollbox_infos>div:hover {
    background-color: #494A44;
    cursor: pointer;
  }

  a {
    color: #fff;
  }

  img {
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-crisp-edges;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  em {
    -webkit-font-smoothing: none;
    filter: none !important;
  }

  #cooking {
    position: absolute;
    display: none;
  }
</style>

<div class="fit">
  <div id="trollbox_content" class="fit rows">
    <div class="cols gap-xxs fit">
      <div id="trollbox_scroll" class="tb inset"></div>
      <div id="trollbox_infos" class="tb shrink inset"></div>
    </div>
  </div>
  <form action="" id="trollbox_form" class="cols gap-xxs">
    <button id="trollbox_nick_btn" type="button">anonymous</button>
    <textarea id="trollbox_input" autocomplete="off"></textarea>
    <button>Send</button>
  </form>
</div>

<div id="cooking"></div>

<script src="./js/libs/he.js"></script>
<script src="./js/libs/aalib.js"></script>
<script src="./js/libs/socket.io.js"></script>

<script type="module">

  const port = "8088";

  import { prompt } from "../../../../42/ui/layout/dialog.js"

  const helpMsg = "" +
    "___________              .__  .__ _________                                 \n" +
    "\\__    ___/______   ____ |  | |  |\\______  \\  _______  ___               \n" +
    "   |    |  \\_  __ \\/  _ \\|  | |  | |    |  _//  _ \\  \\/  /             \n" +
    "   |    |   |  | \\(  <_> )  |_|  |_|    |   (  <_> >    <                  \n" +
    "   |____|   |__|   \\____/|____/____/______  /\\____/__/\\_ \\ (v2.3)       \n" +
    "                                          \\/            \\/                \n" +
    "+––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––--+\n" +
    "| COMMANDS:                                                                |\n" +
    "| /color [cssColor]  eg: /color #C3FF00                                    |\n" +
    "| /url               toggle URL autolink                                   |\n" +
    "| /img               toggle image embedding (do this at your own risk)     |\n" +
    "| /ascii [url]       image to ascii art converter                          |\n" +
    "| /who               list users by [home]                                  |\n" +
    "| /block [home]      block user (or right click user's name, on the right) |\n" +
    "| /unblock [home]    unblock user (or click user's name, on the right)     |\n" +
    "| /unblock           unblock every users                                   |\n" +
    "| /r                 display room infos                                    |\n" +
    "| /r [room]          enter [room]                                          |\n" +
    "| /scroll            toggle auto scroll                                    |\n" +
    "| /clear             clear teh chat                                        |\n" +
    "| /speech            activate text-to-speech                               |\n" +
    "| Suggestions?       contact@windows93.net                                 |\n" +
    "| Discord            <a href=\"https://discord.gg/bYFhRTMmMK\" target=\"_blank\">https://discord.gg/bYFhRTMmMK</a>                         |\n" +
    "+––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––+\n";

  const trollbox_scroll = document.getElementById('trollbox_scroll');
  const trollbox_form = document.getElementById('trollbox_form');
  const trollbox_infos = document.getElementById('trollbox_infos');
  const trollbox_nick_btn = document.getElementById('trollbox_nick_btn');
  const trollbox_input = document.getElementById('trollbox_input');

  let pseudo = localStorage['trollbox/nick'] || 'anonymous';
  trollbox_nick_btn.textContent = pseudo;

  let tts;
  let users = [];
  let blocked = [];
  try {
    const raw = localStorage.getItem('trollbox/blocked');
    blocked = raw ? JSON.parse(raw) : [];
  } catch {
    blocked = [];
  }

  let color = localStorage['trollbox/color'] || '';
  let style = "";
  let pass = "";
  let scroll = true;
  let autoLinker = false;
  let imgOn = false;

  let speaking = false;

  function h(dt) {
    var dt = new Date(dt);
    var h = dt.getHours() + '';
    h = h.length > 1 ? h : '0' + h
    var m = dt.getMinutes() + '';
    m = m.length > 1 ? m : '0' + m
    return h + ':' + m
  }

  function uniq(a) {
    var prims = {
      "boolean": {},
      "number": {},
      "string": {}
    },
      objs = [];

    return a.filter(function (item) {
      var type = typeof item;
      if (type in prims)
        return prims[type].hasOwnProperty(item) ? false : (prims[type][item] = true);
      else
        return objs.indexOf(item) >= 0 ? false : objs.push(item);
    });
  }

  var decodeHtmlEntity = function (str) {
    return str.replace(/&#(\d+);/g, function (match, dec) {
      return String.fromCharCode(dec);
    });
  };

  function getScrollPos() {
    const el = document.getElementById("trollbox_scroll");
    const scrollTop = el.scrollTop + el.clientHeight;
    const documentHeight = el.scrollHeight;
    const scrollPercent = parseInt((scrollTop / documentHeight) * 100);
    return scrollPercent;
  }

  function scrollDown() {
    if (scroll) {
      setTimeout(function () {
        trollbox_scroll.scrollTop = trollbox_scroll.scrollHeight;
      }, 2)
    }
  }

  function printMsg(data) {
    if (!data || typeof data.msg !== 'string' || data.msg.trim() == '') return;
    if (data.nick == undefined) { return };
    if (data.nick == null) { return };
    if (data.home == undefined || data.home == null || !data.home) { return; };
    for (var i = 0; i < blocked.length; i++) { if (data.home == blocked[i]) { return } };
    if (typeof data.nick != "string") { return };
    // var cmd = getCmd(data.msg);
    var div = document.createElement('div');
    data.nick = data.nick || '●';
    if (data.nick == '●') { pseudo == '●' };
    div.className = 'trollbox_line ui_group';
    div.innerHTML = '<span class="trollbox_h">' + h(data.date) + '</span>'
      + (printNick(data))
      + '<span class="trollbox_msg">' + data.msg + '</span>';
    let letsScroll = getScrollPos() >= 90;
    trollbox_scroll.appendChild(div);
    if (letsScroll) { scrollDown(); };
  }

  function printNick(data) {
    if (data.nick == undefined) { data.nick = '●' };
    if (data.color == undefined) { data.color = 'white' };
    if (data.style == undefined) { data.style = '' };
    if (decodeHtmlEntity(data.nick) == "") { data.nick = '●' };
    if (typeof data.nick != "string") { return };
    let str = "";
    if (data.home) {
      for (var i = 0; i < blocked.length; i++) {
        if (data.home == blocked[i]) {
          str = "<span style='float: left;margin-right: 4px;margin-top: 1px;'>❌</span>";
        };
      };
    };
    var name = "";
    var test = (/image/).test(data.style);

    if (test) {
      name = str + '<span class="trollbox_nick" style="color:white;">❌' + data.nick + '</span>';
      if (data.nick == pseudo) {
        name = str + '<span class="trollbox_nick" style="color:' + data.color.split(";")[0] + ';">' + data.nick + '</span>';
      };
    } else {
      name = str + '<span class="trollbox_nick" style="color:' + data.color.split(";")[0] + ';">' + data.nick + '</span>';
    }
    return name;
  }

  function printRoom(data) {
    if (!data || !Array.isArray(data[1])) return;
    const currentRoom = data[0];
    const roomInfos = data[1];
    var div = document.createElement('div');
    div.className = 'trollbox_line ui_group';
    let html = '';
    html += '<span class="trollbox_h">' + h(new Date()) + '</span>';
    html += '<span class="trollbox_nick">~</span>';
    html += '<span class="trollbox_msg">';
    html += 'Your current room is: <b>' + printRoomName(currentRoom) + '</b>.<br>';
    html += 'Online Rooms:';
    for (const room of roomInfos) {
      html += '<br> – ' + printRoomName(room.name) +
        ' (' + room.users.length + '):';
      for (const user of room.users) {
        html += '<br>&nbsp;&nbsp;&nbsp;&nbsp;' + printNick(user);
      }
    }
    html += '</span>';
    div.innerHTML = html;
    let letsScroll = getScrollPos() >= 90;
    trollbox_scroll.appendChild(div);
    if (letsScroll) scrollDown();
  }

  function printRoomName(name) {
    if (name == undefined) { name = '●' };
    if (typeof name !== "string") { return };
    if (decodeHtmlEntity(name) == "") { name = '●' };
    return '<span class="trollbox_nick">' + name + '</span>';
  }

  async function getPseudo() {
    pseudo = await prompt('nickname ?');
    if (!pseudo) { pseudo = "anonymous"; }
    setPseudo(pseudo);
  }

  trollbox_nick_btn.onclick = getPseudo;

  function setPseudo(txt) {
    pseudo = txt;
    trollbox_nick_btn.textContent = pseudo;
    localStorage['trollbox/nick'] = pseudo;
    socket.emit('user joined', pseudo, color, style, pass);
  }

  function send(e) {
    e.preventDefault();
    if (pseudo == 'undefined') {
      setPseudo("anonymous")
    };
    if (pseudo == null) {
      setPseudo("anonymous")
    };
    sendMsg(trollbox_input.value);
    trollbox_input.value = '';
    scrollDown();
    return false;
  }

  trollbox_input.onkeydown = function (e) {
    if (e.keyCode === 13 && !e.shiftKey) send(e)
  };
  trollbox_form.onsubmit = send

  function getCmd(txt) {
    var m = txt.match(/^\/([a-z]+) (.*)/)
    if (m) return {
      cmd: m[1],
      val: m[2]
    }
  }

  function sendMsg(msg) {

    if (typeof msg !== 'string') return;
    if (color == undefined) { color = 'white' };
    if (style == undefined) { style = '' };

    var cmd = getCmd(msg);

    if (typeof msg === 'string') {
      /*
      if (msg.startsWith('/sin')) {
        sin = true;
        $store.set('.config/trollbox/sin', sin);
      }
      */
      if (cmd) {

        if (cmd.cmd === 'color') {
          color = cmd.val;
          localStorage['trollbox/color'] = color;
          socket.emit('user joined', pseudo, color, style, pass);
          return;
        }

        if (cmd.cmd === 'ascii') {
          asciiArt(cmd.val.trim());
          return;
        }

        if (cmd.cmd === 'lorem') {
          var numb = cmd.val.trim();
          numb = numb.substring(numb.indexOf("\n") + 1);
          lorem(numb);
          return;
        }

      }

      if (msg.startsWith('/block ')) {
        let user = msg.slice(7).trim();
        for (var key in users) {
          for (var i = 0; i < users[key].length; i++) {
            if (key == user) {
              blocked.push(key);
            };
          };
        }
        blocked = uniq(blocked);
        localStorage['trollbox/blocked'] = JSON.stringify(blocked);
        let userMsg = 'User is now blocked.';
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: userMsg
        };
        printMsg(dada);
        updateUsers(userData);
        return;
      }

      if (msg.startsWith('/unblock ')) {
        let user = msg.slice(9).trim();
        for (var key in users) {
          for (var i = 0; i < users[key].length; i++) {
            if (key == user) {
              blocked.splice(blocked.indexOf(key), 1);
            };
          };
        }
        blocked = uniq(blocked);
        localStorage['trollbox/blocked'] = JSON.stringify(blocked);
        let userMsg = 'User is now unblocked';
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: userMsg
        };
        printMsg(dada);
        updateUsers(userData);
        return;
      }

      if (msg.trim() == '/help' || msg.trim() == '/h') {
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: helpMsg
        };
        printMsg(dada);
        return;
      }

      if (msg.trim() == '/speech' || msg.trim() == '/s') {
        speaking = !speaking;
        if (tts === undefined) {
          import("/c/libs/espeakng/1.49/Speak.js")
            .then(async ({ Speak }) => {
              const speak = new Speak()
              await speak.getVoices()
              tts = speak
            })
        }
        if (speaking === false) { tts.stopAllPushers(); }
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: 'Speech: ' + speaking
        };
        printMsg(dada);
        return;
      }

      if (msg.trim() == '/who' || msg.trim() == '/w') {
        let msg = 'Your Home is: ' + userData[socket.id].home;
        msg = msg + '\nOnline Users:\n';
        let tempList = {};
        for (let key in userData) {
          const user = userData[key];
          if (!tempList[user.home]) {
            tempList[user.home] = [user];
          } else {
            tempList[user.home].push(user);
          }
        }
        for (let home in tempList) {
          const uniqueUsers = [];
          const seen = new Set();
          for (const user of tempList[home]) {
            if (!seen.has(user.nick)) {
              seen.add(user.nick);
              uniqueUsers.push(user);
            }
          }
          const formattedNicks = uniqueUsers.map(u => printNick(u)).join(', ') + '.';
          msg += ` – ${home}: ${formattedNicks}\n`;
        }
        const dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: msg
        };
        printMsg(dada);
        return;
      }

      if (msg.trim() == '/url') {
        autoLinker = !autoLinker;
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: 'URL AutoLink: ' + autoLinker
        };
        printMsg(dada);
        return;
      }

      if (msg.trim() == '/img') {
        imgOn = !imgOn;
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: 'Image Embedding: ' + imgOn
        };
        printMsg(dada);
        return;
      }

      if (msg == '/scroll') {
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: 'Auto Scroll: ' + !scroll
        };
        scrollDown()
        scroll = !scroll;
        printMsg(dada);
        return;
      }

      if (msg === '/clear') {
        trollbox_scroll.innerHTML = '';
        return;
      }

      if (msg.trim() == '/block') {
        let userMsg = 'Banned Homes:\n';
        for (let i = 0; i < blocked.length; i++) {
          userMsg = userMsg + blocked[i] + "\n"
        }
        if (blocked.length == 0) { userMsg = 'Banned Homes: none' }
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: userMsg
        };
        printMsg(dada);
        updateUsers(userData);
        return;
      }

      if (msg.trim() == '/unblock') {
        blocked = [];
        localStorage['trollbox/blocked'] = JSON.stringify(blocked);
        let userMsg = 'Block list cleared.';
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: userMsg
        };
        printMsg(dada);
        return;
      }

      if (msg.trim() == '/unblock') {
        blocked = [];
        localStorage['trollbox/blocked'] = JSON.stringify(blocked);
        let userMsg = 'Block list cleared.';
        let dada = {
          date: Date.now(),
          nick: "~",
          color: "white",
          style: "opacity: 0.7;",
          home: 'local',
          msg: userMsg
        };
        printMsg(dada);
        updateUsers(userData);
        return;
      }
      if (msg.length > 10000) msg = msg.slice(0, 10000);
      if (msg.trim() !== '') socket.emit('message', msg);
    }
  }

  function autoLink(text) {
    const urlRegex = /(\bhttps?:\/\/[^\s<>]+[^\s.,:;"')\]\s<>])/gi;
    return text.replace(/(<[^>]+>)|([^<]+)/g, (match, tag, normalText) => {
      if (tag) return tag;
      return normalText.replace(urlRegex, (url) => {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
      });
    });
  }

  function autoImage(text) {
    const urlRegex = /(?<=^|\s)(https?:\/\/[^\s<>"']+\.(gif|jpe?g|tiff?|png|webp)([^\s<>"']*)?)(?=\s|$)/gi;
    return text.replace(urlRegex, (url) => {
      if (url.match(/\.(php|asp|aspx|jsp|cgi)([?#].*)?$/i)) return '';
      const safeUrl = he.encode(url);
      return `<img src="${safeUrl}" style="max-width: 100%; loading="lazy" crossorigin="anonymous">`;
    });
  }

  function asciiArt(url) {
    const container = document.getElementById('cooking');
    if (!container) { return; }
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = url;
    img.onload = function () {
      const reduce = 10;
      const originalWidth = img.naturalWidth;
      const originalHeight = img.naturalHeight;
      const asciiWidth = Math.round(originalWidth / reduce);
      const asciiHeight = Math.round(originalHeight / reduce / 2);
      aalib.read.image.fromHTMLImage(img)
        .map(aalib.filter.inverse())
        .map(aalib.aa({
          width: asciiWidth,
          height: asciiHeight,
          colored: false
        }))
        .map(aalib.render.html({
          background: "#000",
          fontFamily: "Tomo, monospace",
          fontSize: "8px",
          lineHeight: "8px"
        }))
        .do(function (el) {
          socket.emit('message', el.innerText);
          scrollDown();
        })
        .subscribe();
    };
    img.onerror = function () {
      let dada = {
        date: Date.now(),
        nick: "~",
        color: "white",
        style: "opacity: 0.7;",
        home: 'local',
        msg: 'Invalid Image URL.'
      };
      printMsg(dada);
    };
  }

  const socket = io('https://v2.windows93.net:' + port);

  socket.on('connect', () => {
    let dada = {
      date: Date.now(),
      nick: "~",
      color: "white",
      style: "opacity: 0.7;",
      home: 'local',
      msg: 'Welcome to teh Trollbox :)\nType /help for a list of commands.'
    };
    printMsg(dada);
    socket.emit('user joined', pseudo, color, style, pass);
  });

  function hashSeed(seed) {
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
      hash = seed.charCodeAt(i) + ((hash << 5) - hash);
      hash = hash & hash;
    }
    return hash >>> 0;
  }

  function randomFromSeed(seed, min = 0, max = 1) {
    const hash = hashSeed(seed);
    const x = Math.sin(hash) * 10000;
    const frac = x - Math.floor(x);
    return min + frac * (max - min);
  }

  socket.on('message', (msg) => {
    if (imgOn) { msg.msg = autoImage(msg.msg); }
    if (autoLinker) { msg.msg = autoLink(msg.msg); }
    printMsg(msg);
    if (speaking && tts) {
      tts.speak(msg.msg, {
        amplitude: 100,
        pitch: Math.floor(randomFromSeed(msg.nick + "_pitch", 0, 100)),
        speed: Math.floor(randomFromSeed(msg.nick + "_speed", 80, 170)),
        wordGap: Math.floor(randomFromSeed(msg.nick + "_gap", 10, 100)),
        voice: tts.voices[Math.floor(randomFromSeed(msg.nick + "_voice", 0, tts.voices.length - 1))][1],
        home: msg.home
      });
    }
  });

  socket.on('user change room', (data) => {
    console.log(data)
    printMsg({ date: data[0].date, color: '#af519b', nick: '~', home: data[0].home, msg: printNick(data[0]) + ' <em>has entered room</em> ' + printRoomName(data[1]) });
  });

  socket.on('room info', (data) => {
    printRoom(data);
  });


  socket.on('user joined', function (data) {
    if (data.nick) { } else {
      return
    }
    if (typeof data.nick === 'undefined' || data.nick === null || data.nick == undefined) {
      data.nick = "anonymous"
    }
    if (data.nick == undefined) {
      data.nick = "anonymous"
    };
    if (typeof data.nick != "string") {
      return
    };
    for (var i = 0; i < blocked.length; i++) {
      if (data.home == blocked[i]) {
        return
      }
    };
    if (data.nick) printMsg({
      date: Date.now(),
      color: '#0f0',
      nick: '→',
      home: data.home,
      msg: printNick(data) + ' <em>has entered teh trollbox</em>'
    });
  });

  socket.on('user left', function (data) {
    for (var i = 0; i < blocked.length; i++) {
      if (data.home == blocked[i]) {
        return
      }
    };
    if (data.nick) printMsg({
      date: Date.now(),
      color: '#f00',
      nick: '←',
      home: data.home,
      msg: printNick(data) + ' <em>has left teh trollbox</em>'
    });
    scrollDown();
  });

  socket.on('user change nick', function (data) {
    if (data[0].nick == data[1].nick) { return };
    for (var i = 0; i < blocked.length; i++) { if (data[1].home == blocked[i]) { return } };
    if (data[1].nick) printMsg({ date: Date.now(), color: '#af519b', nick: '~', home: data[1].home, msg: printNick(data[0]) + ' <em>is now known as</em> ' + printNick(data[1]) });
  });

  function updateUsers(data) {
    users = [];
    for (let key in data) {
      if (!users[data[key].home]) {
        users[data[key].home] = [he.decode(data[key].nick)];
      } else {
        users[data[key].home].push(he.decode(data[key].nick));
      }
    }
    const trollboxInfos = document.getElementById("trollbox_infos");
    trollboxInfos.innerHTML = '';
    const frag = document.createDocumentFragment();
    for (let key in data) {
      if (data.hasOwnProperty(key)) {
        const div = document.createElement('div');
        div.innerHTML = printNick(data[key]);
        let home = document.createElement('span');
        home.classList.add('trollbox_infos_homes');
        home.innerHTML = data[key].home;
        div.appendChild(home)
        frag.appendChild(div);
      }
    }
    trollboxInfos.appendChild(frag);
    const userDivs = trollboxInfos.querySelectorAll("div");
    if (userDivs.length > 0) {
      const firstSpan = userDivs[0].querySelector("span");
      if (firstSpan) {
        const crown = document.createElement("span");
        crown.textContent = "👑 ";
        crown.style.float = "left";
        crown.style.marginRight = "4px";
        firstSpan.parentNode.insertBefore(crown, firstSpan);
      }
    }
    userDivs.forEach(div => {
      div.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        const spans = div.querySelectorAll("span");
        const username = spans[spans.length - 1].textContent;
        sendMsg("/block " + username);
      });
      div.addEventListener("click", (e) => {
        e.preventDefault();
        const spans = div.querySelectorAll("span");
        const username = spans[spans.length - 1].textContent;
        sendMsg("/unblock " + username);
      });
    });
  }

  let userData;

  socket.on('update users', function (data) {
    userData = data;
    updateUsers(userData);

  });
