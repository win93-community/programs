<script>
    // récupérer params URL
    function getParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name) || '';
    }

    let title = getParam("site") || "DEFAULT_TITLE";
    let lang = getParam("lang") || "en";

    title = title.toUpperCase();

    // chaldean numerology arrays
    const ar = { A: 1, B: 2, C: 3, D: 4, E: 5, F: 6, G: 7, H: 8, I: 9, J: 1, K: 2, L: 3, M: 4, N: 5, O: 6, P: 7, Q: 8, R: 9, S: 1, T: 2, U: 3, V: 4, W: 5, X: 6, Y: 7, Z: 8 };
    const ar2 = { A: 1, E: 5, I: 9, O: 6, U: 3 };
    const ar3 = { B: 2, C: 3, D: 4, F: 6, G: 7, H: 8, J: 1, K: 2, L: 3, M: 4, N: 5, P: 7, Q: 8, R: 9, S: 1, T: 2, V: 4, W: 5, X: 6, Y: 7, Z: 8 };

    // calcul des numeros
    function calcNumero(str, map) {
        let n = 0;
        for (let i = 0; i < str.length; i++) {
            const c = str[i];
            if (map[c]) n += map[c];
        }
        n = n % 9;
        if (n === 0) n = 9;
        return n;
    }

    const numero1 = calcNumero(title, ar);
    const numero2 = calcNumero(title, ar2);
    const numero3 = calcNumero(title, ar3);

    // term & first arrays
    const term = [".net", ".com", ".pizza", ".ninja", ".onion", ".win", ".fail", ".lulz", ".bait"];
    const first = ["http://", "https://", "www."];

    // fonction pour fetch thumbnail
    async function fetchThumbnail(title, lang) {
        const url = `https://${lang}.wikipedia.org/w/api.php?action=query&titles=${title}&prop=pageimages&format=json&pithumbsize=500&origin=*`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const pages = data.query.pages;
            const key = Object.keys(pages)[0];
            if (pages[key].thumbnail) {
                return {
                    src: pages[key].thumbnail.source,
                    width: pages[key].thumbnail.width,
                    height: pages[key].thumbnail.height
                };
            }
        } catch (e) {
            console.log("fetch thumbnail error", e);
        }
        return { src: 'img/parked.jpeg', width: 572, height: 380 };
    }


    (async function () {
        const thumb = await fetchThumbnail(title, lang);

        const cleanTitle = title.toLowerCase().replace("_", "-").replace(",", "");
        const finalTitle = first[numero3 % 3] + cleanTitle + term[numero3 - 1];
        const description = "WELCOME TO THE INTERWEB";

        document.title = finalTitle;
        document.getElementById("page-title").textContent = finalTitle;

        document.getElementById("og-title").content = finalTitle.toUpperCase();
        document.getElementById("tw-title").content = finalTitle.toUpperCase();
        document.getElementById("og-image").content = thumb.src;
        document.getElementById("tw-image").content = thumb.src;
        document.getElementById("og-width").content = thumb.width;
        document.getElementById("og-height").content = thumb.height;
        document.getElementById("og-desc").content = description;
        document.getElementById("tw-desc").content = description;
    })();

</script>

                        let zoom = 1 + ((myType[0] * 7 + myType[1] * 5 + myType[2] * 3) % 30) / 10; // zoom entre 1.0 et 4.0
                        $('.clip img').css('transform', `scale(${zoom})`);
                    }

                    if ((myType[0] + myType[1] + myType[2]) == 6) {
                        $('h1').css({ 'font-size': '150px' });
                        $('h1, h2, p').css('text-shadow', '-3px 0 0 rgba(255,0,0,0.9), 3px 0 0 rgba(0,255,255,0.9)');
                        $('img').css({ 'filter': 'drop-shadow(-4px 0 0 rgba(255,0,0,0.9)) drop-shadow(4px 0 0 rgba(0,255,255,0.9))', 'transform': 'scale(1.5)' });
                    }

                    // video 
                    var rot = (((myType[0] * 3 + myType[1] * 5 + myType[2] * 7) % 7) - 3);
                    $('video').css('transform', 'rotate(' + rot + 'deg)');

                    $('h1, h2, h3, h4, h5, h6, figcaption').css({ 'position': 'relative', 'z-index': 1000 });


                    if (myType[0] >= 6 && myType[1] >= 6 && myType[2] <= 6) {
                        let seed = myType[0] * 81 + myType[1] * 17 + myType[2] * 31;
                        let pourcentage = 10 + (seed % 91);
                        let left = (100 - pourcentage) / 2;
                        $('div.clip img').css({
                            position: 'absolute',
                            left: left + '%',
                            width: pourcentage + '%'
                        });
                        $('span.clip img').css({
                            position: 'relative',
                            left: left + '%',
                            width: pourcentage + '%'
                        });

                    }


                    if (myType[0] <= 4 && myType[1] <= 4 && myType[2] <= 4) {
                        $('img').each(function (index) {
                            let seed = myType[0] * 81 + myType[1] * 17 + myType[2] * 31 + index * 19,
                                angle = -30 + seed % 61,
                                tx = -20 + seed % 41,
                                ty = -20 + (seed * 5 % 41),
                                width = 20 + seed % 51,  // taille plus petite
                                hue = seed * 7 % 360;
                            //contrast = 80 + seed % 41;

                            $(this).css({
                                //width: width + '%',
                                transform: `rotate(${angle}deg) translate(${tx}px,${ty}px)`,
                                filter: `hue-rotate(${hue}deg)`
                            });
                        });
                    }

                    if (myType[0] >= 6 && myType[1] >= 6 && myType[2] >= 6) {
                        $('#article a').each(function (index) {
                            let seed = myType[0] * 81 + myType[1] * 17 + myType[2] * 31 + index * 13;
                            let angle = -2 + (seed % 5);
                            let bodySize = parseFloat($('body').css('font-size'));
                            let fontSize = bodySize * (1 + ((seed % 11) / 100));
                            $(this).css({
                                'display': 'inline-block',
                                'transform': `rotate(${angle}deg)`,
                                'font-size': fontSize + 'px',
                            });
                        });
                    }

                    if (myType[0] == 1 || myType[1] == 1 || myType[2] == 1) {
                        seed = myType[0] * 81 + myType[1] * 17 + myType[2] * 31;
                        spacing = 0.2 + (seed % 81) / 100;  // 0.2 → 1.01
                        $('body').css('letter-spacing', spacing + 'em');
                    }

                    window.addEventListener("load", addBevel);
                    window.addEventListener("load", addSphere);
                    window.addEventListener("load", addCorners);


                }

            });
