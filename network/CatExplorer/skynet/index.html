					exintro: true,
					piprop: 'thumbnail',
					pilimit: 'max',
					pithumbsize: 300
				},
				success: function (json) {
					articles.empty();
					images.empty();
					var pages = json.query?.pages || {};
					$.map(pages, function (page) {
						var pageElement = $('<div>');
						var imageElement = $('<div>');
						history.replaceState({}, null, './?q=' + encodeURIComponent($('#isearch').val()) + '&lang=' + lang);
						pageElement.append($('<h2>').append($('<a>').attr('href', './www.html?site=' + encodeURIComponent(page.title) + '&lang=' + lang).text(page.title)));

						tmp = page.title.toLowerCase();
						newchar = '-';
						tmp = tmp.split(' ').join(newchar);
						magicName(tmp);
						first = ["http://", "https://", "www."];
						term = [".net", ".com", ".pizza", ".ninja", ".onion", ".win", ".fail", ".lulz", ".bait"];
						tmp = first[(myType[2] % 3)] + tmp + term[myType[2] - 1];
						pageElement.append($('<a>').attr('href', './www.html?site=' + page.title + '&lang=' + lang).text(tmp));

						if (page.thumbnail) imageElement.append(
							$('<a>').attr('href', './www.html?site=' + page.title + '&lang=' + lang)
								.append($('<img>').attr('width', 150).attr('src', page.thumbnail.source).attr('crossorigin', 'anonymous').attr('loading', 'lazy'))
						);

						pageElement.append($('<p>').text(page.extract));

						articles.append(pageElement);
						images.append(imageElement);
						$('.articles div').show('fast');
					});
				}
			});
		};



		if (q) {
			$('#isearch').val(decodeURIComponent(q));
			toSearch = decodeURIComponent(q);
			others(toSearch);
			ajaxArticleData();
			if (v == 0) {
				$("#f").toggleClass("f2");
				v = 1;
			}
		}

		document.getElementById('isearch').onkeydown = function (e) {
			if (e.keyCode == 13) {
				articles.empty();
				images.empty();
				toSearch = input.val();
				others(toSearch);
				$('.ui-autocomplete').hide();
				ajaxArticleData();
				if (v == 0) {
					$("#f").toggleClass("f2");
					$('.ui-autocomplete').hide();
					v = 1;
				}
			}
		};

		button.click(function () {
			articles.empty();
			images.empty();
			toSearch = input.val();
			others(toSearch);
			$('.ui-autocomplete').hide();
			ajaxArticleData();
			if (v == 0) {
				$("#f").toggleClass("f2");
				v = 1;
				$('.ui-autocomplete').hide();
			}
		});

		$('#select').on('change', function () {
			lang = this.value;
			toSearch = $('#isearch').val().trim();
			const url = new URL(window.location.href);
			url.searchParams.set('lang', lang);
			if (toSearch) url.searchParams.set('q', toSearch);
			else url.searchParams.delete('q');
			history.replaceState({}, null, url.toString());

			if (toSearch) {
				ajaxArticleData();
			}
		});
	</script>





</body>
