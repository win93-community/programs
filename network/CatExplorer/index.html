<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/42/core.js"></script>
  <style>
    .bb {
      height: 40px;
    }

    .np {
      padding: 0px;
    }

    .pl {
      padding-left: 4px;
    }

    .pb {
      padding-bottom: 2px;
    }

    .ltl {
      height: 40px;
      width: 40px;
      margin-bottom: 2px;
      background-image: url('./img/notscape.gif');
      background-repeat: no-repeat;
      background-position: center;
    }

    #inputUrl {
      margin-right: 2px;
    }
  </style>
</head>

<body>
  <div class="fit rows">

    <div class="shrink cols">
      <button class="bb rows shrink">
        <div>
          <ui-picto value="backward"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
              aria-hidden="true">
              <use href="#picto-backward"></use>
            </svg></ui-picto>
        </div>
        <div>Back</div>
      </button>
      <button class="bb rows shrink">
        <div>
          <ui-picto value="forward"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
              aria-hidden="true">
              <use href="#picto-forward"></use>
            </svg></ui-picto>
        </div>
        <div>Forward</div>
      </button>
      <button class="bb rows shrink">
        <div>
          <ui-picto value="home"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
              aria-hidden="true">
              <use href="#picto-home"></use>
            </svg></ui-picto>
        </div>
        <div>Home</div>
      </button>
      <button class="bb rows shrink">
        <div>
          <ui-picto value="loop-old"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
              aria-hidden="true">
              <use href="#picto-loop-old"></use>
            </svg></ui-picto>
        </div>
        <div>Reload</div>
      </button>
      <button class="bb rows shrink">
        <div>
          <ui-picto value="printer"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
              aria-hidden="true">
              <use href="#picto-printer"></use>
            </svg></ui-picto>
        </div>
        <div>Print</div>
      </button>

      <div></div>

      <div class="inset shrink screen ltl"></div>
    </div>

    <div class="shrink cols pb">
      <label class="pl" for="inputUrl">Location</label>
      <input id="inputUrl" type="url" placeholder="https://windows93.net" autocomplete="off">
      <button>
        <ui-picto value="magnifier"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
            aria-hidden="true">
            <use href="#picto-magnifier"></use>
          </svg></ui-picto>
      </button>
    </div>

    <iframe src="./skynet/index.html?lang=en" credentialless frameborder="0" class="inset panel"></iframe>

  </div>

  <script>
    const iframe = document.querySelector('iframe');
    const backBtn = document.querySelectorAll('.bb')[0];
    const forwardBtn = document.querySelectorAll('.bb')[1];
    const homeBtn = document.querySelectorAll('.bb')[2];
    const reloadBtn = document.querySelectorAll('.bb')[3];
    const printBtn = document.querySelectorAll('.bb')[4];
    const urlInput = document.getElementById('inputUrl');
    const goBtn = urlInput.nextElementSibling;

    let historyStack = [];
    let historyIndex = -1;

    const whitelistDomains = [
      "windows93.net",
      "pierrepapierciseaux.net",
      "localhost",
    ];

    function getDomain(url) {
      try {
        const u = new URL(url);
        return u.hostname.toLowerCase();
      } catch {
        return null;
      }
    }

    function isTrusted(url) {
      const domain = getDomain(url);
      if (!domain) return false;
      return whitelistDomains.some(allowed => {
        return domain === allowed || domain.endsWith("." + allowed);
      });
    }

    function loadIframe(url, addToHistory = true) {
      const absoluteUrl = new URL(url, window.location.href).href;
      /*
      if (isTrusted(absoluteUrl)) {
        iframe.removeAttribute("sandbox");
      } else {
        iframe.setAttribute("sandbox", "allow-scripts");
      }
      */
      iframe.src = absoluteUrl;
      urlInput.value = absoluteUrl;
      if (addToHistory) {
        const lastUrl = historyStack[historyIndex];
        if (lastUrl !== absoluteUrl) {
          historyStack = historyStack.slice(0, historyIndex + 1);
          historyStack.push(absoluteUrl);
          historyIndex++;
        }
      }
      updateButtons();
    }

    function updateButtons() {
      backBtn.disabled = historyIndex <= 0;
      forwardBtn.disabled = historyIndex >= historyStack.length - 1;
    }

    backBtn.addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        loadIframe(historyStack[historyIndex], false);
      }
    });

    forwardBtn.addEventListener('click', () => {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        loadIframe(historyStack[historyIndex], false);
      }
    });

    homeBtn.addEventListener('click', () => {
      loadIframe('./skynet/index.html?lang=en');
    });

    reloadBtn.addEventListener('click', () => {
      iframe.contentWindow.location.reload();
    });

    printBtn.addEventListener('click', () => {
      iframe.contentWindow.print();
    });

    function handleNavigation(input) {
      const value = input.trim();
      if (!value) return;
      if (/^https?:\/\//i.test(value)) {
        loadIframe(value);
        return;
      }
      if (/^[\w.-]+\.[a-z]{2,}$/i.test(value)) {
        loadIframe('https://' + value);
        return;
      }
      const encodedQuery = encodeURIComponent(value);
      const basePath = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '');
      const searchUrl = `${basePath}skynet/index.html?q=${encodedQuery}&lang=en`;
      loadIframe(searchUrl);
    }


    goBtn.addEventListener('click', () => {
      handleNavigation(urlInput.value);
    });

    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        handleNavigation(urlInput.value);
      }
    });

    iframe.addEventListener('load', () => {
      try {
        const currentUrl = iframe.contentWindow.location.href;
        if (historyStack[historyIndex] !== currentUrl) {
          historyStack = historyStack.slice(0, historyIndex + 1);
          historyStack.push(currentUrl);
          historyIndex++;
        }
        urlInput.value = currentUrl;
        updateButtons();
      } catch (e) {
        console.warn('Can\'t read iframe.', e);
      }
    });

    loadIframe('./skynet/index.html?lang=en');
  </script>

</body>

</html>
