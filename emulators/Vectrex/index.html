<link rel="stylesheet" href="./css/style.css" />

<script src="js/utils.js"></script>
<script src="js/globals.js"></script>
<script src="js/fastromdata.js"></script>
<script src="js/e6809.js"></script>
<script src="js/e8910.js"></script>
<script src="js/osint.js"></script>
<script src="js/vector_t.js"></script>

<script src="/c/users/windows93/roms/Vectrex/minestorm.js"></script>

<script>
  const overlaySound = new Audio("sound/overlay.wav")

  const roms = [
    [
      "Commercial",
      [
        ["Armor Attack", "armor", "armor", "armor"],
        ["Bedlam", "bedlam", "bedlam", "bedlam"],
        ["Berzerk", "berzerk-debugged", "berzerk", "berzerk"],
        ["Blitz", "blitz", "blitz", "blitz"],
        /* [ "Clean Sweep", "sweep", "sweep", "none" ], */
        ["Cosmic Chasm", "chasm", "chasm", "chasm"],
        ["Fortress of Narzod", "narzod", "narzod", "narzod"],
        ["Heads Up", "headsup", "headsup", "headsup"],
        /* [ "Hyper Chase", "hyper", "hyper", "none" ], */
        ["Mine Storm", "minestorm", "minestorm", "minestorm"],
        ["Mine Storm 2", "mstorm2", "minestorm", "minestorm"],
        ["Polar Rescue", "polar", "polar", "polar"],
        ["Pole Position", "pole", "pole", "pole"],
        ["Ripoff", "ripoff", "ripoff", "ripoff"],
        ["Scramble", "scramble", "scramble", "scramble"],
        ["Solar Quest", "solar", "solar", "solar"],
        ["Space Wars", "space", "space", "space"],
        ["Spike", "spike", "spike", "spike"],
        ["Spinball", "spinball", "spinball", "spinball"],
        ["Star Castle", "castle", "castle", "castle"],
        ["Star Hawk", "starhawk", "starhawk", "starhawk"],
        ["Star Trek", "startrek", "startrek", "startrek"],
        ["Web Wars", "webwars", "webwars", "webwars"],
      ],
    ],
    [
      "Unreleased and Prototypes",
      [
        ["Dark Tower", "dktower", "dktower", "none"],
        /* [ "Mail Plane", "MailPlane", "none", "none" ], */
        /* [ "Pitcher\'s Duel", "Pitchers", "none", "none" ], */
        ["Tour de France", "tdf", "none", "none"],
      ],
    ],
    [
      "Homebrew",
      [
        ["All Good Things", "agt", "none", "none"],
        ["Asteroid Cowboy", "asteroid_cowboy", "none", "asteroid_cowboy"],
        ["Birds of Prey", "birds-of-prey", "none", "none"],
        ["Gravitrex plus", "gravplus", "none", "none"],
        /* [ "Moonlander", "moon", "none", "none" ], */
        ["Nebula Commander", "nebula", "none", "none"],
        /* [ "Omega Chase", "Omega16k", "none", "none" ] */
        ["Patriots", "patriot", "none", "none"],
        ["Patriots III", "patriots-iii", "none", "none"],
        ["Revector", "revector", "none", "none"],
        ["Rockaroids Remix", "rocks", "none", "none"],
        ["Space Frenzy", "sfpd", "none", "none"],
        ["Spike Hoppin'", "spikehop", "none", "none"],
        /* [ "Spike\'s Water Balloons", "spikewater", "none", "none" ], */
        ["Thrust", "thrust", "thrust", "thrust"],
        ["Tsunami", "tsu", "none", "none"],
        ["Vecmania 1", "vecmania1", "none", "none"],
        ["Vecmania 2", "vecmania2", "none", "none"],
        ["Vectrex Frogger", "frogger", "none", "none"],
        /* [ "Vectrexians", "vectrexians", "none", "vectrexians" ], */
        ["Vix", "vix", "none", "none"],
        ["War of the Robots", "wotr", "none", "none"],
      ],
    ],
  ]

  const vecx = new VecX()
  const romsSelect = []
  const OVERLAY_FADE = 500

  // const resumeButtonImage = new Image()
  // resumeButtonImage.src = "images/resumebutton.png"

  // const pauseButtonImage = new Image()
  // pauseButtonImage.src = "images/pausebutton.png"

  // const soundButtonImage = new Image()
  // soundButtonImage.src = "images/soundbutton.png"

  // const soundOffButtonImage = new Image()
  // soundOffButtonImage.src = "images/soundoffbutton.png"

  function overlayFade(isOut) {
    const overlay = $("#overlay")
    if (isOut) {
      overlay.fadeOut(OVERLAY_FADE)
    } else {
      overlay.fadeIn(OVERLAY_FADE)
    }

    return false
  }

  function setPauseImage(showPause) {
    const pauseImage = $("#pauseImage")
    if (showPause) {
      $("#pauseButton ui-picto").attr("value", "pause")
    } else {
      $("#pauseButton ui-picto").attr("value", "play")
    }
  }

  function setSoundImage(showSound) {
    const soundImage = $("#soundImage")
    if (showSound) {
      $("#soundButton ui-picto").attr("value", "volume")
    } else {
      $("#soundButton ui-picto").attr("value", "volume-off")
    }
  }

  function dropHandler(ev) {
    ev.preventDefault()
    let file = null
    if (ev.dataTransfer.items) {
      for (let i = 0; i < ev.dataTransfer.items.length; i++) {
        if (ev.dataTransfer.items[i].kind === "file") {
          file = ev.dataTransfer.items[i].getAsFile()
          break
        }
      }
    } else {
      file = ev.dataTransfer.files[0]
    }

    if (file) {
      if (file.size <= 100 * 1024) {
        /* 100kb max */ const reader = new FileReader()
        reader.readAsBinaryString(file)
        $("#status").text("Processing file...")
        reader.onloadend = function () {
          $("#status").text("Processing completed.")
          Globals.cartdata = reader.result
          $("#roms").val("")
          switchRom([null, null, "none", "none"])
        }
      } else {
        $("#status").text("File too large.")
      }
    }
  }

  function switchRom(rom) {
    // Get the overlay (DIV)
    const overlay = $("#overlay")

    // Get the boxart image
    // var boxartImage = $('#boxartImage');

    // Is the overlay visible?
    const overlayVisible = !overlay.is(":hidden")

    // Fade the old overlay out (if applicable)
    if (overlayVisible) overlayFade(true)

    // Fade the old boxart out
    // boxartImage.fadeOut(OVERLAY_FADE);

    // Stop the emulator
    vecx.stop()

    // Clear the screen
    vecx.osint.osint_clearscreen()

    // Start the emulator
    setTimeout(
      () => {
        // Wait until the new overlay has completed loading
        const imgOverlay = new Image()
        $(imgOverlay)
          .on("load", () => {
            // Fade the new overlay in
            $("#overlayImage").attr("src", imgOverlay.src)
            if (overlayVisible) overlayFade(false)

            /*
            const newBoxart = new Image()

            // Update the boxart
            $(newBoxart)
              .on("load", () => {
                boxartImage.attr("src", newBoxart.src)
                boxartImage.fadeIn(OVERLAY_FADE + 200)
              })
              .attr("src", "images/boxart/" + rom[3] + ".png")
            */

            // Load the script for the new rom
            if (rom[1]) {
              $.getScript("/c/users/windows93/roms/Vectrex/" + rom[1] + ".js", () =>
                // Rom script loaded
                {
                  $("#status").text("Loaded.")
                  vecx.reset()

                  setPauseImage(true)
                },
              )
            } else {
              vecx.reset()
              setPauseImage(true)
            }
          })
          .attr("src", "images/overlays/" + rom[2] + ".png")
      },
      overlayVisible ? OVERLAY_FADE : 0,
    )
  }

  $(document).ready(() => {
    const romsElement = $("#roms")

    $("#status").text("Starting up...")

    $("<option>Select a cartridge...</option>")
      .attr("value", "")
      .appendTo("#roms")
    for (let i = 0; i < roms.length; i++) {
      const category = roms[i]
      const optgroup = $("<optgroup></optgroup>").attr("label", category[0])
      const catroms = category[1]
      for (let j = 0; j < catroms.length; j++) {
        const rom = catroms[j]

        $("<option>" + rom[0] + "</option>")
          .attr("value", romsSelect.length)
          .appendTo(optgroup)

        romsSelect[romsSelect.length] = rom
      }

      romsElement.append(optgroup)
    }

    romsElement.append("<optgroup> </optgroup>")
    romsElement.val("")

    romsElement.change(() => {
      if (romsElement.val() === "") return

      // Remove focus from the roms element
      romsElement.blur()

      // Get the newly selected rom
      const rom = romsSelect[romsElement.val()]

      $("#status").text("Loading " + rom[0] + " ...")

      switchRom(rom)
    })

    document.onkeydown = function (event) {
      vecx.onkeydown(event)
    }

    document.onkeyup = function (event) {
      vecx.onkeyup(event)
    }

    $("#pauseButton").click(() => {
      const pauseImage = $("#pauseImage")
      if (vecx.running) {
        vecx.stop()
        $("#status").text("Paused.")
        setPauseImage(false)
      } else {
        vecx.start()
        $("#status").text("Resumed.")
        setPauseImage(true)
      }
    })

    $("#resetButton").click(() => {
      vecx.reset()
      $("#status").text("Reset.")
      setPauseImage(true)
    })

    $("#overlayButton").click(() => {
      overlaySound.pause()
      overlaySound.currentTime = 0
      overlaySound.volume = 0.5
      overlaySound.play()
      if ($("#overlay").is(":visible")) {
        $("#overlay").slideUp(75)
        $("#overlayButton").attr("aria-pressed", "false")
      } else {
        $("#overlay").slideDown(75)
        $("#overlayButton").attr("aria-pressed", "true")
      }
    })

    $("#soundButton").click(() => {
      if (vecx.toggleSoundEnabled()) {
        $("#status").text("Sound enabled.")
        setSoundImage(true)
      } else {
        $("#status").text("Sound disabled.")
        setSoundImage(false)
      }
    })

    // Drag and drop
    $("body").on("drop dragdrop", (evt) => {
      evt.dataTransfer = evt.originalEvent.dataTransfer
      dropHandler(evt)
      evt.preventDefault()
    })
    $("body").on("dragenter", (event) => {
      event.preventDefault()
      // $(this).css('border','10px dashed red');
    })
    $("body").on("dragleave", () => {
      // $(this).css('background','red');
    })
    $("body").on("dragover", (event) => {
      event.preventDefault()
    })

    vecx.main()
  })
</script>
<script type="module" src="/42/ui/media/picto.js"></script>

<div id="wrapper">
  <div id="interface" class="panel cols gap-sm pa-sm">
    <select id="roms"></select>
    <button title="Play/Pause" id="pauseButton">
      <ui-picto value="pause"></ui-picto>
    </button>
    <button title="Reset" id="resetButton">
      <ui-picto value="arrow-ccw"></ui-picto>
    </button>
    <button title="Mute/Unmute" id="soundButton">
      <ui-picto value="volume"></ui-picto>
    </button>
    <button title="Overlay Show/Hide" id="overlayButton">
      <ui-picto value="image"></ui-picto>
    </button>
    <button title="Controls" id="controlsButton">
      <ui-picto value="joystick"></ui-picto>
    </button>
  </div>

  <div id="vectrex">
    <div id="mask"></div>
    <div id="overlay">
      <img
        id="overlayImage"
        src="images/overlays/minestorm.png"
        width="351"
        height="449" />
    </div>
    <canvas id="screen" width="660" height="820"></canvas>
  </div>
  <footer class="pa-xs ma-t-xs | inset-shallow">
    <div id="status">Loading ...</div>
  </footer>
</div>

        // tag: "strong",

      {
        label: "Vectrex Controls",
        icon: "joystick",
        dialog: { picto: new URL("./icon-16.png", import.meta.url).href },
      },
    )
  }
</script>
