<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Karaoké!</title>

<script src="/42/core.js"></script>
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="./css/style.css" />
<script type="module" src="/42/ui/media/picto.js"></script>
<script type="module" src="/42/ui/control/knob.js"></script>




<div class="rows fit">

  <div id="karaoke-player" class="inset">
    <div id="bg" width="300" height="216"></div>
    <canvas id="karaoke-display" class="wobblex wobbley" width="300" height="216"></canvas>
    <audio id="song" controls="controls">
      <source src="" type="audio/mpeg" />
    </audio>

    <div id="cdg-debug"></div>
  </div>

  <div id="interface" class="cols shrink">
    <div class="cols shrink">
      <button id="importButton">
        <ui-picto value="eject"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
            aria-hidden="true">
            <use href="#picto-eject"></use>
          </svg></ui-picto>
      </button>
      <button onclick="loadSong()" id="play">
        <ui-picto value="play"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
            aria-hidden="true">
            <use href="#picto-play"></use>
          </svg></ui-picto>
      </button>
      <button onclick="stopSong()" id="stop">
        <ui-picto value="stop"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
            aria-hidden="true">
            <use href="#picto-stop"></use>
          </svg></ui-picto>
      </button>
    </div>
    <div></div>
    <div class="cols shrink">
      <label for="playbackRate">
        <ui-picto value="fast"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16"
          aria-hidden="true">
          <use href="#picto-fast"></use>
        </svg></ui-picto>
      </label>
      <input type="checkbox" id="preservesPitch" name="preservesPitch" checked />
      <input type="range" id="playbackRate" name="playbackRate" value="1" min="0.01" max="2" step="0.01"
        oninput="updatePlaybackRate()" />
    </div>
  </div>

</div>

<script src="js/wcdg.js"></script>
<script src="js/index.js"></script>

<script type="module">
  import { App } from "/42/api/os/App.js"

  const app = new App()
  window.app = app

  document.querySelector("#importButton").onclick = () => {
    app.openFile("/c/users/windows93/documents/karaoke/")
  }

  app
    .on("decode", async (fileAgent) => {
      // stopSong();
      song = fileAgent.path.replace(/\.[^./]+$/, "")
      loadSong()
    })
    .on("encode", async () => location.hash)

  app.openFile("/c/users/windows93/documents/karaoke/")
</script>
