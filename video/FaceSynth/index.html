<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceSynth</title>
    <script src="/42/core.js"></script>
    <link rel="stylesheet" href="/style.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        #container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .layers {
            position: absolute;
            transform: scaleX(-1);
            object-fit: contain;
        }

        video {
            /*display: none;*/
            width: 100%;
            max-inline-size: initial !important;
            vertical-align: initial !important;
        }

        canvas {
            max-inline-size: initial !important;
            vertical-align: initial !important;
        }

        #interface {
            top: 2px;
            right: 2px;
            position: absolute;
            z-index: 1000;
            text-align: right;
            min-height: 26px;
        }

        #emotion,
        #shape,
        #synthLfoFrequency,
        #synthLfoGain,
        select {
            width: 72px;
        }

        input[type="color"] {
            width: 22px;
        }

        #hidden{
            display: none;
            padding: 4px;
            margin-top: 3px;
        }
        #presets{
            width: fit-content;
        }
    </style>
</head>

<body>
    <div id="container" class="inset">
        <video id="video" class="layers" autoplay playsinline></video>
    </div>
    <div id="interface" class="panel outset">
        <div class="cols">
            <select id="presets"></select>
            <button title="up-down" id="unfold"><ui-picto value="up-down"></ui-picto></button>
        </div>
        <div id="hidden">
            <div>
                <div>Camera <input type="checkbox" id="camera" checked></div>
            </div>
            <div id="inputs">
                <hr>

                <div>Model <input type="checkbox" id="model" checked> <input type="color" id="modelColor"
                        value="#ffffff">
                </div>
                <div>Wireframe <input type="checkbox" id="wireframe" checked> <input type="color" id="wireColor"
                        value="#000000"></div>
                <div>Points <input type="checkbox" id="points"></div>
                <hr>
                <div>Map <input type="color" id="mapColor" value="#ffffff"><select id="mask"></select></div>
                <div>Orifices <input type="color" id="plainColor"><select id="orifices"></select></div>
                <hr>
                <div>Emotion <input id="emotion" type="text" value="neutral"></div>
                <div>Formant <input id="shape" type="text" value=""></div>
                <hr>
                <div>Voice
                    <select id="pitchType">
                        <option value="robot" selected>robot</option>
                        <option value="man">man</option>
                        <option value="woman">woman</option>
                        <option value="child">child</option>
                        <option value="baby">baby</option>
                    </select>
                </div>
                <div>Type
                    <select name="" id="synthType">
                        <option value="sine">Sine</option>
                        <option value="square">Square</option>
                        <option value="sawtooth" selected>Sawtooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </div>
                <div>
                    Vib <select name="" id="synthLfoType">
                        <option value="sine" selected>Sine</option>
                        <option value="square">Square</option>
                        <option value="sawtooth">Sawtooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </div>

                <div>frequency <input type="number" id="synthLfoFrequency" value="5"></div>
                <div>amplitude <input type="number" id="synthLfoGain" value="3"></div>
            </div>
            <hr>
            <div class="cols">
                <button id="print">Serialize</button>
                <button id="random">Random</button>
            </div>
        </div>
    </div>
    <script src="./js/face_mesh.js"></script>
    <script src="./js/camera_utils.js"></script>
    <script defer src="./js/face-api/face-api.min.js"></script>
    <script type="module" src="./js/script.js"></script>
    <script>

        const presets = {
            'Default': '{"camera":false,"modelColor":"#ffffff","model":true,"wireframe":true,"wireColor":"#0000000","points":false,"mapColor":"#ffffff","mask":"none","plainColor":"#000000","orifices":"orifices","emotion":"neutral","shape":"U","pitchType":"robot","synthType":"sawtooth","synthLfoType":"sine","synthLfoFrequency":"5","synthLfoGain":"3"}',
            'Sumafu': '{"camera":false,"modelColor":"#3c57e8","model":true,"wireframe":false,"wireColor":"#0000000","points":false,"mapColor":"#4ad42e","mask":"b","plainColor":"#f80682","orifices":"mouth","emotion":"neutral","shape":"I","pitchType":"woman","synthType":"sawtooth","synthLfoType":"square","synthLfoFrequency":"1000","synthLfoGain":"1000"}',
            'Ork': '{"camera":false,"modelColor":"#000000","model":true,"wireframe":true,"wireColor":"#0000000","points":false,"mapColor":"#00ff2a","mask":"facepaint","plainColor":"#ff0000","orifices":"orifices","emotion":"neutral","shape":"U","pitchType":"robot","synthType":"square","synthLfoType":"sine","synthLfoFrequency":"4","synthLfoGain":"100"}',
            'Kasio': '{"camera":false,"modelColor":"#ffffff","model":false,"wireframe":false,"wireColor":"#0000000","points":false,"mapColor":"#C3FF00","mask":"smiley","plainColor":"#fd75ff","orifices":"mouth","emotion":"neutral","shape":"U","pitchType":"child","synthType":"square","synthLfoType":"sine","synthLfoFrequency":"5","synthLfoGain":"5"}',
            'Zordon': '{"camera":false,"model":false,"modelColor":"#000000","wireframe":true,"wireColor":"#00ffff","points":false,"mapColor":"#c2feff","mask":"none","plainColor":"#00ffff","orifices":"orifices","emotion":"fearful","shape":"U","pitchType":"man","synthType":"triangle","synthLfoType":"sawtooth","synthLfoFrequency":"10","synthLfoGain":"440"}',
            'Anime': '{"camera":false,"model":false,"modelColor":"#ffffff","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"anime","plainColor":"#af608a","orifices":"mouth","emotion":"neutral","shape":"I","pitchType":"baby","synthType":"sawtooth","synthLfoType":"square","synthLfoFrequency":"9","synthLfoGain":"24"}',
            'JCVD': '{"camera":false,"model":false,"modelColor":"#ffffff","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"jcvd","plainColor":"#000000","orifices":"none","emotion":"neutral","shape":"I","pitchType":"man","synthType":"sawtooth","synthLfoType":"sine","synthLfoFrequency":"1","synthLfoGain":"78"}',
            'Maul': '{"model":false,"modelColor":"#000000","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#09ae32","mask":"eyes","plainColor":"#ff0000","orifices":"facepaint","emotion":"neutral","shape":"U","pitchType":"robot","synthType":"sawtooth","synthLfoType":"sine","synthLfoFrequency":"239","synthLfoGain":"194"}',
            'Cibi': '{"model":false,"modelColor":"#000000","wireframe":true,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"sd4","plainColor":"#000000","orifices":"mouth","emotion":"surprised","shape":"I","pitchType":"robot","synthType":"sine","synthLfoType":"sawtooth","synthLfoFrequency":"1","synthLfoGain":"10000"}',
            'Blue Coco': '{"model":false,"modelColor":"#000000","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"sd9","plainColor":"#b6b4b4","orifices":"mouth","emotion":"neutral","shape":"I","pitchType":"robot","synthType":"sine","synthLfoType":"triangle","synthLfoFrequency":"100","synthLfoGain":"1000"}',
            'Beetle': '{"model":false,"modelColor":"#000000","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"sd7","plainColor":"#000000","orifices":"mouth","emotion":"neutral","shape":"I","pitchType":"robot","synthType":"square","synthLfoType":"sine","synthLfoFrequency":"7","synthLfoGain":"1"}',
            'Doudou': '{"model":false,"modelColor":"#000000","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"sda","plainColor":"#c28eb7","orifices":"mouth","emotion":"neutral","shape":"I","pitchType":"woman","synthType":"sawtooth","synthLfoType":"triangle","synthLfoFrequency":"1","synthLfoGain":"20"}',
            'Casimir': '{"model":false,"modelColor":"#000000","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"casimir","plainColor":"#000000","orifices":"mouth","emotion":"neutral","shape":"U","pitchType":"baby","synthType":"square","synthLfoType":"square","synthLfoFrequency":"35","synthLfoGain":"381"}',
            'Mozinor': '{"model":false,"modelColor":"#671b98","wireframe":false,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"sd5","plainColor":"#bb35a2","orifices":"mouth","emotion":"neutral","shape":"O","pitchType":"baby","synthType":"sine","synthLfoType":"sawtooth","synthLfoFrequency":"15","synthLfoGain":"393"}',
            'Atreides': '{"model":true,"modelColor":"#ffffff","wireframe":true,"wireColor":"#000000","points":false,"mapColor":"#ffffff","mask":"paul","plainColor":"#1a88ff","orifices":"orifices","emotion":"neutral","shape":"I","pitchType":"robot","synthType":"square","synthLfoType":"sawtooth","synthLfoFrequency":"100","synthLfoGain":"10000"}',
        }

        const presetsSelect = document.getElementById("presets");

        Object.keys(presets).forEach(name => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            presetsSelect.appendChild(option);
        });

        presetsSelect.addEventListener('change', function (event) {
            if (event.target.value != "Choose a preset") {
                loadPreset(presets[event.target.value]);
            }
        });

        function serializeInterface() {
            const interfaceData = {};
            document.querySelectorAll("#inputs input, #inputs select").forEach(input => {
                if (input.type === "checkbox") {
                    interfaceData[input.id] = input.checked;
                } else {
                    interfaceData[input.id] = input.value;
                }
            });
            return JSON.stringify(interfaceData);
        }

        function loadPreset(presetJSON) {
            try {
                const preset = JSON.parse(presetJSON);
                document.querySelectorAll("#inputs input, #inputs select").forEach(input => {
                    if (preset.hasOwnProperty(input.id)) {
                        if (input.type === "checkbox") {
                            input.checked = preset[input.id];
                        } else {
                            input.value = preset[input.id];
                        }
                        input.dispatchEvent(new Event("change"));
                    }
                });
            } catch (error) {
                console.error("Erreur de chargement du preset:", error);
            }
        }

        function randomInterface() {
            document.querySelectorAll("#inputs input, #inputs select").forEach(input => {
                if (input.id === "emotion" || input.id === "shape") return;
                if (input.type === "checkbox") {
                    input.checked = Math.random() < 0.5;
                }
                else if (input.type === "color") {
                    let r, g, b;
                    do {
                        r = Math.floor(Math.random() * 256);
                        g = Math.floor(Math.random() * 256);
                        b = Math.floor(Math.random() * 256);
                    } while ((r < 100 && g < 100 && b < 100) || (r > 200 && g > 200 && b > 200));

                    input.value = `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
                }
                else if (input.tagName === "SELECT") {
                    const options = Array.from(input.options);
                    if (input.id === "mask" || input.id === "orifices") {
                        input.value = Math.random() < 0.5 ? "none" : options[Math.floor(Math.random() * options.length)].value;
                    } else {
                        input.value = options[Math.floor(Math.random() * options.length)].value;
                    }
                }
                else if (input.type === "number") {
                    let min = parseFloat(input.min) || 0;
                    let max = parseFloat(input.max) || 440;
                    let randomValue = Math.random() * (max - min) + min;
                    if (Number.isInteger(min) && Number.isInteger(max)) {
                        randomValue = Math.round(randomValue);
                    }
                    input.value = randomValue;
                }
                input.dispatchEvent(new Event("change"));
            });
        }

        document.getElementById('random').addEventListener('mousedown', function (event) {
            randomInterface();
        });

        document.getElementById('print').addEventListener('click', function (event) {
            console.log(serializeInterface());
        });

        document.getElementById('unfold').addEventListener('click', function (event) {
            const hidden = document.getElementById('hidden');
            const isHidden = getComputedStyle(hidden).display === 'none';
            hidden.style.display = isHidden ? 'block' : 'none';
        });

    </script>
</body>

</html>
