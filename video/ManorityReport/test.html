<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manority Report</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video,
    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      pointer-events: none;
    }

    #test {
      position: absolute;
      top: 400px;
      left: 400px;
      z-index: 100;
    }

    video {
      transform: scaleX(-1);
    }
  </style>
</head>

<body>

  <button id="test" onclick="console.log('bonjour')">Bonjour</button>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script type="module">
    import { simulate } from "../../../../../..//42/lib/event/simulate.js";

    function loadScriptAsync(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = () => resolve();
        document.head.appendChild(script);
      });
    }

    async function loadAllScripts() {
      await loadScriptAsync('./js/camera_utils.js');
      await loadScriptAsync('./js/drawing_utils.js');
      await loadScriptAsync('./js/hands.js');
    }

    async function startApp() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      let audioBuffer;
      async function preloadSound() {
        const response = await fetch('./sounds/click.mp3');
        const arrayBuffer = await response.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
      }
      function playSound() {
        if (!audioBuffer) { return; }
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        source.start();
      }
      preloadSound();

      let isClicking = [];
      let lastClientX = [];
      let lastClientY = [];
      const foundClickGesture = [];

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      function getCorrectedClickCoordinates(avgX, avgY, video, canvas) {
        const videoAspect = video.videoWidth / video.videoHeight;
        const canvasRect = canvas.getBoundingClientRect();
        const canvasAspect = canvasRect.width / canvasRect.height;
        let offsetX = 0;
        let offsetY = 0;
        let scale = 1;
        if (videoAspect > canvasAspect) {
          scale = canvasRect.height / video.videoHeight;
          const fittedWidth = video.videoWidth * scale;
          offsetX = (canvasRect.width - fittedWidth) / 2;
        } else {
          scale = canvasRect.width / video.videoWidth;
          const fittedHeight = video.videoHeight * scale;
          offsetY = (canvasRect.height - fittedHeight) / 2;
        }
        const clientX = canvasRect.left + offsetX + avgX * video.videoWidth * scale;
        const clientY = canvasRect.top + offsetY + avgY * video.videoHeight * scale;
        return { clientX, clientY };
      }

      let lastElements = [];
      const maxHands = 20;
      const sounds = true;

      function simulateClick(x, y, isDown, index) {
        const element = document.elementFromPoint(x, y);
        if (element) {
          if (element.id == 'video') { return; }
          if (isDown) {
            simulate(element, "pointerdown");
            simulate(element, "touchstart");
            simulate(element, "mousedown");
            simulate(element, "focus");
          } else {
            if (element == lastElements[index]) {
              if (sounds) { playSound() }
              simulate(element, "pointerup");
              simulate(element, "touchend");
              simulate(element, "mouseup");
              simulate(element, "click");
            }
          }
          lastElements[index] = element;
        }
      }

      const hands = new Hands({
        locateFile: (file) => `./js/${file}`
      });

      hands.setOptions({
        selfieMode: true,
        maxNumHands: maxHands,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      hands.onResults((results) => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
          for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const landmarks = results.multiHandLandmarks[i];
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });
            drawLandmarks(ctx, landmarks, { color: '#FF0000', lineWidth: 1 });

            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const dx = thumbTip.x - indexTip.x;
            const dy = thumbTip.y - indexTip.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            foundClickGesture[i] = distance < 0.05;

            if (foundClickGesture[i]) {
              const avgX = (thumbTip.x + indexTip.x) / 2;
              const avgY = (thumbTip.y + indexTip.y) / 2;
              const { clientX, clientY } = getCorrectedClickCoordinates(avgX, avgY, video, canvas);
              if (!isClicking[i]) {
                isClicking[i] = true;
                simulateClick(clientX, clientY, true, i);
              }
              lastClientX[i] = clientX;
              lastClientY[i] = clientY;
            }
          }

          for (let i = 0; i < maxHands; i++) {
            if (!foundClickGesture[i] && isClicking[i]) {
              isClicking[i] = false;
              simulateClick(lastClientX[i], lastClientY[i], false, i);
            }
          }
        }
      });

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 640,
        height: 480
      });

      camera.start();
    }

    loadAllScripts().then(() => {
      startApp();
    }).catch(console.error);
  </script>


</body>

</html>
