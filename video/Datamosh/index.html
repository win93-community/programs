<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Datamosh</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  body {
    overflow: hidden;
  }

  canvas {
    max-inline-size: none;
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateZ(0);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #controls {
    position: absolute;
    top: 0;
    right: 0;
    display: none;
  }

  #speedInput {
    background: var(--bg);
    padding-left: 2px;
    padding-right: 2px;
    width: 80px;
  }

  #recordStopBtn {
    display: none;
  }

  #startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding-right: 4px;
    padding-bottom: 1px;
  }
</style>

<video id="webcam" autoplay style="display: none"></video>
<div id="canvasContainer" class="fit screen">
  <canvas id="canvas"></canvas>
</div>

<button id="startBtn" title="Start Camera">
  <ui-picto value="camera"></ui-picto>Start
</button>

<div id="controls">
  <div class="cols">
    <button id="keyframeBtn" title="Reset Keyframe">
      <ui-picto value="image"></ui-picto>
    </button>
    <input
      type="range"
      id="speedInput"
      title="Speed"
      class="outset panel"
      min="1"
      max="10"
      step="1"
      value="3" />
    <button id="recordStartBtn" title="Start Recording">
      <ui-picto value="bullet"></ui-picto>
    </button>
    <button id="recordStopBtn" aria-pressed="true" title="Stop Recording">
      <ui-picto value="bullet" style="color: red"></ui-picto>
    </button>
  </div>
</div>

<script type="module" src="./script.js"></script>
