<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Defrag</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  #screen {
    background-color: #fff;
    padding: 1px;
    padding-right: 0;
    padding-bottom: 0;
  }
  #pause {
    display: none;
  }
  #boutons {
    min-width: 17ch;
  }
  #boutons button {
    width: 100%;
  }
  progress{
    width: 100%;
  }
</style>

<main class="fit rows">
  <div id="screen" class="inset">
    <canvas id="canvas" class="pixelated" width="640" height="400"></canvas>
  </div>

  <footer id="footer" class="pa-lg">
    <div id="infos">Welcome to Defrag !</div>
    <div class="cols gap-sm ma-t-xxs ma-b-xs">
      <progress value="0" data-label=""></progress>
      <div id="boutons" class="shrink">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
      </div>
    </div>
    <div id="pourcentage">
      Click 'Start' & use 'Arrows' or 'WASD' to mess with the amount of fragmentation in
      your file system.
    </div>
  </footer>
</main>

<script src="/c/libs/jquery/3.7/jquery.min.js"></script>
<script type="module" src="./script.js"></script>
