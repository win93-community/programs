<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <style>
        * {
            user-select: none;
        }

        * {
            image-rendering: pixelated;
        }

        #container {
            overflow: auto;
            left: 110px;
            width: calc(100% - 110px);
            height: 100%;
            background: var(--document-bg);
        }

        #container.export {
            overflow: auto;
            left: 0px;
            width: 100%;
            height: 100%;
            background: var(--document-bg);
            position: absolute;
        }

        #tools {
            position: absolute;
            width: 109px;
            height: calc(100% - 76px);
            top: 51px;
            overflow-y: auto;
        }

        #mods {
            position: absolute;
            top: 25px;
            width: 109px;
        }

        #mods>button>ui-picto {
            pointer-events: none;
        }

        #menu {
            padding-bottom: 1px;
            padding-top: 1px;
        }

        #menu>button {
            padding-right: 3px;
        }

        #scene {
            background-color: var(--document-bg);
            width: 100%;
            height: 100%;
            padding: 0px;
            margin: 0px;
        }

        #scene.pencil,
        #scene.pencil>* {
            cursor: url(./img/pencil-16.png) 0 16, auto;
        }

        #scene.text,
        #scene.text>* {
            cursor: url(./img/text-16.png) 8 8, auto;
        }

        #scene.move,
        #scene.move>* {
            cursor: url(./img/move-16.png) 7 7, auto;
        }

        #footer {
            max-height: 23px;
            overflow: hidden;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #eMode {
            width: 60px;
        }

        #scene>* {
            overflow: visible;
        }

        footer button {
            right: 0px;
            top: 0px;
            position: absolute;
        }

        #width,
        #height {
            width: 50px;
        }

        img,
        picture,
        iframe,
        audio,
        video,
        canvas,
        svg {
            max-inline-size: none;
        }

        .centered {
            text-align: center;
        }

        #codeEditor {
            overflow: auto;
            left: 110px;
            width: calc(100% - 110px);
            height: calc(100% - 49px);
            position: absolute;
            top: 24px;
            display: none;
        }

        p,
        ui-knob,
        .ui-knob__cap-box,
        .ui-knob__indicator,
        *:not(:empty, :has(>*)) {
            filter: none !important;
        }
    </style>
</head>

    <script type="module">
        const tools = document.getElementById('tools');
        let isDragging = false;
        let offsetX, offsetY;
        let lastToolUsed = "button";
        let counter = 0;
        const mode = document.getElementById('mode');
        let undo = false;
        let undoClipboard = "";
        let redoClipboard = "";
        let moveMode = false;
        const scene = document.getElementById('scene');
        let isDrawing = false;
        let defautImageFolder = '/42/assets/icons/';

        function isStandardHTMLElement(tagName) {
            const el = document.createElement(tagName);
            return !(el instanceof HTMLUnknownElement);
        }

        function createTempElement(tagOrClass, x, y) {
            let element;
            let width = document.getElementById('width').value;
            let height = document.getElementById('height').value;

            if (width == -1) width = 100;
            if (height == -1) height = 100;

            if (tagOrClass.startsWith(".")) {
                element = document.createElement('div');
                const classList = tagOrClass.slice(1).split('.');
                element.classList.add(...classList);
                element.style.width = 'min-content';
                element.style.minWidth = width + 'px';
                element.style.minHeight = height + 'px';
            } else {
                let tag = tagOrClass.split(".")[0];
                let classes = tagOrClass.includes(".") ? tagOrClass.split(".").slice(1) : [];
                if (isStandardHTMLElement(tag)) {
                    element = document.createElement(tag);
                    if (classes.length > 0) {
                        element.classList.add(...classes);
                    }
                    let resultText = text;
                    if (tag === 'img') {
                        element.src = img.src;
                    }
                    if (tag === 'fieldset') {
                        resultText = '<legend>' + text + '</legend>';
                        element.style.minWidth = width + 'px';
                        element.style.minHeight = height + 'px';
                    }
                    if (tag === 'button') {
                        element.setAttribute('onclick', js);
                    }
                    if (tag === 'hr') {
                        resultText = "";
                        element.style.width = width + 'px';
                    }
                    if (tag === 'p') {
                        element.style.width = width + 'px';
                        element.style.minHeight = 'auto';
                    }
                    if (tag === 'select') {
                        let options = resultText.split(" ");
                        options.forEach(optionText => {
                            let option = document.createElement("option");
                            option.textContent = optionText;
                            option.value = optionText;
                            element.appendChild(option);
                            element.setAttribute('onchange', js);
                        });
                        resultText = "";
                    }
                    if (tag !== 'select') {
                        element.innerHTML = resultText;
                    }
                } else {
                    element = document.createElement('input');
                    element.type = tag;
                    element.setAttribute('onchange', js);
                }
            }
            element.id = "e" + counter;
            element.style.position = 'absolute';
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.setAttribute('data-temp', 'true');
            counter++;
            return element;
        }

        document.getElementById('addTool').addEventListener('click', async (e) => {
            let custom = await prompt("Enter your custom element");
            if (custom) {
                let newButton = document.createElement('button');
                newButton.textContent = custom;
                tools.appendChild(newButton);
                setLastTool(custom);
                newButton.addEventListener('click', async (e) => {
                    tools.querySelectorAll('button').forEach(btn => btn.setAttribute('aria-pressed', 'false'));
                    e.target.setAttribute('aria-pressed', 'true');
                    lastToolUsed = newButton.textContent.trim();
                    document.getElementById("mode").selectedIndex = 0;
                    toggleTextMode();
                });
            }
        });

        tools.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', async (e) => {
                if (button.id === 'addTool') {
                    return;
                }
                tools.querySelectorAll('button').forEach(btn => btn.setAttribute('aria-pressed', 'false'));
                button.setAttribute('aria-pressed', 'true');
                lastToolUsed = button.textContent.trim();
                document.getElementById("mode").selectedIndex = 0;
                toggleTextMode();
            });
            button.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });
        });

        document.getElementById('editText').addEventListener('click', (e) => {
            setTextContent();
        }, { capture: false });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 't') {
                e.preventDefault();
                setTextContent();
            }
        });

        document.getElementById('editJS').addEventListener('click', (e) => {
            setJSContent();
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'j') {
                e.preventDefault();
                setJSContent();
            }
        });

        document.getElementById('editImg').addEventListener('click', (e) => {
            app.openFile(defautImageFolder);
            setLastTool('img');
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'i') {
                e.preventDefault();
                app.openFile(defautImageFolder);
                setLastTool('img');
            }
        });

        document.getElementById('resetSize').addEventListener('click', (e) => {
            document.getElementById('width').value = -1;
            document.getElementById('height').value = -1;
        });

        function formatHTML(html) {
            let div = document.createElement('div');
            div.innerHTML = html.trim();
            function formatNode(node, indent = 0) {
                let formatted = "";
                let tab = "  ".repeat(indent);
                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.nodeValue.trim();
                    if (text) {
                        formatted += tab + text + "\n";
                    }
                    return formatted;
                }
                if (node.nodeType === Node.ELEMENT_NODE) {
                    let tagOpen = tab + `<${node.tagName.toLowerCase()}`;
                    for (let attr of node.attributes) {
                        tagOpen += ` ${attr.name}="${attr.value}"`;
                    }
                    tagOpen += ">";
                    if (node.childNodes.length === 0) {
                        let autoCloseTags = ["area", "base", "br", "col", "embed", "hr", "img", "input", "link", "meta", "param", "source", "track", "wbr"];
                        if (autoCloseTags.includes(node.tagName.toLowerCase())) {
                            formatted += tagOpen + "\n";
                        } else {
                            formatted += tagOpen + `</${node.tagName.toLowerCase()}>\n`;
                        }
                        return formatted;
                    }
                    formatted += tagOpen + "\n";
                    for (let child of node.childNodes) {
                        formatted += formatNode(child, indent + 1);
                    }
                    formatted += tab + `</${node.tagName.toLowerCase()}>\n`;
                }
                return formatted;
            }
            let formattedHTML = "";
            for (let child of div.childNodes) {
                formattedHTML += formatNode(child);
            }
            return formattedHTML.trim();
        }

        function setLastMode(name) {
            let buttons = document.querySelectorAll("#mods button");
            buttons.forEach(button => {
                button.setAttribute("aria-pressed", "false");
                if (button.id.trim() === name) {
                    button.setAttribute("aria-pressed", "true");
                }
            });
            if (name == "code") {
                document.getElementById('codeEditor').innerText = formatHTML(document.getElementById('scene').innerHTML);
                document.getElementById('codeEditor').style.display = "initial";
            } else {
                if (document.getElementById("mode").value == "Code") {
                    document.getElementById('scene').innerHTML = document.getElementById('codeEditor').innerText;
                    document.getElementById('codeEditor').style.display = "none";
                }
            }
        }

        document.getElementById('mods').addEventListener('click', (e) => {
            setLastMode(e.target.id);
            moveMode = false;
            if (e.target.id == 'pencil') {
                document.getElementById("mode").selectedIndex = 0;
            }
            if (e.target.id == 'text-left') {
                document.getElementById("mode").selectedIndex = 1;
                toggleTextMode();
            }
            if (e.target.id == 'move') {
                document.getElementById("mode").selectedIndex = 2;
                moveMode = true;
                toggleTextMode();
            }
            if (e.target.id == 'code') {
                document.getElementById("mode").selectedIndex = 3;
            }
            if (e.target.id == 'magnifier') {
                document.getElementById("mode").selectedIndex = 4;
            }
            setCursor();
        });

        function cleanEditableContent(element) {
            element.innerHTML = element.innerHTML
                .replace(/<\/div>\s*<div>/g, "<br>")
                .replace(/<\/?div>/g, "")
                .replace(/\u00A0/g, " ");
        }

        function disableContentEdition() {
            for (const el of scene.querySelectorAll('[contenteditable]')) {
                el.toggleAttribute('contenteditable', false);
                el.style.overflow = 'initial';
                el.style.resize = 'none';
            }
        }

        scene.addEventListener('mousedown', (e) => {
            undo = false;
            undoClipboard = document.getElementById('scene').innerHTML;
            if (mode.value === "Text") {
                if (e.target !== scene) {
                    const target = e.target.closest('#scene > *');
                    target.toggleAttribute('contenteditable', true);
                    target.style.overflow = 'auto';
                    target.style.resize = 'both';
                } else {
                    disableContentEdition()
                }
                return;
            }
            if (!(mode.value === "Draw") || e.button !== 0) return;
            if (!lastToolUsed) return;
            isDrawing = true;
        });

        scene.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                addElementAtPosition(e.clientX, e.clientY);
            }
        });

        scene.addEventListener('mouseup', (e) => {
            if (isDrawing) {
                addElementAtPosition(e.clientX, e.clientY);
            }
            isDrawing = false;
        });

        function addElementAtPosition(clientX, clientY) {
            if (lastToolUsed == null) { return; }
            const rect = scene.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const newElement = createTempElement(lastToolUsed, x, y);
            scene.appendChild(newElement);
        }

        let isErasing = false;

        scene.addEventListener('mousedown', (e) => {
            if (!(mode.value === "Draw") || e.button !== 2) return;
            isErasing = true;
            e.preventDefault();
            eraseElement(e);
        });

        scene.addEventListener('mousemove', (e) => {
            if (isErasing) {
                eraseElement(e);
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 2) {
                isErasing = false;
            }
        });

        function eraseElement(e) {
            const target = e.target;
            if (target !== scene && target !== tools && target.parentElement === scene) {
                target.remove();
            }
        }

        scene.addEventListener('contextmenu', async (e) => {
            if ((mode.value === "Draw") || mode.value === "Move") {
                e.preventDefault();
            }
            if (mode.value === "Text") {
                e.preventDefault();
                if (e.target.id == "scene") { return; }
                let custom = await prompt("edit Element", { tag: "textarea", value: e.target.outerHTML })
                if (custom) {
                    e.target.outerHTML = custom;
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'e') {
                e.preventDefault();
                let select = document.getElementById("mode");
                let currentIndex = select.selectedIndex;
                let totalOptions = select.options.length;
                select.selectedIndex = (currentIndex + 1) % totalOptions;
                toggleTextMode()
            }
            if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                undoAction();
            }
        });

        function undoAction() {
            if (!undo) {
                redoClipboard = document.querySelector("#scene").innerHTML
                document.querySelector("#scene").innerHTML = undoClipboard;
            } else {
                document.querySelector("#scene").innerHTML = redoClipboard;
            }
            undo = !undo;
        }

        function redoAction() {
            document.querySelector("#scene").innerHTML = redoClipboard;
        }

        function insertBreakAtCaret() {
            let selection = window.getSelection();
            if (!selection.rangeCount) return;
            let range = selection.getRangeAt(0);
            let br = document.createElement("br");
            range.deleteContents();
            range.insertNode(br);
            let isAtEnd = !br.nextSibling;
            if (isAtEnd) {
                let extraBr = document.createElement("br");
                br.after(extraBr);
            }
            range.setStartAfter(br);
            range.setEndAfter(br);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        document.addEventListener("keydown", e => {
            const { target } = e;

            if (target.contentEditable === "true" && e.key === "Enter") {
                if (e.shiftKey) return;

                e.preventDefault();
                insertBreakAtCaret();
            }
        }, { capture: true });

        function toggleTextMode() {
            setCursor();
            disableContentEdition();
        }

        mode.addEventListener('input', (e) => {
            toggleTextMode()
        });

        let draggingElement = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let currentScale = 1;

        function setCursor() {
            if (mode.value === "Draw") {
                scene.classList.add("pencil");
            } else {
                scene.classList.remove("pencil");
            }
            if (mode.value === "Text") {
                scene.classList.add("text");
            } else {
                scene.classList.remove("text");
            }
            if (mode.value === "Move") {
                scene.classList.add("move");
            } else {
                scene.classList.remove("move");
            }
        }

        function getScale(element) {
            const transform = window.getComputedStyle(element).transform;
            if (transform && transform !== 'none') {
                const matrixValues = transform.match(/matrix\(([^)]+)\)/);
                if (matrixValues) {
                    const values = matrixValues[1].split(', ');
                    return parseFloat(values[0]);
                }
            }
            return 1;
        }

        scene.addEventListener('mousedown', (e) => {
            if (document.getElementById("mode").value != "Move") {
                if (e.button !== 1) return;
            }
            if (document.getElementById("mode").value == "Preview") return;
            const target = e.target.closest('#scene > *');
            if (e.target !== scene && e.target.parentElement === scene) {
                draggingElement = target;
                currentScale = getScale(target);
                const rect = draggingElement.getBoundingClientRect();
                const sceneRect = scene.getBoundingClientRect();
                dragOffsetX = (e.clientX - (rect.left + rect.width / 2)) / currentScale;
                dragOffsetY = (e.clientY - (rect.top + rect.height / 2)) / currentScale;
                e.preventDefault();
            }
        });

        let lastClick = 0;
        document.addEventListener("mousedown", (event) => {
            if (event.button === 1) {
                if (!lastClick || Date.now() - lastClick > 300) {
                    lastClick = Date.now();
                } else {
                    if (mode.value == "Preview") return;
                    if (mode.value == "Draw") {
                        setLastMode('text-left');
                        document.getElementById("mode").selectedIndex = 1;
                        mode.value = "Text";
                        toggleTextMode();
                        lastClick = 0;
                        setCursor();
                        return;
                    }
                    if (mode.value == "Text" || mode.value != "Draw") {
                        setLastMode('pencil')
                        document.getElementById("mode").selectedIndex = 0;
                        mode.value = "Draw";
                        toggleTextMode();
                        lastClick = 0;
                        setCursor();
                        return;
                    }
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!draggingElement) return;
            const sceneRect = scene.getBoundingClientRect();
            const x = (e.clientX - sceneRect.left - dragOffsetX * currentScale) - (draggingElement.offsetWidth / 2);
            const y = (e.clientY - sceneRect.top - dragOffsetY * currentScale) - (draggingElement.offsetHeight / 2);
            draggingElement.style.position = 'absolute';
            draggingElement.style.left = `${x}px`;
            draggingElement.style.top = `${y}px`;
        });

        document.addEventListener('mouseup', (e) => {
            if (document.getElementById("mode").value != "Move") {
                if (e.button === 1) {
                    draggingElement = null;
                }
            } else {
                draggingElement = null;
            }
        });

        scene.addEventListener('wheel', (e) => {
            if (mode.value != "Draw" && mode.value != "Text" && mode.value != "Move") return;
            const target = e.target;
            if (target.parentElement !== scene) return;
            e.preventDefault();
            const currentScale = parseFloat(target.getAttribute('data-scale')) || 1;
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            let newScale = Math.max(1, currentScale + delta);
            target.style.transform = `scale(${newScale})`;
            target.setAttribute('data-scale', newScale.toFixed(2));
        });

        function extractSceneContent(htmlString) {
            let parser = new DOMParser();
            let doc = parser.parseFromString(htmlString, "text/html");
            let scene = doc.querySelector("#scene");
            return scene ? scene.innerHTML.trim() : "";
        }

        function extractSceneRawContent(htmlString) {
            let match = htmlString.match(/<div id="scene"[^>]*>([\s\S]*?)<\/div>/i);
            return match ? match[1].trim() : "";
        }

        import { App } from "/42/api/os/App.js"
        const app = new App()
        let img = new Image();
        img.src = '/c/users/windows93/interface/icons/16x16/broken.png';
        app
            .on("decode", async (fileAgent) => {
                if (fileAgent.path.trim().toLowerCase().endsWith(".html")) {
                    let htmlSource = await fileAgent.getText()
                    const parser = new DOMParser();

        import { embedCSS } from "/42/lib/graphic/screenshot.js"

        async function getAllCSSRules() {

            return cssText;

        function convertImagesToBase64(container) {
            return new Promise((resolve) => {
                let images = container.getElementsByTagName("img");
                let total = images.length;
                let count = 0;
                if (total === 0) {
                    resolve();
                    return;
                }
                for (let img of images) {
                    let imgURL = img.src;
                    if (imgURL.toLowerCase().endsWith(".gif")) {
                        fetch(imgURL)
                            .then(response => response.blob())
                            .then(blob => {
                                let reader = new FileReader();
                                reader.onloadend = function () {
                                    img.src = reader.result;
                                    checkCompletion();
                                };
                                reader.readAsDataURL(blob);
                            })
                            .catch(error => {
                                console.warn(error);
                                checkCompletion();
                            });
                    } else {
                        let canvas = document.createElement("canvas");
                        let ctx = canvas.getContext("2d");
                        let newImg = new Image();
                        newImg.crossOrigin = "anonymous";
                        newImg.src = imgURL;
                        newImg.onload = function () {
                            canvas.width = newImg.width;
                            canvas.height = newImg.height;
                            ctx.drawImage(newImg, 0, 0);
                            try {
                                let dataURL = canvas.toDataURL("image/png");
                                img.src = dataURL;
                            } catch (e) {
                                console.warn(e);
                            }
                            checkCompletion();
                        };
                        newImg.onerror = function () {
                            checkCompletion();
                        };
                    }
                }
                function checkCompletion() {
                    count++;
                    if (count === total) {
                        resolve();
                    }
                }
            });
        }

        async function exportDocument() {
            let container = document.getElementById("container").cloneNode(true);
            container.firstElementChild.toggleAttribute('contenteditable', false);
            await convertImagesToBase64(container);
            let styles = await getAllCSSRules();
            let baseURL = window.location.origin;
            let options = { year: 'numeric', month: 'long', day: 'numeric' };
            let date = new Date().toLocaleDateString('en-US', options);
            let htmlDocument = `<!DOCTYPE html>

<!--

Generated with ${baseURL}/c/programs/editors/PowerNoob/ on ${date}.
Windows93.net is a project by Jankenpopp & Zombectro
-->
<head>

<title>Power Noob Document</title>
<style>
${styles}
</style>
</head>
<body>
<div id="container" class="export">${container.innerHTML}</div>
</body>
</html>`;
            return htmlDocument;
        }
