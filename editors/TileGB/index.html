<!DOCTYPE html>
<html lang="fr">
<!-- Design & Code: Jankenpopp (16/11/2024) -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile GB</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
    <style>
        body {
            overflow: hidden;
        }

        img,
        div {
            image-rendering: pixelated;
        }

        .container {
            display: flex;
            top: 22px;
            height: calc(100%);
            position: absolute;
            width: 100%;
        }

        .editor {
            padding: 3px;
            width: min-content;
        }

        .map-container {
            overflow: auto;
            width: calc(100% - 269px);
            height: calc(100% - 26px);
            position: relative;
            background: #fff;
            display: grid;
            place-items: center;
            top: 2px;
        }

        #tileMap {
            display: grid;
            grid-template-columns: repeat(20, 32px);
            grid-template-rows: repeat(18, 32px);
            margin: auto;
        }

        #pixelCanvas {
            display: grid;
            margin-bottom: 3px;
        }

        .pixel {
            width: 100%;
            height: 100%;
            background-color: #ccffcc;
            cursor: pointer;
        }

        .color-picker,
        .tools {
            display: flex;
            margin-bottom: 3px;
        }

        .color,
        .tool {
            width: 32px;
            height: 32px;
            margin-right: 5px;
            cursor: pointer;
        }

        .color.selected {
            border: 1px solid red;
        }

        #mainCanvas {
            border: 1px solid black;
        }

        .tile-number {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            background-color: #f0f0f0;
            cursor: pointer;
        }

        .tile-number-text {
            opacity: 0;
        }

        .saved-image {
            width: 34px;
        }

        .tile-number:hover,
        .pixel:hover {
            border: 1px solid red;
            box-sizing: border-box;

        }

        .menu {
            margin-bottom: 8px;
        }

        .tilesMenu {
            margin-bottom: 1px;
        }


        #savedImages {
            background: #fff;
            height: calc(100% - 378px);
            overflow-y: scroll;
        }

        #savedImages img.selected {
            border: 1px solid red;
            box-sizing: border-box;
        }

        #counter {
            width: 75px;
            text-align: center;
            display: inline-block;
            position: relative;
            top: -3px;
        }

        .numb {
            width: 50px;

        }

        .numbContainer {
            float: right;
        }

        .numbContainer>button {
            width: 21px;
        }

        .numbContainer>span {
            position: relative;
            top: -1px;
        }
    </style>
</head>

<body>
    <div class="menu">

        <button onclick="newMap()">
            <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <use href="#picto-file"></use>
            </svg>
            New
        </button>

        <button id="open"><svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <use href="#picto-folder-open"></use>
            </svg>
            Open map</button>
        <button id="save">
            <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <use href="#picto-save"></use>
            </svg>
            Save map
        </button>
        <button onclick="importMap()">
            <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <use href="#picto-export"></use>
            </svg>
            Upload Map
        </button>
        <button onclick="getMapPNG()">
            <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <use href="#picto-import"></use>
            </svg>
            Download Map
        </button>
        <div class="numbContainer">
            <button id="bleft">
                <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                    <use href="#picto-left"></use>
                </svg>
            </button>
            <button id="bright">
                <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                    <use href="#picto-right"></use>
                </svg>
            </button>
            <button id="bup">
                <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                    <use href="#picto-up"></use>
                </svg>
            </button>
            <button id="bdown">
                <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                    <use href="#picto-down"></use>
                </svg>
            </button>
            <span>
                Width: <input class='numb' type="number" name="" id="width" step="1" min="20" value="20">
                Height: <input class='numb' type="number" name="" id="height" step="1" min="18" value="18">
            </span>
        </div>
    </div>
    <div class="container">
        <div class="editor">
            <div class="color-picker">
                <div class="color inset" data-color="#e0f8cf" style="background-color: #e0f8cf;"></div>
                <div class="color inset" data-color="#86c06c" style="background-color: #86c06c;"></div>
                <div class="color inset" data-color="#306850" style="background-color: #306850;"></div>
                <div class="color inset selected" data-color="#071821" style="background-color: #071821;"></div>
            </div>
            <div class="tools">
                <button id="pencil" class="tool inset">
                    <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <use href="#picto-pencil"></use>
                    </svg>
                </button>
                <button id="bucket" class="tool">
                    <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <use href="#picto-paintbucket"></use>
                    </svg>
                </button>
            </div>
            <div id="pixelCanvas" class="inset"></div>
            <div class="tilesMenu">
                <button id="addImageButton">
                    <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <use href="#picto-plus"></use>
                    </svg>
                    Clone Tile
                </button>
                <button onclick="purge()">
                    <svg class="ui-picto__image" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <use href="#picto-square-dots"></use>
                    </svg>
                    Purge Tiles
                </button>
                <span id="counter">Tiles: 1 / 192</span>
            </div>
            <div id="savedImages" class="inset"></div>
        </div>
        <div class="map-container inset">
            <div id="tileMap"></div>
        </div>
    </div>
    <script>
        const colors = ["#e0f8cf", "#86c06c", "#306850", "#071821"];
        let selectedColor = colors[0];
        let selectedTool = 'pencil';
        let tileSize = 8;
        let currentImageIndex = null;
        const pixelCanvas = document.getElementById('pixelCanvas');
        const addImageButton = document.getElementById('addImageButton');
        const savedImagesContainer = document.getElementById('savedImages');
        const tileMapContainer = document.getElementById('tileMap');

        function updateSelectedColor() {
            document.querySelectorAll('.color').forEach(color => {
                if (color.dataset.color === selectedColor) {
                    color.classList.add('selected');
                } else {
                    color.classList.remove('selected');
                }
            });
        }

        function createGrid() {
            pixelCanvas.innerHTML = '';
            pixelCanvas.style.gridTemplateColumns = `repeat(${tileSize}, 32px)`;
            pixelCanvas.style.gridTemplateRows = `repeat(${tileSize}, 32px)`;
            for (let i = 0; i < tileSize * tileSize; i++) {
                const pixel = document.createElement('div');
                pixel.classList.add('pixel');
                pixel.style.backgroundColor = selectedColor;
                pixel.addEventListener('click', () => {
                    if (selectedTool === 'pencil') {
                        pixel.style.backgroundColor = selectedColor;
                        if (currentImageIndex !== null) updateImageInSavedImages();
                    } else if (selectedTool === 'bucket') {
                        floodFill(pixel, selectedColor);
                        if (currentImageIndex !== null) updateImageInSavedImages();
                    }
                    updateMap();
                });
                pixel.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    selectedColor = pixel.style.backgroundColor;
                    updateSelectedColor();
                });
                pixelCanvas.appendChild(pixel);
            }
        }

        function drawPixel(pixel) {
            if (selectedTool === 'pencil') {
                pixel.style.backgroundColor = selectedColor;
                if (currentImageIndex !== null) updateImageInSavedImages();
            } else if (selectedTool === 'bucket') {
                floodFill(pixel, selectedColor);
                if (currentImageIndex !== null) updateImageInSavedImages();
            } else if (selectedTool === 'picker') {
                selectedColor = pixel.style.backgroundColor;
                updateSelectedColor();
            }
            updateMap();
        }

        function updateImageInSavedImages() {
            if (currentImageIndex === null) return;
            const selectedImg = savedImagesContainer.children[currentImageIndex];
            const canvas = document.createElement('canvas');
            canvas.width = tileSize;
            canvas.height = tileSize;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const pixels = Array.from(pixelCanvas.children);
            pixels.forEach((pixel, index) => {
                const x = index % tileSize;
                const y = Math.floor(index / tileSize);
                ctx.fillStyle = pixel.style.backgroundColor;
                ctx.fillRect(x, y, 1, 1);
            });
            selectedImg.src = canvas.toDataURL();
        }

        function addNewImage() {
            const canvas = document.createElement('canvas');
            canvas.width = tileSize;
            canvas.height = tileSize;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const pixels = Array.from(pixelCanvas.children);
            pixels.forEach((pixel, index) => {
                const x = index % tileSize;
                const y = Math.floor(index / tileSize);
                ctx.fillStyle = pixel.style.backgroundColor;
                ctx.fillRect(x, y, 1, 1);
            });
            const dataURL = canvas.toDataURL();
            const img = document.createElement('img');
            img.src = dataURL;
            img.classList.add('saved-image');
            img.addEventListener('click', () => {
                loadImageInCanvas(img);
                currentImageIndex = Array.from(savedImagesContainer.children).indexOf(img);
                updateSelectedImage();
            });
            savedImagesContainer.appendChild(img);
            loadImageInCanvas(img);
            currentImageIndex = Array.from(savedImagesContainer.children).indexOf(img);
            updateSelectedImage();
            document.getElementById('counter').innerHTML = "Tiles: " + savedImagesContainer.querySelectorAll('img').length + " / 192";
        }

        function updateSelectedImage() {
            const savedImages = document.querySelectorAll('#savedImages img');
            savedImages.forEach((img, index) => {
                if (index === currentImageIndex) {
                    img.classList.add('selected');
                } else {
                    img.classList.remove('selected');
                }
            });
        }

        function loadImageInCanvas(imgElement) {
            const dataURL = imgElement.src;
            currentImageIndex = Array.from(savedImagesContainer.children).indexOf(imgElement);
            updateSelectedImage();
            const img = new Image();
            img.src = dataURL;
            img.onload = () => {
                tileSize = img.width;
                createGrid();
                const canvas = document.createElement('canvas');
                canvas.width = tileSize;
                canvas.height = tileSize;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0, tileSize, tileSize);
                Array.from(pixelCanvas.children).forEach((pixel, index) => {
                    const x = index % tileSize;
                    const y = Math.floor(index / tileSize);
                    const imageData = ctx.getImageData(x, y, 1, 1);
                    pixel.style.backgroundColor = `rgb(${imageData.data[0]}, ${imageData.data[1]}, ${imageData.data[2]})`;
                });
            };
        }

        function floodFill(pixel, fillColor) {
            const targetColor = pixel.style.backgroundColor;
            if (targetColor === fillColor) return;
            const stack = [pixel];
            const visited = new Set();
            while (stack.length) {
                const currentPixel = stack.pop();
                if (!visited.has(currentPixel) && currentPixel.style.backgroundColor === targetColor) {
                    currentPixel.style.backgroundColor = fillColor;
                    visited.add(currentPixel);
                    getNeighbors(currentPixel).forEach(neighbor => {
                        if (!visited.has(neighbor)) {
                            stack.push(neighbor);
                        }
                    });
                }
            }
        }

        function getNeighbors(pixel) {
            const allPixels = Array.from(pixelCanvas.children);
            const index = allPixels.indexOf(pixel);
            const neighbors = [];
            if (index % tileSize !== 0) neighbors.push(allPixels[index - 1]);
            if (index % tileSize !== tileSize - 1) neighbors.push(allPixels[index + 1]);
            if (index >= tileSize) neighbors.push(allPixels[index - tileSize]);
            if (index < allPixels.length - tileSize) neighbors.push(allPixels[index + tileSize]);
            return neighbors;
        }

        createGrid();
        selectedColor = colors[3];

        function createTileMap(cols = 20, rows = 18) {
            tileMapContainer.innerHTML = '';
            tileMapContainer.style.gridTemplateColumns = `repeat(${cols}, 30px)`;
            tileMapContainer.style.gridTemplateRows = `repeat(${rows}, 30px)`;
            for (let i = 0; i < cols * rows; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile-number');
                const numberDiv = document.createElement('div');
                numberDiv.classList.add('tile-number-text');
                numberDiv.innerText = '0';
                tile.appendChild(numberDiv);
                tile.addEventListener('click', () => {
                    if (currentImageIndex !== null) {
                        numberDiv.innerText = currentImageIndex;
                        updateMap();
                    }
                });
                tile.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    copyTileToSavedImages(tile);
                });
                tileMapContainer.appendChild(tile);
            }
        }

        function copyTileToSavedImages(tile) {
            const backgroundImage = tile.style.backgroundImage;
            if (backgroundImage && backgroundImage.startsWith('url("')) {
                const dataURL = backgroundImage.slice(5, -2);
                const img = document.createElement('img');
                img.src = dataURL;
                img.classList.add('saved-image');
                img.addEventListener('click', () => loadImageInCanvas(img));
                savedImagesContainer.appendChild(img);
                const newIndex = savedImagesContainer.children.length - 1;
                currentImageIndex = newIndex;
                updateSelectedImage();
                const numberDiv = tile.querySelector('.tile-number-text');
                if (numberDiv) {
                    numberDiv.innerText = newIndex;
                }
                loadImageInCanvas(img);
                updateMap();
                document.getElementById('counter').innerHTML = "Tiles: " + savedImagesContainer.querySelectorAll('img').length + " / 192";
            }
        }

        function updateMap() {
            const tiles = document.querySelectorAll('.tile-number');
            tiles.forEach((tile) => {
                const tileIndex = parseInt(tile.innerText);
                if (!isNaN(tileIndex) && tileIndex < savedImagesContainer.children.length) {
                    const img = savedImagesContainer.children[tileIndex];
                    tile.style.backgroundImage = `url(${img.src})`;
                    tile.style.backgroundSize = 'cover';
                }
            });
        }

        function getMapPNG() {
            const columns = parseInt(document.getElementById('width').value);
            const rows = parseInt(document.getElementById('height').value);
            const tileWidth = 8;
            const tileHeight = 8;
            const canvas = document.createElement('canvas');
            canvas.width = columns * tileWidth;
            canvas.height = rows * tileHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const tiles = document.querySelectorAll('.tile-number');
            const promises = [];
            tiles.forEach((tile, index) => {
                const col = index % columns;
                const row = Math.floor(index / columns);
                const x = col * tileWidth;
                const y = row * tileHeight;
                const backgroundImage = tile.style.backgroundImage;
                if (backgroundImage && backgroundImage.startsWith('url("')) {
                    const dataURL = backgroundImage.slice(5, -2);
                    const img = new Image();
                    img.src = dataURL;
                    promises.push(new Promise((resolve) => {
                        img.onload = () => {
                            ctx.drawImage(img, x, y, tileWidth, tileHeight);
                            resolve();
                        };
                    }));
                }
            });

            Promise.all(promises).then(() => {
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'map.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 'image/png');
            });
        }

        function purge() {
            let targetDataURL = null;
            if (currentImageIndex !== null && currentImageIndex >= 0) {
                const currentImage = savedImagesContainer.children[currentImageIndex];
                if (currentImage) {
                    targetDataURL = currentImage.src;
                }
            }
            savedImagesContainer.innerHTML = '';
            const uniqueDataURLs = new Map();
            let newIndex = 0;
            document.querySelectorAll('.tile-number').forEach(tile => {
                const tileDataURL = tile.style.backgroundImage.slice(5, -2);
                if (tileDataURL && !uniqueDataURLs.has(tileDataURL)) {
                    const img = document.createElement('img');
                    img.src = tileDataURL;
                    img.classList.add('saved-image');
                    img.addEventListener('click', () => loadImageInCanvas(img));
                    savedImagesContainer.appendChild(img);
                    uniqueDataURLs.set(tileDataURL, newIndex);
                    newIndex++;
                }
            });
            document.querySelectorAll('.tile-number').forEach(tile => {
                const tileDataURL = tile.style.backgroundImage.slice(5, -2);
                const numberDiv = tile.querySelector('.tile-number-text');

                if (uniqueDataURLs.has(tileDataURL)) {
                    numberDiv.innerText = uniqueDataURLs.get(tileDataURL);
                } else {
                    numberDiv.innerText = '0';
                }
            });
            currentImageIndex = null;
            if (targetDataURL) {
                savedImagesContainer.querySelectorAll('.saved-image').forEach((img, index) => {
                    if (img.src === targetDataURL) {
                        currentImageIndex = index;
                        updateSelectedImage();
                    }
                });
            }
            updateMap();
            document.getElementById('counter').innerHTML = "Tiles: " + savedImagesContainer.querySelectorAll('img').length + " / 192";

        }

        function importMap() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/png';
            input.addEventListener('change', handleFileSelect);
            input.click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function () {
                        if (img.width % 8 !== 0 || img.height % 8 !== 0) {
                            console.log('Non multiple de 8px');
                            return;
                        }
                        const newWidth = img.width / 8;
                        const newHeight = img.height / 8;
                        document.getElementById('width').value = newWidth;
                        document.getElementById('height').value = newHeight;
                        createTileMap(newWidth, newHeight);
                        importImageToMap(img);
                        purge();
                    };
                };
                reader.readAsDataURL(file);
            }
        }

        function importImageToMap(img) {
            const tiles = document.querySelectorAll('.tile-number');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0, img.width, img.height);
            const tileWidth = 8;
            const tileHeight = 8;
            const cols = Math.floor(img.width / tileWidth);
            const rows = Math.floor(img.height / tileHeight);
            let tileIndex = 0;
            for (let y = 0; y < img.height; y += tileHeight) {
                for (let x = 0; x < img.width; x += tileWidth) {
                    const tileCanvas = document.createElement('canvas');
                    tileCanvas.width = tileWidth;
                    tileCanvas.height = tileHeight;
                    const tileCtx = tileCanvas.getContext('2d', { willReadFrequently: true });
                    tileCtx.drawImage(canvas, x, y, tileWidth, tileHeight, 0, 0, tileWidth, tileHeight);
                    const dataURL = tileCanvas.toDataURL();
                    if (tiles[tileIndex]) {
                        const tile = tiles[tileIndex];
                        tile.style.backgroundImage = `url(${dataURL})`;
                        tileIndex++;
                    }
                }
            }
            currentCols = cols;
            currentRows = rows;
        }

        let isDrawing = false;

        function applyTool(pixel) {
            if (selectedTool === 'pencil') {
                pixel.style.backgroundColor = selectedColor;
                if (currentImageIndex !== null) updateImageInSavedImages();
            } else if (selectedTool === 'bucket') {
                floodFill(pixel, selectedColor);
                if (currentImageIndex !== null) updateImageInSavedImages();
            } else if (selectedTool === 'picker') {
                selectedColor = pixel.style.backgroundColor;
                updateSelectedColor();
            }
            updateMap();
        }

        pixelCanvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDrawing = true;
                const pixel = e.target.closest('.pixel');
                if (pixel) {
                    applyTool(pixel);
                }
            }
        });

        pixelCanvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                const pixel = e.target.closest('.pixel');
                if (pixel) {
                    applyTool(pixel);
                }
            }
        });

        pixelCanvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });


        document.addEventListener('mouseup', () => {
            isDrawing = false;
        });


        tileMapContainer.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDrawing = true;
                const tile = e.target.closest('.tile-number');
                if (tile && currentImageIndex !== null) {
                    const numberDiv = tile.querySelector('.tile-number-text');
                    numberDiv.innerText = currentImageIndex;
                    updateMap();
                }
            }
        });

        tileMapContainer.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                const tile = e.target.closest('.tile-number');
                if (tile && currentImageIndex !== null) {
                    const numberDiv = tile.querySelector('.tile-number-text');
                    numberDiv.innerText = currentImageIndex;
                    updateMap();
                }
            }
        });

        tileMapContainer.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        createTileMap(20, 18);
        addNewImage();
        updateMap();

        function newMap() {
            document.getElementById('width').value = 20;
            document.getElementById('height').value = 18;
            createTileMap(20, 18);
            savedImages = [];
            savedImagesContainer.innerHTML = '';
            selectedColor = colors[3];
            updateSelectedColor();
            selectedColor = colors[0];
            createGrid();
            selectedColor = colors[3];
            addNewImage();
            currentImageIndex = 0;
            updateMap();
        }

        addImageButton.addEventListener('click', () => {
            addNewImage();
            updateMap();
        });

        document.querySelectorAll('.color').forEach(color => {
            color.addEventListener('click', () => {
                document.querySelectorAll('.color').forEach(c => c.classList.remove('selected'));
                color.classList.add('selected');
                selectedColor = color.dataset.color;
            });
        });
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('click', () => {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('inset'));
                tool.classList.add('inset');
                selectedTool = tool.id;
            });
        });

        function saveMapPNG() {
            const columns = parseInt(document.getElementById('width').value);
            const rows = parseInt(document.getElementById('height').value);
            const tileWidth = 8;
            const tileHeight = 8;
            const canvas = document.createElement('canvas');
            canvas.width = columns * tileWidth;
            canvas.height = rows * tileHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            return new Promise((resolve) => {
                const images = [];
                const promises = [];
                const tiles = document.querySelectorAll('.tile-number');
                tiles.forEach((tile, index) => {
                    const col = index % columns;
                    const row = Math.floor(index / columns);
                    const x = col * tileWidth;
                    const y = row * tileHeight;
                    const backgroundImage = tile.style.backgroundImage;
                    if (backgroundImage && backgroundImage.startsWith('url("')) {
                        const dataURL = backgroundImage.slice(5, -2);
                        const img = new Image();
                        img.src = dataURL;
                        images.push({ img, x, y });
                        promises.push(new Promise((resolveImg) => {
                            img.onload = () => resolveImg();
                        }));
                    }
                });
                Promise.all(promises).then(() => {
                    images.forEach(({ img, x, y }) => {
                        ctx.drawImage(img, x, y, tileWidth, tileHeight);
                    });
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/png');
                });
            });
        }

        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        let currentCols = parseInt(widthInput.value);
        let currentRows = parseInt(heightInput.value);

        function resizeTileMap(newCols, newRows) {
            const currentTiles = Array.from(tileMapContainer.children);
            tileMapContainer.innerHTML = '';
            tileMapContainer.style.gridTemplateColumns = `repeat(${newCols}, 30px)`;
            tileMapContainer.style.gridTemplateRows = `repeat(${newRows}, 30px)`;
            const newTiles = [];
            for (let i = 0; i < newCols * newRows; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile-number');
                const numberDiv = document.createElement('div');
                numberDiv.classList.add('tile-number-text');
                numberDiv.innerText = '0';
                tile.appendChild(numberDiv);
                tile.addEventListener('click', () => {
                    if (currentImageIndex !== null) {
                        numberDiv.innerText = currentImageIndex;
                        updateMap();
                    }
                });
                tile.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    copyTileToSavedImages(tile);
                });
                newTiles.push(tile);
            }
            newTiles.forEach(tile => tileMapContainer.appendChild(tile));
            for (let row = 0; row < Math.min(newRows, currentRows); row++) {
                for (let col = 0; col < Math.min(newCols, currentCols); col++) {
                    const oldIndex = row * currentCols + col;
                    const newIndex = row * newCols + col;
                    if (oldIndex < currentTiles.length) {
                        const oldTile = currentTiles[oldIndex];
                        const newTile = newTiles[newIndex];
                        const numberDiv = oldTile.querySelector('.tile-number-text');
                        if (numberDiv) {
                            newTile.querySelector('.tile-number-text').innerText = numberDiv.innerText;
                        }
                        const tileData = oldTile.dataset;
                        if (tileData) {
                            newTile.dataset = tileData;
                        }
                    }
                }
            }
            currentCols = newCols;
            currentRows = newRows;
            updateMap();
            tiles = Array.from(tileMapContainer.children);
        }

        widthInput.addEventListener('input', () => {
            const cols = parseInt(widthInput.value);
            const rows = parseInt(heightInput.value);
            resizeTileMap(cols, rows);
        });

        heightInput.addEventListener('input', () => {
            const cols = parseInt(widthInput.value);
            const rows = parseInt(heightInput.value);
            resizeTileMap(cols, rows);
        });

        document.getElementById('bleft').addEventListener('click', () => shiftTileMap('left'));
        document.getElementById('bright').addEventListener('click', () => shiftTileMap('right'));
        document.getElementById('bup').addEventListener('click', () => shiftTileMap('up'));
        document.getElementById('bdown').addEventListener('click', () => shiftTileMap('down'));

        function shiftTileMap(direction) {
            const tiles = Array.from(tileMapContainer.children);
            const newTiles = [];
            const cols = currentCols;
            const rows = currentRows;
            let offsetX = 0;
            let offsetY = 0;
            if (direction === 'left') offsetX = -1;
            else if (direction === 'right') offsetX = 1;
            else if (direction === 'up') offsetY = -1;
            else if (direction === 'down') offsetY = 1;
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const newCol = (col + offsetX + cols) % cols;
                    const newRow = (row + offsetY + rows) % rows;
                    const oldIndex = row * cols + col;
                    const newIndex = newRow * cols + newCol;
                    newTiles[newIndex] = tiles[oldIndex];
                }
            }
            tileMapContainer.innerHTML = '';
            newTiles.forEach((tile) => tileMapContainer.appendChild(tile));
            updateMap();
        }

        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
    </script>

            })
