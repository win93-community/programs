<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AnsiLove</title>

<link rel="stylesheet" href="/style.css" />
<script src="./js/ansilove.js" type="text/javascript" charset="utf-8"></script>
<style type="text/css" media="screen">
  .center {
    margin: 0 auto;
    background-color: black;
  }

  #header {
    width: 720px;
    height: 464px;
  }

  #example {
    width: 720px;
    height: 384px;
    overflow: hidden;
  }

  #render {
    overflow-y: scroll;
    width: 100%;
  }

  #render canvas {
    width: 100%;
    image-rendering: pixelated;
  }

  #left,
  #right {
    float: right;
  }
</style>

<div class="fit rows">
  <div role="toolbar" class="pa-xxs">
    <button id="openFile" title="Open">
      <ui-picto value="folder-open"></ui-picto>
    </button>

    <button id="exportFileAs" title="export">
      <ui-picto value="image"></ui-picto>
    </button>

    <button id="right" title="nerightxt">
      <ui-picto value="right"></ui-picto>
    </button>

    <button id="left" title="left">
      <ui-picto value="left"></ui-picto>
    </button>
  </div>
  <div id="render" class="inset center"></div>
</div>

<script type="module" src="./script.js"></script>
