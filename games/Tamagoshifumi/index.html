    <title>Tamagoshifumi</title>

  <body oncontextmenu="return false;">
    <style>
      html,
      body {
        overflow: hidden;
      }

      html {
        font-size: calc((100vw / 11.1));
        color: #fff;
      }

      .fonts {
        position: absolute;
        left: -3000px;
      }

      .door,
      button {
        touch-action: manipulation !important;
      }

      body {
        background-color: #000;
        /* background-image: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAAAAABX3VL4AAAADklEQVQIHWP4f4bhzH8ACsgDlzpvWf4AAAAASUVORK5CYII=); */
        background-size: 0.5rem;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;

        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        width: auto;
        height: auto;
        pointer-events: none;
        z-index: 100;
      }

      .loading span {
        display: inline-block;
        width: 0.4rem;
        height: 0.4rem;
        background-color: #fff;
        border: 0.1rem solid #000;
        margin: 0 0.1rem;
        animation: blinker 1s step-start infinite;
      }

      .loading span:nth-child(2) {
        animation-delay: 0.25s;
      }

      .loading span:nth-child(3) {
        animation-delay: 0.5s;
      }

      .loading span:nth-child(4) {
        animation-delay: 0.75s;
      }

      @keyframes blinker {
        60% {
          background-color: #f0f;
        }
      }
      .start {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
      }

      .pages {
        width: auto;
        justify-content: flex-end;
      }

      #nav {
        display: none;
      }
    </style>

    <div class="loading">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="fonts">
      <div class="font-pico">a9</div>
      <div class="font-digit">a9</div>
      <div class="font-NDS12">a9</div>
    </div>

    <script src="./assets/phaser.min.js"></script>
  </body>
</html>
