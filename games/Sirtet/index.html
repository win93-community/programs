<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tetris</title>

<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="./style.css" />
<script src="/42/core.js"></script>

<div
  id="game"
  style="display: none"
  class="reverse-tetris | fit rows gap-xs pa-xxxs pa-b-xxs pa-t-false">
  <main class="cols gap-xs">
    <div
      id="grid-container"
      class="container shrink flex | inset pattern-checkerboard-dark">
      <canvas id="grid" class="ma-auto" width="160" height="320"></canvas>
    </div>

    <div id="next-view" class="rows">
      <div id="next-container" class="container shrink | inset screen">
        <canvas id="next" width="80" height="80"></canvas>
      </div>
      <div>Lines <strong id="score">0</strong></div>
    </div>
  </main>

  <footer id="bag" class="cols gap-xxs">
    <button id="piece1"><canvas width="80" height="80"></canvas></button>
    <button id="piece2"><canvas width="80" height="80"></canvas></button>
    <button id="piece3"><canvas width="80" height="80"></canvas></button>
    <button id="piece4"><canvas width="80" height="80"></canvas></button>
    <button id="piece5"><canvas width="80" height="80"></canvas></button>
    <button id="piece6"><canvas width="80" height="80"></canvas></button>
    <button id="piece7"><canvas width="80" height="80"></canvas></button>
  </footer>

  <div id="gameover" class="hide">You Win!</div>
</div>

<script>
  let canvas = document.querySelector("canvas")
  let ctx = canvas.getContext("2d")
  ctx.fillStyle = "#000"
  ctx.fillRect(0, 0, canvas.width, canvas.height)
  canvas = undefined
  ctx = undefined
</script>

<script type="module" src="./script.js"></script>
