<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tetris Screensaver</title>

<style>
  canvas {
    background-color: #000;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    object-fit: cover;
    object-position: bottom left;
  }
</style>

<canvas id="grid"></canvas>

<script type="module">
  import { Tetris } from "./js/Tetris.js"
  const square = ~~(window.innerWidth / 16)
  const tetris = new Tetris({
    canvas: document.querySelector("#grid"),
    ai: true,
    square,
    rows: 16,
    columns: 16,
  })

  tetris.on("gameover", () => tetris.reset())
  tetris.start()
</script>
