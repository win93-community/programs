<!doctype html>
<meta charset="utf-8" />
<title>Robby</title>

<link rel="stylesheet" href="/style.css" />

<style type="text/css">
  @font-face {
    font-family: Tomo;
    src: url("/42/themes/tribute/windows9x/fonts/tomo/Tomo.ttf")
      format("opentype");
    font-weight: normal;
    font-style: normal;
    font-display: block;
  }

  body,
  html {
    overflow: hidden;
    user-select: none;
  }
  body {
    font-family: Tomo, monospace;
    font-size: 12px;
    line-height: 1;
    /* text-shadow: 1px 1px 1px rgba(255, 255, 255, 1); */
  }
  #picture_container {
    white-space: pre;
  }
  #tooltip {
    width: auto;
    background: #ffffe1;
    border-width: 1px;
    border-style: solid;
    border-color: #000;
    position: absolute;
    display: none;
    padding: 3px 6px;
  }

  .cursor_pointer {
    cursor: var(--cursor-pointer);
  }
</style>

<div id="content">
  <div style="display: none">
    <canvas
      id="p5"
      data-processing-sources="Robby.pde"
      width="100"
      height="100"
      style="display: none">
      <p>Your browser does not support the canvas tag.</p>
    </canvas>
  </div>
  <div
    id="picture_container"
    style="margin: auto; width: 400px; text-align: center; padding: 0px">
    <div id="picture" style="text-align: center; margin: auto"></div>
    <div
      id="interactions"
      style="position: absolute; top: 0px; left: 0px"></div>
  </div>
  <br /><br />
  <div
    id="text"
    style="margin: auto; width: 380px; white-space: pre-wrap"></div>
  <div
    id="restart"
    class="cursor_pointer"
    onclick="window.location.reload()"
    style="
      display: none;
      margin: auto;
      width: 380px;
      white-space: pre-wrap;
      text-align: center;
    ">
    restart
  </div>
  <div id="tooltip">this</div>
</div>

<script src="/c/libs/jquery/3.7/jquery.min.js"></script>
<script src="/c/libs/processing/1.4/processing.min.js"></script>

<script>
  // convenience function to get the id attribute of generated sketch html element
  function getProcessingSketchId() {
    return "Robby"
  }

  $(document).on("mousemove", (e) => {
    $("#tooltip").css({
      left: e.pageX + 30,
      top: e.pageY,
    })
    Processing.getInstanceById("p5").setJsMouseMoved(e.pageX, e.pageY)
  })

  let nextAction = -1
  $(document).on("mouseover", ".interact", function (e) {
    nextAction = $(this).attr("action")
    $("#tooltip").html($(this).attr("label"))
    $("#tooltip").css("display", "block")
  })
  $(document).on("mouseleave", ".interact", (e) => {
    nextAction = -1
    $("#tooltip").css("display", "none")
  })

  $(document).on("mousedown", ".interact", (e) => {
    if (nextAction != -1) Processing.getInstanceById("p5").act(nextAction)
  })

  $(window).resize(() => {
    Processing.getInstanceById("p5").updateScreen()
  })
</script>
