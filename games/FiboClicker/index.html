<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fibonacci Clicker</title>

<!--
    Fibonacci Incremental game.
    The aim of the game is to crash your browser, I guess.
    Author: https://jankenpopp.com
-->

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>

<style>
  * {
    user-select: none;
  }

  body {
    overflow: hidden;
    padding: 5px;
  }

  #result {
    max-width: 100%;
    word-wrap: break-word;
    white-space: normal;
    overflow-wrap: break-word;
    word-break: break-word;
    height: auto;
    position: absolute;
    display: block;
    width: calc(100% - 10px);
    left: 5px;
    height: calc(100% - 50px);
    line-height: 12px;
  }

  #fibInput {
    width: max-content;
    pointer-events: none;
  }

  #inputs > span {
    margin-top: 3px;
    margin-left: 5px;
  }

  #stock {
    margin-right: 3px !important;
  }

  #buy {
    padding-left: 5px;
    padding-right: 5px;
  }

  #clickers {
    margin-right: -3px;
  }

  /* .cantBuy {
    pointer-events: none;
    opacity: 0.5;
  } */

  /* button {
    cursor: pointer;
  } */

  ui-picto,
  #price {
    pointer-events: none;
  }
</style>

<div id="inputs" class="cols">
  <button id="click">
    <ui-picto value="cursor"></ui-picto>
  </button>
  <input type="text" id="fibInput" min="0" value="0" />
  <span id="stock" class="shrink">
    <span id="clickers">0</span>
    <ui-picto value="cursor"></ui-picto>
  </span>
  <!-- <button class="cantBuy" id="buy"> -->
  <button disabled id="buy">
    <ui-picto value="stats"></ui-picto><span id="price">0</span>
  </button>
</div>

<hr />

<div id="result" class="inset font-mono pa scroll-auto flexbox screen"></div>

<script src="gmp-wasm.js"></script>
<script type="module">
  // import "/42/api/os.js";
  let ansi = false
  let pause = false

  const fibInputEl = document.querySelector("#fibInput")
  const buyEl = document.querySelector("#buy")
  const resultEl = document.querySelector("#result")

  // memory method
  gmp.init().then(({ calculate }) => {
    const cache = {}
    const fibonacci = (n) => {
      if (n in cache) {
        return cache[n]
      }
      const result = calculate((g) => {
        let a = g.Integer(0)
        let b = g.Integer(1)
        for (let i = 2; i <= n; i++) {
          const temp = b.add(a)
          a = b
          b = temp
        }
        return n === 0 ? a : b
      })
      cache[n] = result
      return result
    }
    const displayResult = (number) => {
      let result = fibonacci(number).toString()
      if (ansi) {
        const pixelMap = ["▖", "▖", "▘", "▝", "▙", "▟", "▛", "▜", "▚", "▞"]
        result = result
          .split("")
          .map((digit) => {
            const digitIndex = Number.parseInt(digit)
            return pixelMap[digitIndex] || digit
          })
          .join("")
      }
      resultEl.textContent = result
      const cantBuy = Number.parseInt(fibInputEl.value) < cost
      // buyEl.classList.toggle("cantBuy", cantBuy)
      buyEl.disabled = cantBuy
    }
    fibInputEl.addEventListener("change", () => {
      const inputValue = fibInputEl.value
      const number = Number.parseInt(inputValue)
      displayResult(number)
    })
    const autoClickers = []
    const basePrice = 10
    const growthFactor = 1.5
    let cost = Math.floor(basePrice * growthFactor ** 1)

    const updateClickers = () => {
      document.querySelector("#clickers").textContent = autoClickers.length
      cost = Math.floor(basePrice * growthFactor ** (autoClickers.length + 1))
      document.querySelector("#price").textContent = cost
    }
    updateClickers()
    buyEl.addEventListener("click", () => {
      const fibInput = fibInputEl
      const level = autoClickers.length + 1
      const cost = Math.floor(basePrice * growthFactor ** level)
      if (Number.parseInt(fibInput.value) >= cost) {
        fibInput.value -= cost
        autoClickers.push(
          setInterval(() => {
            if (!pause) {
              fibInput.value = Number.parseInt(fibInput.value) + level
              displayResult(Number.parseInt(fibInput.value))
            }
          }, 1000),
        )
      }
      updateClickers()

      const cantBuy = Number.parseInt(fibInputEl.value) < cost
      buyEl.disabled = cantBuy
    })
    document.querySelector("#click").addEventListener("click", () => {
      const number = Number.parseInt(fibInputEl.value) + 1
      fibInputEl.value = number
      displayResult(number)
    })
    window.addEventListener("keydown", (event) => {
      if (event.key === "a") {
        ansi = !ansi
        const number = Number.parseInt(fibInputEl.value)
        fibInputEl.value = number
        displayResult(number)
        event.preventDefault()
      }
      if (event.key === "p") {
        pause = !pause
        event.preventDefault()
      }
    })

    document.addEventListener("contextmenu", (e) => e.preventDefault())

    resultEl.addEventListener("contextmenu", () => {
      const text = resultEl.textContent
      navigator.clipboard.writeText(text).then(() => {
        const icon = window.top.sys42.apps.getAppIcon("fibo", "16x16")
        window.top.sys42.toast(["Copied to clipboard. ", text], {
          label: "Fibo Clicker",
          picto: icon,
          timeout: 3000,
        })
      })
    })
    resultEl.addEventListener("click", (event) => {
      ansi = !ansi
      const number = Number.parseInt(fibInputEl.value)
      fibInputEl.value = number
      displayResult(number)
      event.preventDefault()
    })
    displayResult(0)
  })
</script>
