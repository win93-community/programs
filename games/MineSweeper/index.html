<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MineSweeper</title>

<link rel="stylesheet" href="/style.css" />

<style>
  * {
    line-height: 0;
  }
  @layer reset {
    img {
      block-size: revert-layer !important;
    }
  }
  html,
  body {
    padding: 0;
    margin: 0;
    overflow: hidden;
    background-color: #c0c0c0;
  }
  #cntBombs,
  #cntTime {
    vertical-align: top;
    display: inline-block;
    border: 1px solid #000;
  }
  #board {
    white-space: nowrap;
    display: inline-block;
  }
</style>

<div id="board"></div>

<script src="./script.js"></script>
