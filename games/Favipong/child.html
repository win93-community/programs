<!doctype html>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>favipong</title>

<link rel="stylesheet" href="/style.css" />
<script src="/42/core.js"></script>
<link id="dynamic-favicon" rel="icon" href="favicon.ico" type="image/x-icon" />

<!--
  Favipong, play pong in the favicon.
  Design & code: Jankenpopp (17/10/2024)
-->

<style>
  body {
    overflow: hidden;
  }
  #stop,
  #arrow-up,
  #arrow-down,
  #focus-lost {
    display: none;
  }

  #focus-gained {
    display: none;
  }

  #focus-lost,
  #focus-gained {
    width: 100%;
    height: 45px;
    position: absolute;
    top: 1px;
  }

  #start {
    display: inline-flex;
    z-index: 100;
  }

  #start,
  #stop {
    width: 100%;
    height: 46px;
    position: absolute;
    top: 1px;
  }
</style>

<div>
  <div>
    <button id="start" title="play"><ui-picto value="play"></ui-picto></button>
    <button id="stop" title="stop"><ui-picto value="stop"></ui-picto></button>
    <button id="arrow-up" title="arrow-up" for="btn-ra-checked">
      <ui-picto value="arrow-up"></ui-picto>
    </button>
    <button id="arrow-down" title="arrow-down">
      <ui-picto value="arrow-down"></ui-picto>
    </button>

    <div id="focus-gained" class="message positive">
      Focus gained.<br />Use arrows up & down.
    </div>
    <div id="focus-lost" class="message negative">
      Focus lost.<br />Click here to play.
    </div>
  </div>
</div>

<script>
  const canvasSize = 16
  const paddleHeight = 5
  const paddleWidth = 1
  const ballSize = 1
  const playerSpeed = 1.5
  const aiSpeed = 0.75
  let playerY = Math.floor((canvasSize - paddleHeight) / 2)
  let aiY = Math.floor((canvasSize - paddleHeight) / 2)
  let ballX = Math.floor(canvasSize / 2)
  let ballY = Math.floor(canvasSize / 2)
  let ballSpeedX = 1
  let ballSpeedY = 1
  let playerDirection = 0
  let playerScore = 0
  let aiScore = 0
  let showScoreScreen = false
  let gamePaused = true
  const winningScore = 5
  let gameOver = false
  let winner = 1
  let gameInterval

  let audioContext
  let audioInitialized = false

  function playSound(frequency, duration) {
    const oscillator = audioContext.createOscillator()
    const gainNode = audioContext.createGain()
    oscillator.connect(gainNode)
    gainNode.connect(audioContext.destination)
    oscillator.type = "square"
    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime)
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime)
    oscillator.start()
    oscillator.stop(audioContext.currentTime + duration)
  }

  function playBounceSound() {
    playSound(400, 0.1)
  }

  function playScoreSound() {
    playSound(600, 0.2)
  }

  function dessinerPong() {
    const canvas = document.createElement("canvas")
    canvas.width = canvasSize
    canvas.height = canvasSize
    const ctx = canvas.getContext("2d")
    ctx.imageSmoothingEnabled = false
    ctx.fillStyle = "black"
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    if (showScoreScreen) {
      ctx.fillStyle = "white"
      for (let i = 0; i < playerScore; i++) {
        ctx.fillRect(1, 1 + i * 3, 1, 2)
      }
      for (let i = 0; i < aiScore; i++) {
        ctx.fillRect(canvasSize - 2, 1 + i * 3, 1, 2)
      }
      return canvas.toDataURL("image/png")
    }

    ctx.fillStyle = "white"
    ctx.fillRect(1, Math.round(playerY), paddleWidth, paddleHeight)
    ctx.fillRect(
      canvasSize - paddleWidth - 1,
      Math.round(aiY),
      paddleWidth,
      paddleHeight,
    )
    ctx.fillRect(Math.round(ballX), Math.round(ballY), ballSize, ballSize)

    return canvas.toDataURL("image/png")
  }

  function changerFavicon(faviconURL) {
    const oldLink = parent.document.querySelector("#dynamic-favicon")
    const newLink = parent.document.createElement("link")
    newLink.id = "dynamic-favicon"
    newLink.rel = "icon"
    newLink.href = faviconURL
    if (oldLink) {
      oldLink.remove()
    }
    parent.document.head.append(newLink)
  }

  function resetGame() {
    playerY = Math.floor((canvasSize - paddleHeight) / 2)
    aiY = Math.floor((canvasSize - paddleHeight) / 2)
    if (winner === 0) {
      ballX = Math.floor(canvasSize / 2) - 1
      ballSpeedX = -1
    } else {
      ballX = Math.floor(canvasSize / 2)
      ballSpeedX = 1
    }
    ballY = Math.floor(canvasSize / 2)
    ballSpeedY = Math.random() < 0.5 ? 1 : -1
    gamePaused = false
    showScoreScreen = false
    gameOver = false
  }

  function updateGame() {
    if (gamePaused || gameOver) return

    playerY += playerDirection * playerSpeed
    playerY = Math.max(0, Math.min(canvasSize - paddleHeight, playerY))

    if (ballY > aiY + paddleHeight / 2) {
      aiY += aiSpeed
    } else if (ballY < aiY + paddleHeight / 2) {
      aiY -= aiSpeed
    }
    aiY = Math.max(0, Math.min(canvasSize - paddleHeight, aiY))

    ballX += ballSpeedX
    ballY += ballSpeedY

    if (ballX < -1) {
      aiScore++
      showScoreScreen = true
      playScoreSound()
      gamePaused = true
      winner = 1
      if (aiScore >= winningScore) {
        gameOver = true
      }
    } else if (ballX > canvasSize + 1) {
      playerScore++
      showScoreScreen = true
      playScoreSound()
      winner = 0
      gamePaused = true
      if (playerScore >= winningScore) {
        gameOver = true
      }
    }

    if (ballY <= 0 || ballY >= canvasSize - ballSize) {
      ballSpeedY = -ballSpeedY
      playBounceSound()
    }

    if (
      ballX <= paddleWidth &&
      ballX > 0 &&
      ballY >= playerY &&
      ballY <= playerY + paddleHeight &&
      ballSpeedX < 0
    ) {
      ballSpeedX = -ballSpeedX
      playBounceSound()
    }

    if (
      ballX >= canvasSize - paddleWidth - ballSize &&
      ballY >= aiY &&
      ballY <= aiY + paddleHeight &&
      ballSpeedX > 0
    ) {
      ballSpeedX = -ballSpeedX
      playBounceSound()
    }

    const faviconURL = dessinerPong()
    changerFavicon(faviconURL)
  }

  function lancerJeu() {
    if (gameInterval !== undefined) {
      clearInterval(gameInterval)
    }
    gameInterval = setInterval(updateGame, 100)
  }

  document.addEventListener("keydown", (e) => {
    if (!showScoreScreen && !gameOver) {
      if (e.key === "ArrowUp") {
        playerDirection = -1
      } else if (e.key === "ArrowDown") {
        playerDirection = 1
      }
    } else if (showScoreScreen || gameOver) {
      if (gameOver) {
        playerScore = 0
        aiScore = 0
      }
      resetGame()
      gamePaused = false
    }
  })

  document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      playerDirection = 0
    }
  })

  document.querySelector("#start").addEventListener("click", () => {
    document.querySelector("#start").style.display = "none"
    /* document.getElementById("stop").style.display = "inline-flex"; */
    document.querySelector("#focus-gained").style.display = "inline-block"
    if (!audioInitialized) {
      audioContext = new AudioContext()
      audioContext.resume()
      audioInitialized = true
    }
    // if (gamePaused) {
    resetGame()
    lancerJeu()
    // }
  })

  document.querySelector("#stop").addEventListener("click", () => {
    document.querySelector("#start").style.display = "inline-flex"
    document.querySelector("#stop").style.display = "none"
    playerScore = 0
    aiScore = 0
    showScoreScreen = false
    gamePaused = true
    gameOver = true
    winner = 1
    clearInterval(gameInterval)

    changerFavicon("favicon.ico")
  })

  const arrowUpButton = document.querySelector("#arrow-up")
  const arrowDownButton = document.querySelector("#arrow-down")

  arrowUpButton.addEventListener("mousedown", () => {
    if (!showScoreScreen && !gameOver) {
      playerDirection = -1
    } else if (showScoreScreen || gameOver) {
      if (gameOver) {
        playerScore = 0
        aiScore = 0
      }
      resetGame()
      gamePaused = false
    }
  })

  arrowUpButton.addEventListener("mouseup", () => {
    if (!showScoreScreen && !gameOver) {
      playerDirection = 0
    }
  })

  arrowDownButton.addEventListener("mousedown", () => {
    if (!showScoreScreen && !gameOver) {
      playerDirection = 1
    } else if (showScoreScreen || gameOver) {
      if (gameOver) {
        playerScore = 0
        aiScore = 0
      }
      resetGame()
      gamePaused = false
    }
  })

  arrowDownButton.addEventListener("mouseup", () => {
    if (!showScoreScreen && !gameOver) {
      playerDirection = 0
    }
  })

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      changerFavicon("favicon.ico")
    }
  })

  window.addEventListener("focus", () => {
    document.querySelector("#focus-lost").style.display = "none"
    document.querySelector("#focus-gained").style.display = "inline-block"
    gamePaused = false
  })

  window.addEventListener("blur", () => {
    document.querySelector("#focus-lost").style.display = "inline-block"
    document.querySelector("#focus-gained").style.display = "none"
    gamePaused = true
  })
</script>
