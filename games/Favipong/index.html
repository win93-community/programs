<!doctype html>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>favipong</title>

<link id="dynamic-favicon" rel="icon" href="favicon.ico" type="image/x-icon" />
<style>
  #stop {
    display: none;
  }
</style>

<div>
  Favipong
  <div><button id="start">Start</button><button id="stop">Stop</button></div>
  <div>Use the Up and Down arrow keys to play pong in the Favicon.</div>
</div>

<script>
  const canvasSize = 32
  const paddleHeight = 10
  const paddleWidth = 2
  const ballSize = 2
  const playerSpeed = 1.5
  const aiSpeed = 0.75
  let playerY = Math.floor((canvasSize - paddleHeight) / 2)
  let aiY = Math.floor((canvasSize - paddleHeight) / 2)
  let ballX = Math.floor(canvasSize / 2)
  let ballY = Math.floor(canvasSize / 2)
  let ballSpeedX = 1
  let ballSpeedY = 1
  let playerDirection = 0
  let playerScore = 0
  let aiScore = 0
  let showScoreScreen = false
  let gamePaused = true
  const winningScore = 6
  let gameOver = false
  let winner = 1
  let gameInterval

  const audioContext = new (window.AudioContext || window.webkitAudioContext)()
  let audioInitialized = false

  const originalFavicon = document.querySelector('link[rel="icon"]')?.href // Save the original favicon

  function playSound(frequency, duration) {
    const oscillator = audioContext.createOscillator()
    const gainNode = audioContext.createGain()
    oscillator.connect(gainNode)
    gainNode.connect(audioContext.destination)
    oscillator.type = "square"
    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime)
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime)
    oscillator.start()
    oscillator.stop(audioContext.currentTime + duration)
  }

  function playBounceSound() {
    playSound(400, 0.1)
  }

  function playScoreSound() {
    playSound(600, 0.2)
  }

  function dessinerPong() {
    const canvas = document.createElement("canvas")
    canvas.width = canvasSize
    canvas.height = canvasSize
    const ctx = canvas.getContext("2d")
    ctx.imageSmoothingEnabled = false
    ctx.fillStyle = "black"
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    if (showScoreScreen) {
      ctx.fillStyle = "white"
      for (let i = 0; i < playerScore; i++) {
        ctx.fillRect(2, 2 + i * 5, 2, 3)
      }
      for (let i = 0; i < aiScore; i++) {
        ctx.fillRect(canvasSize - 4, 2 + i * 5, 2, 3)
      }
      return canvas.toDataURL("image/png")
    }

    ctx.fillStyle = "white"
    ctx.fillRect(1, Math.round(playerY), paddleWidth, paddleHeight)
    ctx.fillRect(
      canvasSize - paddleWidth - 1,
      Math.round(aiY),
      paddleWidth,
      paddleHeight,
    )
    ctx.fillRect(Math.round(ballX), Math.round(ballY), ballSize, ballSize)

    return canvas.toDataURL("image/png")
  }

  function changerFavicon(faviconURL) {
    const oldLink = document.querySelector("#dynamic-favicon")
    if (oldLink) oldLink.remove()
    if (faviconURL) {
      const newLink = document.createElement("link")
      newLink.id = "dynamic-favicon"
      newLink.rel = "icon"
      newLink.href = faviconURL
      document.head.append(newLink)
    }
  }

  function resetGame() {
    playerY = Math.floor((canvasSize - paddleHeight) / 2)
    aiY = Math.floor((canvasSize - paddleHeight) / 2)
    if (winner === 0) {
      ballX = Math.floor(canvasSize / 2) - 1
      ballSpeedX = -1
    } else {
      ballX = Math.floor(canvasSize / 2)
      ballSpeedX = 1
    }
    ballY = Math.floor(canvasSize / 2)
    ballSpeedY = Math.random() < 0.5 ? 1 : -1
    gamePaused = false
    showScoreScreen = false
    gameOver = false
  }

  function updateGame() {
    if (gamePaused || gameOver) return

    playerY += playerDirection * playerSpeed
    playerY = Math.max(0, Math.min(canvasSize - paddleHeight, playerY))

    if (ballY > aiY + paddleHeight / 2) {
      aiY += aiSpeed
    } else if (ballY < aiY + paddleHeight / 2) {
      aiY -= aiSpeed
    }
    aiY = Math.max(0, Math.min(canvasSize - paddleHeight, aiY))

    ballX += ballSpeedX
    ballY += ballSpeedY

    if (ballX < -1) {
      aiScore++
      showScoreScreen = true
      playScoreSound()
      gamePaused = true
      winner = 1
      if (aiScore >= winningScore) {
        gameOver = true
      }
    } else if (ballX > canvasSize + 1) {
      playerScore++
      showScoreScreen = true
      playScoreSound()
      winner = 0
      gamePaused = true
      if (playerScore >= winningScore) {
        gameOver = true
      }
    }

    if (ballY <= 0 || ballY >= canvasSize - ballSize) {
      ballSpeedY = -ballSpeedY
      playBounceSound()
    }

    if (
      ballX <= paddleWidth &&
      ballX > 0 &&
      ballY >= playerY &&
      ballY <= playerY + paddleHeight &&
      ballSpeedX < 0
    ) {
      ballSpeedX = -ballSpeedX
      playBounceSound()
    }

    if (
      ballX >= canvasSize - paddleWidth - ballSize &&
      ballY >= aiY &&
      ballY <= aiY + paddleHeight &&
      ballSpeedX > 0
    ) {
      ballSpeedX = -ballSpeedX
      playBounceSound()
    }

    const faviconURL = dessinerPong()
    changerFavicon(faviconURL)
  }

  function lancerJeu() {
    if (gameInterval !== undefined) {
      clearInterval(gameInterval)
    }
    gameInterval = setInterval(updateGame, 100)
  }

  document.addEventListener("keydown", (e) => {
    if (!showScoreScreen && !gameOver) {
      if (e.key === "ArrowUp") {
        playerDirection = -1
      } else if (e.key === "ArrowDown") {
        playerDirection = 1
      }
    } else if (showScoreScreen || gameOver) {
      if (gameOver) {
        playerScore = 0
        aiScore = 0
      }
      resetGame()
      gamePaused = false
    }
  })

  document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      playerDirection = 0
    }
  })

  document.querySelector("#start").addEventListener("click", () => {
    document.querySelector("#start").style.display = "none"
    document.querySelector("#stop").style.display = "initial"
    if (!audioInitialized) {
      audioContext.resume()
      audioInitialized = true
    }
    if (gamePaused) {
      resetGame()
      lancerJeu()
    }
  })

  document.querySelector("#stop").addEventListener("click", () => {
    document.querySelector("#start").style.display = "initial"
    document.querySelector("#stop").style.display = "none"
    playerScore = 0
    aiScore = 0
    showScoreScreen = false
    gamePaused = true
    gameOver = true
    winner = 1
    clearInterval(gameInterval)

    // Reset favicon to the original one
    changerFavicon(originalFavicon)
  })
</script>
