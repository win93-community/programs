<!doctype html>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Follow the White Rabbit</title>

<script src="/42/core.js"></script>
<link rel="stylesheet" href="/style.css" />

<style>
  body,
  html {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  * {
    user-select: none;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    position: absolute;
    transform-origin: 0 0;
  }

  canvas {
    filter: brightness(0.94) contrast(1.2) hue-rotate(40deg) saturate(1.2);
  }

  #gameover {
    color: var(--document-bg);
    position: absolute;
    z-index: 1111;
    inset: 0;
    display: grid;
    place-items: center;
    font-weight: bold;
    font-size: 17vmin;

    @supports (font-size: round(down, 17vmin, 12px)) {
      font-size: max(var(--fs), round(down, 17vmin, var(--fs)));
    }

    line-height: 1;
    text-align: center;
    text-shadow:
      0 1px 0 var(--document-fg),
      1px 0 0 var(--document-fg),
      0 -1px 0 var(--document-fg),
      -1px 0 0 var(--document-fg),
      -1px -1px 0 var(--document-fg),
      1px -1px 0 var(--document-fg),
      -1px 1px 0 var(--document-fg),
      1px 1px 0 var(--document-fg),
      2px 0 0 var(--document-fg),
      -2px 0 0 var(--document-fg),
      2px 1px 0 var(--document-fg),
      -2px 1px 0 var(--document-fg),
      2px -1px 0 var(--document-fg),
      -2px -1px 0 var(--document-fg);
  }

  #steps-display,
  #max-steps-display {
    font-size: 50%;
  }
</style>

<main class="fit">
  <canvas id="gameCanvas"></canvas>
  <div id="gameover" class="hide">
    <div>
      <div>Game Over</div>
      <div id="steps-display">Steps: <span id="steps">0</span></div>
      <div id="max-steps-display" class="hide">
        Max steps: <span id="max-steps">0</span>
      </div>
    </div>
  </div>
</main>

<script type="module" src="./script.js"></script>
