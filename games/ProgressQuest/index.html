<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Progress Quest</title>

<script>
  const roster = localStorage.getItem("roster")
  if (!roster || Object.keys(JSON.parse(roster)).length === 0) {
    location.href = "./newguy.html"
  }
</script>

<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="./style.css" />

<script src="./js/jquery-3.6.0.js"></script>
<script src="./js/config.js"></script>
<script type="module" src="./js/roster.js"></script>

<div class="rows pa-xs pa-t-false fit">
  <main id="roster" class="inset-shallow scroll-auto"></main>

  <footer class="pa txt-center">
    <button id="roll">New Character</button>
    <div class="hide">
      <input id="pickup" type="file" accept=".pqw" multiple hidden />
      <label id="uploader" for="pickup">Load a Saved Game</label>
    </div>
  </footer>
</div>

<script id="badge" type="text/html">
  <div class="cols">
    <button class="outset-shallow block pa txt-left go">
      <div>
        <img class="left" src="./icon-32.png" alt="" />
        <b>$Traits.Name</b> the $Traits.Race ($bestplot)
        <div class="rc">Level $Traits.Level $Traits.Class</div>
        <div class="bs">$bestequip / $bestspell / $beststat</div>
      </div>
    </button>
    <button class="outset-shallow shrink sheet">
      <span><ui-picto value="file"></ui-picto> Sheet</span>
    </button>
    <button class="outset-shallow shrink delete">
      <span><ui-picto value="skull"></ui-picto> Delete</span>
    </button>
  </div>
</script>

<script type="text/charsheet" id="sheet">
  $Traits.Name the $Traits.Race [$hostname]
  "$motto"

  Level $Traits.Level $Traits.Class (exp. $ExpBar.position/$ExpBar.max)

  Plot stage: $bestplot ($PlotBar.hint)
  Quest: $bestquest ($QuestBar.hint)

  Stats:
     STR $Stats.STR
     CON $Stats.CON
     DEX $Stats.DEX
     INT $Stats.INT
     WIS $Stats.WIS   HP Max $Stats.HP_Max
     CHA $Stats.CHA   MP Max $Stats.MP_Max

  Equipment:
  $Equips.___
  Spell Book:
  $Spells.___
  Inventory ($EncumBar.hint):
  $Inventory.___
  -- $date
  -- Progress Quest 6.3.web - http://progressquest.com/
</script>
