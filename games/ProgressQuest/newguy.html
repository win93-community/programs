<!doctype html>
<meta charset="utf-8" />
<title>Progress Quest - Roll One Up</title>

<link rel="stylesheet" href="/style.css" type="text/css" />
<link rel="stylesheet" href="./style.css" type="text/css" />

<script src="./js/jquery-3.6.0.js"></script>
<script src="./js/config.js"></script>
<script src="./js/newguy.js"></script>

<hr class="ma-t-false" />
<div class="rows fit gap pa-sm pa-t" id="newguy">
  <div class="cols shrink">
    <label for="Name">Name</label>
    <input id="Name" spellcheck="false" />
    <button id="RandomName">?</button>
  </div>

  <div class="cols gap">
    <fieldset class="groupbox" id="races">
      <legend>Race</legend>
    </fieldset>

    <fieldset class="groupbox" id="classes">
      <legend>Class</legend>
    </fieldset>

    <div class="rows gap">
      <fieldset class="groupbox" id="stats">
        <legend>Stats</legend>

        <table>
          <tr>
            <th>STR</th>
            <td id="STR" class="contour">13</td>
          </tr>
          <tr>
            <th>CON</th>
            <td id="CON" class="contour">23</td>
          </tr>
          <tr>
            <th>DEX</th>
            <td id="DEX" class="contour">34</td>
          </tr>
          <tr>
            <th>INT</th>
            <td id="INT" class="contour">12</td>
          </tr>
          <tr>
            <th>WIS</th>
            <td id="WIS" class="contour">4</td>
          </tr>
          <tr>
            <th>CHA</th>
            <td id="CHA" class="contour">12</td>
          </tr>
          <tr>
            <th colspan="2">&nbsp;</th>
          </tr>
          <tr>
            <th>Total</th>
            <td id="Total" class="contour">48</td>
          </tr>
        </table>

        <div class="txt-center cols">
          <button id="Reroll">Roll</button>
          <button id="Unroll" disabled>Unroll</button>
        </div>
        <br />
      </fieldset>

      <fieldset class="groupbox hide" id="gametype">
        <legend>Game Type</legend>
        <div>
          <input type="radio" id="single" name="online" value="false" checked />
          <label for="single">Single player</label>
        </div>
        <div>
          <input type="radio" id="multiplayer" name="online" value="true" />
          <label for="multiplayer">Multiplayer</label>
        </div>
      </fieldset>

      <button id="Sold">Sold!</button>
    </div>
  </div>
</div>
